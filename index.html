<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jam Canvas Dashboard - v1.1.0</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { background-color: #050505; color: white; font-family: 'Inter', sans-serif; margin: 0; overflow: hidden; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .bg-gradient-glow { background: radial-gradient(circle at center, rgba(34, 197, 94, 0.15) 0%, transparent 70%); }
        .album-shadow { box-shadow: 0 50px 100px -20px rgba(0, 0, 0, 0.8); }
        @keyframes pulse-slow { 0%, 100% { opacity: 0.3; transform: scale(1); } 50% { opacity: 0.5; transform: scale(1.1); } }
        .animate-pulse-slow { animation: pulse-slow 8s ease-in-out infinite; }
        
        /* Custom Scrollbar für Settings */
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const CLIENT_ID = "4a1a9ff821ca4ea2a00f9f665dab598b"; 
        const REDIRECT_URI = "https://julian4-spot.github.io/jam-dashboard/";
        const AUTH_ENDPOINT = "https://accounts.spotify.com/authorize";
        const TOKEN_ENDPOINT = "https://accounts.spotify.com/api/token";
        const SCOPES = "user-read-currently-playing user-read-playback-state user-modify-playback-state";
        const VERSION = "v1.1.0";

        // PKCE Utils
        const generateRandomString = (length) => {
            const possible = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
            const values = crypto.getRandomValues(new Uint8Array(length));
            return Array.from(values).map((x) => possible[x % possible.length]).join('');
        };
        const sha256 = async (plain) => {
            const encoder = new TextEncoder();
            const data = encoder.encode(plain);
            return window.crypto.subtle.digest('SHA-256', data);
        };
        const base64encode = (input) => {
            return btoa(String.fromCharCode(...new Uint8Array(input)))
                .replace(/=/g, '').replace(/\+/g, '-').replace(/\//g, '_');
        };

        function App() {
            const [token, setToken] = useState(window.localStorage.getItem("spotify_access_token") || "");
            const [data, setData] = useState(null);
            const [showSettings, setShowSettings] = useState(false);
            
            // Personalisierung
            const [settings, setSettings] = useState({
                glowIntensity: 0.5,
                blurAmount: 20,
                showQR: true,
                accentColor: "#22c55e"
            });

            useEffect(() => {
                const urlParams = new URLSearchParams(window.location.search);
                const code = urlParams.get('code');
                if (code) exchangeCodeForToken(code);
            }, []);

            const exchangeCodeForToken = async (code) => {
                const codeVerifier = window.localStorage.getItem('code_verifier');
                const payload = {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: new URLSearchParams({
                        client_id: CLIENT_ID,
                        grant_type: 'authorization_code',
                        code,
                        redirect_uri: REDIRECT_URI,
                        code_verifier: codeVerifier,
                    }),
                };
                try {
                    const response = await fetch(TOKEN_ENDPOINT, payload);
                    const result = await response.json();
                    if (result.access_token) {
                        setToken(result.access_token);
                        window.localStorage.setItem("spotify_access_token", result.access_token);
                        window.history.replaceState({}, document.title, window.location.pathname);
                    }
                } catch (e) { console.error(e); }
            };

            const login = async () => {
                const codeVerifier = generateRandomString(64);
                const hashed = await sha256(codeVerifier);
                const codeChallenge = base64encode(hashed);
                window.localStorage.setItem('code_verifier', codeVerifier);
                const params = new URLSearchParams({
                    response_type: 'code',
                    client_id: CLIENT_ID,
                    scope: SCOPES,
                    code_challenge_method: 'S256',
                    code_challenge: codeChallenge,
                    redirect_uri: REDIRECT_URI,
                });
                window.location.href = `${AUTH_ENDPOINT}?${params.toString()}`;
            };

            useEffect(() => {
                if (!token) return;
                const fetchData = async () => {
                    try {
                        const response = await fetch("https://api.spotify.com/v1/me/player/currently-playing", {
                            headers: { Authorization: `Bearer ${token}` }
                        });
                        if (response.status === 401) logout();
                        else if (response.status === 200) setData(await response.json());
                        else setData(null);
                    } catch (e) { console.error(e); }
                };
                fetchData();
                const interval = setInterval(fetchData, 3000);
                return () => clearInterval(interval);
            }, [token]);

            const startJam = () => {
                // Öffnet Spotify App zum Jammen
                window.location.href = "spotify:jam";
            };

            const logout = () => {
                window.localStorage.removeItem("spotify_access_token");
                setToken("");
                setData(null);
            };

            return (
                <div className="min-h-screen flex items-center justify-center p-10 relative overflow-hidden bg-black">
                    {/* Dynamic Glow Background */}
                    <div 
                        className="absolute inset-0 opacity-50 transition-all duration-1000"
                        style={{ 
                            background: `radial-gradient(circle at center, ${settings.accentColor}${Math.floor(settings.glowIntensity * 255).toString(16).padStart(2, '0')} 0%, transparent 70%)` 
                        }}
                    ></div>
                    
                    {/* Header / Version */}
                    <div className="absolute top-8 left-10 flex items-center gap-4 z-50">
                        <div className="bg-white/10 px-3 py-1 rounded-full text-[10px] font-black tracking-widest uppercase border border-white/5">
                            {VERSION}
                        </div>
                    </div>

                    {/* Controls Right */}
                    <div className="absolute top-8 right-10 flex items-center gap-4 z-50">
                        <button 
                            onClick={() => setShowSettings(!showSettings)}
                            className="w-12 h-12 glass rounded-2xl flex items-center justify-center hover:bg-white/10 transition-colors"
                        >
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
                        </button>
                    </div>

                    {/* Settings Panel */}
                    {showSettings && (
                        <div className="absolute right-10 top-24 w-80 glass rounded-[2.5rem] p-8 z-50 animate-in fade-in slide-in-from-right-4 duration-300 border border-white/10">
                            <h3 className="text-xl font-black italic uppercase mb-6 tracking-tighter">Einstellungen</h3>
                            <div className="space-y-6 custom-scroll">
                                <div className="space-y-2">
                                    <label className="text-[10px] font-black text-zinc-500 uppercase tracking-widest flex justify-between">
                                        Glow Intensity <span>{Math.round(settings.glowIntensity * 100)}%</span>
                                    </label>
                                    <input type="range" min="0" max="1" step="0.1" value={settings.glowIntensity} onChange={(e) => setSettings({...settings, glowIntensity: parseFloat(e.target.value)})} className="w-full accent-green-500" />
                                </div>
                                <div className="space-y-2">
                                    <label className="text-[10px] font-black text-zinc-500 uppercase tracking-widest">Akzentfarbe</label>
                                    <div className="flex gap-2">
                                        {["#22c55e", "#3b82f6", "#a855f7", "#ec4899", "#f97316"].map(c => (
                                            <button key={c} onClick={() => setSettings({...settings, accentColor: c})} className={`w-8 h-8 rounded-full border-2 ${settings.accentColor === c ? 'border-white' : 'border-transparent'}`} style={{backgroundColor: c}}></button>
                                        ))}
                                    </div>
                                </div>
                                <button onClick={logout} className="w-full py-4 bg-red-500/10 text-red-500 rounded-xl font-bold text-sm hover:bg-red-500/20 transition-colors mt-4">Logout</button>
                            </div>
                        </div>
                    )}

                    {!token ? (
                        <div className="max-w-md w-full glass p-12 rounded-[3.5rem] text-center relative z-10 border border-white/10 shadow-2xl">
                            <div className="w-20 h-20 bg-green-500 rounded-[2rem] flex items-center justify-center mx-auto mb-10 shadow-2xl shadow-green-500/20">
                                <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="black" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
                            </div>
                            <h1 className="text-5xl font-black mb-4 italic uppercase tracking-tighter">Jam Canvas</h1>
                            <p className="text-zinc-500 text-sm mb-12 font-medium">Dein interaktives Spotify Dashboard.<br/>Bereit für die nächste Session?</p>
                            <button onClick={login} className="w-full bg-green-500 hover:bg-green-400 text-black font-black py-7 rounded-[2rem] transition-all shadow-xl active:scale-95 text-xl">
                                LOGIN MIT SPOTIFY
                            </button>
                        </div>
                    ) : !data ? (
                        <div className="text-center relative z-10 space-y-12">
                            <div className="w-20 h-20 border-4 border-zinc-900 border-t-green-500 rounded-full animate-spin mx-auto shadow-2xl"></div>
                            <div className="space-y-4">
                                <p className="opacity-40 font-black uppercase text-sm tracking-[0.5em]">Warte auf Wiedergabe</p>
                                <button onClick={startJam} className="px-8 py-4 glass rounded-full text-xs font-black uppercase tracking-widest hover:bg-white/10 transition-all">
                                    Spotify Jam starten
                                </button>
                            </div>
                        </div>
                    ) : (
                        <div className="flex flex-col md:flex-row items-center gap-20 max-w-7xl w-full relative z-10 animate-in fade-in zoom-in duration-1000">
                            
                            {/* Left Side: Art & QR */}
                            <div className="relative shrink-0 flex flex-col items-center gap-8">
                                <div className="relative group">
                                    <div className="absolute -inset-10 opacity-30 rounded-[6rem] blur-3xl transition-all duration-1000" style={{ backgroundColor: settings.accentColor }}></div>
                                    <img 
                                        src={data.item.album.images[0].url} 
                                        className="w-[32rem] h-[32rem] rounded-[5rem] album-shadow relative z-10 border border-white/5 object-cover" 
                                        alt="Album Cover" 
                                    />
                                </div>
                                
                                <button 
                                    onClick={startJam}
                                    className="relative z-10 flex items-center gap-3 px-10 py-5 bg-white text-black rounded-full font-black uppercase tracking-tighter hover:scale-105 transition-transform shadow-2xl"
                                >
                                    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M7 4v16l13-8z"/></svg>
                                    Jam Session starten
                                </button>
                            </div>

                            {/* Right Side: Track Info */}
                            <div className="flex-grow space-y-12 text-center md:text-left">
                                <div className="space-y-4">
                                    <div className="inline-block px-4 py-1.5 glass rounded-full text-[10px] font-black uppercase tracking-[0.3em] text-zinc-500 border border-white/5">
                                        Aktuelle Wiedergabe
                                    </div>
                                    <h1 className="text-8xl font-black italic uppercase tracking-tighter leading-[0.85]">{data.item.name}</h1>
                                    <p className="text-4xl text-zinc-500 font-bold tracking-tight">{data.item.artists.map(a => a.name).join(", ")}</p>
                                </div>

                                <div className="space-y-6">
                                    <div className="w-full bg-zinc-900/40 h-4 rounded-full overflow-hidden border border-white/5 backdrop-blur-md">
                                        <div 
                                            className="h-full transition-all duration-1000 progress-glow" 
                                            style={{ 
                                                width: `${(data.progress_ms / data.item.duration_ms) * 100}%`,
                                                backgroundColor: settings.accentColor
                                            }}
                                        ></div>
                                    </div>
                                    <div className="flex justify-between items-center px-2 font-black text-zinc-600 text-sm tracking-widest uppercase">
                                        <span>{Math.floor(data.progress_ms / 60000)}:{String(Math.floor((data.progress_ms % 60000) / 1000)).padStart(2, '0')}</span>
                                        <div className="flex items-center gap-3">
                                            <div className="w-2 h-2 rounded-full animate-pulse" style={{backgroundColor: settings.accentColor}}></div>
                                            <span className="text-[11px]">Stream aktiv</span>
                                        </div>
                                        <span>{Math.floor(data.item.duration_ms / 60000)}:{String(Math.floor((data.item.duration_ms % 60000) / 1000)).padStart(2, '0')}</span>
                                    </div>
                                </div>

                                <div className="pt-10 border-t border-white/5 flex items-center justify-between">
                                    <div className="flex items-center gap-6">
                                        <div className="w-16 h-16 glass rounded-2xl flex items-center justify-center text-zinc-500 border border-white/10 shadow-lg">
                                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><path d="M7 7h.01M17 7h.01M7 17h.01M17 17h.01"/><path d="M12 7h.01M7 12h.01M17 12h.01M12 17h.01"/></svg>
                                        </div>
                                        <div>
                                            <p className="text-xs font-black text-zinc-500 uppercase tracking-widest mb-1">Invite friends</p>
                                            <p className="text-lg font-bold text-zinc-200">Scan to join Jam</p>
                                        </div>
                                    </div>
                                    <div className="text-right">
                                         <p className="text-[10px] font-black text-zinc-700 uppercase tracking-[0.3em]">Device</p>
                                         <p className="text-xs font-bold text-zinc-500">{data.device?.name || "Spotify Connect"}</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
