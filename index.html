<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jam Dashboard - v3.4.0</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800;900&family=Unbounded:wght@400;900&family=Space+Grotesk:wght@300;700&display=swap');
        
        body { 
            background-color: #000; 
            color: #fff; 
            font-family: 'Inter', sans-serif; 
            overflow: hidden; 
            margin: 0;
        }

        .bg-dynamic {
            position: fixed;
            top: -10%; left: -10%;
            width: 120%; height: 120%;
            background: linear-gradient(45deg, #121212, #1db95422, #121212);
            filter: blur(100px);
            z-index: -1;
            transition: all 1s ease;
        }

        .vinyl-record {
            width: 400px;
            height: 400px;
            background: repeating-radial-gradient(
                circle at center,
                #111 0, #111 2px,
                #181818 2px, #181818 4px
            );
            border-radius: 50%;
            position: relative;
            box-shadow: 0 0 50px rgba(0,0,0,0.8), inset 0 0 10px rgba(255,255,255,0.05);
            animation: spin 15s linear infinite;
        }

        .vinyl-center {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 140px;
            height: 140px;
            border-radius: 50%;
            background-size: cover;
            background-position: center;
            border: 4px solid #000;
            z-index: 2;
        }

        .vinyl-hole {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 12px;
            height: 12px;
            background: #000;
            border-radius: 50%;
            z-index: 3;
            box-shadow: inset 0 0 4px rgba(255,255,255,0.2);
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .system-dock {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: rgba(10, 10, 10, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 8px 16px;
            border-radius: 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 100;
        }

        .trigger-zone {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 80px;
            z-index: 90;
        }

        .trigger-zone:hover + .system-dock, .system-dock:hover {
            transform: translateX(-50%) translateY(0);
        }

        .dock-item {
            padding: 8px 16px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.2s;
            color: rgba(255,255,255,0.4);
        }

        .dock-item:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
        }

        .dock-item.active {
            background: #fff;
            color: #000;
        }

        .queue-item {
            animation: slideIn 0.5s ease-out forwards;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        function App() {
            const [layout, setLayout] = useState('social');
            const [jamUrl, setJamUrl] = useState(window.localStorage.getItem("jam_url") || "");
            const [isLoggedIn, setIsLoggedIn] = useState(false);
            
            // Mock Data for the Queue
            const queueData = [
                { id: 1, title: "Blinding Lights", artist: "The Weeknd", duration: "3:20", addedBy: "Lukas" },
                { id: 2, title: "Starboy", artist: "The Weeknd", duration: "3:50", addedBy: "Sarah" },
                { id: 3, title: "Midnight City", artist: "M83", duration: "4:03", addedBy: "Admin" },
                { id: 4, title: "After Hours", artist: "The Weeknd", duration: "6:01", addedBy: "Lukas" }
            ];

            useEffect(() => {
                const storedUser = window.localStorage.getItem("user_logged_in");
                if (storedUser) setIsLoggedIn(true);
            }, []);

            const handleLogin = () => {
                setIsLoggedIn(true);
                window.localStorage.setItem("user_logged_in", "true");
            };

            const handleLogout = () => {
                setIsLoggedIn(false);
                window.localStorage.removeItem("user_logged_in");
            };

            const renderVinyl = () => (
                <div className="flex flex-col items-center justify-center h-full space-y-12">
                    <div className="vinyl-record">
                        <div className="vinyl-center" style={{ backgroundImage: `url('https://images.unsplash.com/photo-1614613535308-eb5fbd3d2c17?w=400')` }}></div>
                        <div className="vinyl-hole"></div>
                    </div>
                    <div className="text-center">
                        <h1 className="text-5xl font-black mb-2 tracking-tighter">NOW SPINNING</h1>
                        <p className="text-xl text-white/50 font-medium">The Weeknd — Blinding Lights</p>
                    </div>
                </div>
            );

            const renderSocial = () => (
                <div className="grid grid-cols-12 h-full p-12 gap-12 animate-in fade-in duration-700">
                    <div className="col-span-7 flex flex-col justify-center">
                        <div className="mb-8">
                            <span className="bg-white/10 px-4 py-1 rounded-full text-[10px] font-black tracking-widest text-white/60 uppercase">Live Jam Session</span>
                        </div>
                        <h1 className="text-8xl font-black mb-6 tracking-tighter leading-none italic uppercase">THE WEEKND</h1>
                        <h2 className="text-4xl font-light text-white/40 mb-12 italic">Blinding Lights</h2>
                        
                        <div className="flex items-center gap-8">
                            <img src="https://images.unsplash.com/photo-1614613535308-eb5fbd3d2c17?w=300" className="w-48 h-48 rounded-2xl shadow-2xl border border-white/10" />
                            <div>
                                <p className="text-sm text-white/30 uppercase font-black tracking-widest mb-4">Host</p>
                                <div className="flex items-center gap-4">
                                    <div className="w-12 h-12 bg-green-500 rounded-full flex items-center justify-center font-bold text-black text-xs italic">L</div>
                                    <p className="text-xl font-bold italic">Lukas' Studio</p>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div className="col-span-5 flex flex-col h-full">
                        <div className="bg-white/5 border border-white/10 rounded-[40px] p-8 h-full flex flex-col backdrop-blur-3xl shadow-2xl">
                            <div className="flex justify-between items-center mb-8">
                                <h3 className="text-2xl font-black italic uppercase tracking-tighter">Warteschlange</h3>
                                <span className="bg-white/10 px-3 py-1 rounded-full text-[10px] font-black tracking-widest">{queue.length} SONGS</span>
                            </div>
                            
                            <div className="flex-1 overflow-y-auto space-y-4 pr-2 custom-scroll">
                                {queue.map((item, index) => (
                                    <div key={item.id} className="queue-item flex items-center gap-4 p-4 rounded-2xl bg-white/5 border border-transparent hover:border-white/10 transition-all cursor-default" style={{ animationDelay: `${index * 100}ms` }}>
                                        <div className="w-10 h-10 bg-black/40 rounded-xl flex items-center justify-center font-black text-white/20">
                                            {index + 1}
                                        </div>
                                        <div className="flex-1 min-w-0">
                                            <p className="text-sm font-black truncate uppercase tracking-tight">{item.title}</p>
                                            <p className="text-[10px] text-white/30 font-bold uppercase tracking-wider">{item.artist}</p>
                                        </div>
                                        <div className="text-right">
                                            <p className="text-[9px] font-black text-green-500/60 uppercase tracking-widest">Added by</p>
                                            <p className="text-[11px] font-bold italic">{item.user}</p>
                                        </div>
                                    </div>
                                ))}
                            </div>

                            <div className="mt-8 pt-8 border-t border-white/10">
                                <div className="flex items-center gap-4 bg-white/5 p-4 rounded-2xl border border-white/5">
                                    <div className="w-16 h-16 bg-white p-1 rounded-lg flex items-center justify-center">
                                        <div className="w-full h-full bg-black rounded flex items-center justify-center text-[8px] font-black text-white/20">QR</div>
                                    </div>
                                    <div>
                                        <p className="text-xs font-black uppercase tracking-tight">Scan zum Beitreten</p>
                                        <p className="text-[10px] text-white/40">Alle können Songs hinzufügen</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                            <div className="mt-8 pt-8 border-t border-white/10">
                                <div className="flex items-center gap-4 bg-white/5 p-4 rounded-2xl">
                                    <div id="qrcode" className="p-2 bg-white rounded-lg">
                                        {/* Simplified QR Placeholder */}
                                        <div className="w-16 h-16 bg-black"></div>
                                    </div>
                                    <div>
                                        <p className="text-xs font-black mb-1">SCAN ZUM BEITRETEN</p>
                                        <p className="text-[10px] text-white/40">Alle können Songs hinzufügen</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );

            if (!isLoggedIn) {
                return (
                    <div className="h-screen flex items-center justify-center bg-zinc-950">
                        <div className="text-center p-12 bg-white/5 rounded-[40px] border border-white/10 backdrop-blur-3xl w-96">
                            <h1 className="text-3xl font-black mb-8 tracking-tighter">JAM LOGIN</h1>
                            <button onClick={handleLogin} className="w-full py-4 bg-white text-black rounded-2xl font-black uppercase tracking-widest text-xs hover:scale-95 transition-transform">
                                Verbinden
                            </button>
                        </div>
                    </div>
                );
            }

            const renderLayout = () => {
                switch(layout) {
                    case 'vinyl': return renderVinyl();
                    case 'social': return renderSocial();
                    default: return (
                        <div className="h-full flex items-center justify-center">
                            <h1 className="text-4xl font-black text-white/20 italic">{layout.toUpperCase()} MODE COMING SOON</h1>
                        </div>
                    );
                }
            };

            return (
                <div className="h-screen w-screen overflow-hidden relative">
                    <div className="bg-dynamic" style={{ opacity: layout === 'vinyl' ? 0.3 : 0.1 }}></div>
                    
                    <div className="absolute top-0 left-0 w-full h-full">
                        {renderLayout()}
                    </div>

                    <div className="trigger-zone"></div>
                    <div className="system-dock">
                        {['tv', 'split', 'vinyl', 'social', 'cinematic', 'minimal', 'massive'].map(mode => (
                            <div 
                                key={mode} 
                                className={`dock-item ${layout === mode ? 'active' : ''}`} 
                                onClick={() => setLayout(mode)}
                            >
                                {mode}
                            </div>
                        ))}
                        <div className="w-[1px] h-6 bg-white/10 mx-2"></div>
                        <input 
                            className="bg-white/5 border border-white/10 px-4 py-2 rounded-xl text-[11px] font-bold text-white outline-none w-56 focus:bg-white/10 transition-colors" 
                            placeholder="Dein Spotify Jam Link hier..." 
                            value={jamUrl} 
                            onChange={(e) => {
                                setJamUrl(e.target.value); 
                                window.localStorage.setItem("jam_url", e.target.value);
                            }} 
                        />
                        <div className="dock-item text-red-500/60 hover:!text-red-500 hover:bg-red-500/10" onClick={handleLogout}>Logout</div>
                    </div>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
