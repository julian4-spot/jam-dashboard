<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jam Dashboard - Creative Edition v3.0.0</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800;900&family=Unbounded:wght@400;900&family=Space+Grotesk:wght@300;700&display=swap');
        
        body { 
            background-color: #000; 
            color: #fff; 
            font-family: 'Inter', sans-serif; 
            overflow: hidden; 
            margin: 0;
        }

        .bg-dynamic {
            position: fixed;
            inset: 0;
            z-index: 0;
        }

        .bg-layer {
            position: absolute;
            inset: -5%;
            background-size: cover;
            background-position: center;
            filter: brightness(0.3) saturate(1.4) blur(40px);
            transition: background-image 2s ease-in-out;
        }

        .overlay-vignette {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at center, transparent 0%, rgba(0,0,0,0.8) 100%);
        }

        .app-container {
            position: relative;
            z-index: 10;
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
        }

        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .system-dock {
            position: fixed;
            bottom: -120px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(10, 10, 10, 0.95);
            backdrop-filter: blur(30px);
            padding: 1.2rem 2.5rem;
            border-radius: 2.5rem 2.5rem 0 0;
            border: 1px solid rgba(255,255,255,0.1);
            display: flex;
            gap: 0.8rem;
            z-index: 1000;
            transition: bottom 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            max-width: 90vw;
            overflow-x: auto;
        }

        .trigger-zone:hover + .system-dock, .system-dock:hover {
            bottom: 0;
        }

        .trigger-zone {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 50px;
            z-index: 999;
        }

        .dock-item {
            padding: 0.6rem 1rem;
            border-radius: 1rem;
            font-size: 0.65rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            cursor: pointer;
            transition: all 0.2s;
            color: rgba(255,255,255,0.4);
            white-space: nowrap;
        }

        .dock-item:hover { color: #fff; background: rgba(255,255,255,0.1); }
        .dock-item.active { background: #fff; color: #000; }

        .progress-bar {
            height: 100%;
            background: #fff;
            transition: width 1s linear;
        }

        .massive-text { font-family: 'Unbounded', sans-serif; }
        .lyrics-text { font-family: 'Space Grotesk', sans-serif; }

        .qr-wrapper canvas {
            width: 100% !important;
            height: auto !important;
        }

        @keyframes rotate-vinyl {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .vinyl-spin { animation: rotate-vinyl 20s linear infinite; }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .lyrics-gradient {
            mask-image: linear-gradient(to bottom, transparent, black 20%, black 80%, transparent);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const CLIENT_ID = "52f166f3b18a4aee8d2a91649a371134"; 
        const REDIRECT_URI = window.location.origin + window.location.pathname;

        // PKCE Helpers
        const generateRandomString = (length) => {
            const possible = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
            const values = crypto.getRandomValues(new Uint8Array(length));
            return values.reduce((acc, x) => acc + possible[x % possible.length], "");
        };

        const sha256 = async (plain) => {
            const encoder = new TextEncoder();
            const data = encoder.encode(plain);
            return window.crypto.subtle.digest('SHA-256', data);
        };

        const base64encode = (input) => {
            return btoa(String.fromCharCode(...new Uint8Array(input)))
                .replace(/=/g, '').replace(/\+/g, '-').replace(/\//g, '_');
        };

        function App() {
            const [token, setToken] = useState(window.localStorage.getItem("spotify_token") || "");
            const [data, setData] = useState(null);
            const [queue, setQueue] = useState([]);
            const [layout, setLayout] = useState("tv"); 
            const [jamUrl, setJamUrl] = useState(window.localStorage.getItem("jam_url") || "");
            
            const qrRef = useRef(null);

            useEffect(() => {
                const urlParams = new URLSearchParams(window.location.search);
                const code = urlParams.get('code');
                if (code) {
                    const getToken = async () => {
                        const codeVerifier = window.localStorage.getItem('code_verifier');
                        try {
                            const response = await fetch('https://accounts.spotify.com/api/token', {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                                body: new URLSearchParams({
                                    client_id: CLIENT_ID,
                                    grant_type: 'authorization_code',
                                    code: code,
                                    redirect_uri: REDIRECT_URI,
                                    code_verifier: codeVerifier,
                                }),
                            });
                            const result = await response.json();
                            if (result.access_token) {
                                setToken(result.access_token);
                                window.localStorage.setItem("spotify_token", result.access_token);
                                window.history.replaceState({}, document.title, window.location.pathname);
                            }
                        } catch (e) { console.error("Auth Error", e); }
                    };
                    getToken();
                }
            }, []);

            useEffect(() => {
                if (!token) return;
                const fetchData = async () => {
                    try {
                        const headers = { Authorization: `Bearer ${token}` };
                        const [playerRes, queueRes] = await Promise.all([
                            fetch("https://api.spotify.com/v1/me/player", { headers }),
                            fetch("https://api.spotify.com/v1/me/player/queue", { headers })
                        ]);
                        if (playerRes.status === 200) setData(await playerRes.json());
                        else if (playerRes.status === 401) handleLogout();
                        if (queueRes.status === 200) {
                            const qData = await queueRes.json();
                            setQueue(qData.queue || []);
                        }
                    } catch (e) { console.error("API Error", e); }
                };
                fetchData();
                const i = setInterval(fetchData, 3000);
                return () => clearInterval(i);
            }, [token]);

            useEffect(() => {
                if (jamUrl && qrRef.current) {
                    qrRef.current.innerHTML = "";
                    new QRCode(qrRef.current, { 
                        text: jamUrl, width: 256, height: 256,
                        colorDark : "#000000", colorLight : "#ffffff"
                    });
                }
            }, [layout, jamUrl, data]);

            const login = async () => {
                const codeVerifier = generateRandomString(64);
                const hashed = await sha256(codeVerifier);
                const codeChallenge = base64encode(hashed);
                window.localStorage.setItem('code_verifier', codeVerifier);
                const params = new URLSearchParams({
                    response_type: 'code', client_id: CLIENT_ID,
                    scope: "user-read-currently-playing user-read-playback-state",
                    code_challenge_method: 'S256', code_challenge: codeChallenge,
                    redirect_uri: REDIRECT_URI, show_dialog: true
                });
                window.location.href = `https://accounts.spotify.com/authorize?${params.toString()}`;
            };

            const handleLogout = () => {
                window.localStorage.clear();
                window.location.href = window.location.pathname;
            };

            const CommonQR = ({ size = "w-24" }) => (
                <div className={`${size} glass p-2 rounded-2xl relative qr-wrapper`}>
                    <div ref={qrRef} className="rounded-xl overflow-hidden bg-white"></div>
                </div>
            );

            const renderLayout = () => {
                if (!data?.item) return <div className="flex-grow flex items-center justify-center opacity-10 uppercase font-black tracking-[1.5em] text-sm italic">Signal verloren...</div>;
                const track = data.item;
                const progress = (data.progress_ms / track.duration_ms) * 100;

                switch(layout) {
                    case "tv":
                        return (
                            <div className="flex-grow flex flex-row p-12 gap-12 overflow-hidden">
                                <div className="flex-grow flex flex-col justify-end gap-10">
                                    <div className="flex items-end gap-8">
                                        <img src={track.album.images[0].url} className="w-24 h-24 rounded-2xl shadow-2xl" />
                                        <div className="pb-2">
                                            <h1 className="text-7xl font-black tracking-tighter uppercase leading-[0.85] mb-2">{track.name}</h1>
                                            <p className="text-3xl font-bold text-white/50">{track.artists[0].name}</p>
                                        </div>
                                    </div>
                                    <div className="w-full max-w-4xl space-y-3">
                                        <div className="h-2 bg-white/10 rounded-full overflow-hidden">
                                            <div className="progress-bar" style={{width: `${progress}%`}}></div>
                                        </div>
                                        <div className="flex justify-between text-[11px] font-black uppercase tracking-[0.4em] text-white/30">
                                            <span>{track.album.name}</span>
                                            <span>{Math.floor(data.progress_ms/60000)}:{String(Math.floor(data.progress_ms%60000/1000)).padStart(2,'0')}</span>
                                        </div>
                                    </div>
                                </div>
                                <div className="w-[400px] shrink-0 flex flex-col gap-8">
                                    <div className="glass p-8 rounded-[2.5rem] flex-grow flex flex-col overflow-hidden">
                                        <h3 className="text-[10px] font-black uppercase tracking-[0.4em] text-white/20 mb-8">Warteschlange</h3>
                                        <div className="flex-grow overflow-y-auto no-scrollbar space-y-6">
                                            {queue.slice(0, 10).map((t, i) => (
                                                <div key={i} className="flex items-center gap-5">
                                                    <img src={t.album?.images?.[2]?.url} className="w-10 h-10 rounded-lg" />
                                                    <div className="truncate"><p className="text-sm font-black uppercase truncate">{t.name}</p></div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                    <div className="glass p-8 rounded-[2.5rem] flex items-center justify-between">
                                        <div><p className="text-[10px] font-black uppercase text-white/40">Beitreten</p><p className="text-lg font-black uppercase tracking-tighter">Spotify Jam</p></div>
                                        <CommonQR size="w-20" />
                                    </div>
                                </div>
                            </div>
                        );
                    case "lyrics":
                        return (
                            <div className="flex-grow flex flex-row p-20 gap-20 overflow-hidden">
                                <div className="w-1/3 flex flex-col justify-center">
                                    <img src={track.album.images[0].url} className="w-full aspect-square rounded-[3rem] shadow-2xl mb-12" />
                                    <h1 className="text-5xl font-black uppercase tracking-tighter mb-4">{track.name}</h1>
                                    <p className="text-2xl font-bold text-white/40 uppercase">{track.artists[0].name}</p>
                                </div>
                                <div className="flex-grow lyrics-text flex flex-col justify-center lyrics-gradient">
                                    <div className="space-y-12 opacity-80">
                                        <p className="text-6xl font-bold leading-tight">Es ist ein Traum,</p>
                                        <p className="text-6xl font-bold leading-tight text-white">Den ich mit dir teile,</p>
                                        <p className="text-6xl font-bold leading-tight opacity-40">Über alle Grenzen,</p>
                                        <p className="text-6xl font-bold leading-tight opacity-20">In dieser Weile.</p>
                                    </div>
                                    <p className="mt-20 text-[10px] font-black uppercase tracking-[0.5em] text-white/20 italic">(Mockup: Liedtexte erfordern Premium Partner API)</p>
                                </div>
                            </div>
                        );
                    case "split":
                        return (
                            <div className="flex-grow grid grid-cols-2">
                                <div className="relative flex items-center justify-center border-r border-white/5 overflow-hidden">
                                    <img src={track.album.images[0].url} className="absolute inset-0 w-full h-full object-cover opacity-40 scale-110 blur-xl" />
                                    <div className="relative z-10 flex flex-col items-center">
                                        <img src={track.album.images[0].url} className="w-3/4 rounded-2xl shadow-2xl mb-10" />
                                        <div className="text-center px-10">
                                            <h1 className="text-6xl font-black italic uppercase tracking-tighter mb-2">{track.name}</h1>
                                            <p className="text-2xl font-medium text-white/60">{track.artists[0].name}</p>
                                        </div>
                                    </div>
                                </div>
                                <div className="bg-zinc-950 p-16 flex flex-col">
                                    <h2 className="text-[10px] font-black uppercase tracking-[0.5em] text-white/20 mb-12">Nächste Tracks</h2>
                                    <div className="flex-grow space-y-10 overflow-y-auto no-scrollbar">
                                        {queue.slice(0, 5).map((t, i) => (
                                            <div key={i} className="flex items-center justify-between">
                                                <div className="flex items-center gap-6">
                                                    <span className="text-2xl font-black text-white/10">{i+1}</span>
                                                    <img src={t.album?.images?.[2]?.url} className="w-14 h-14 rounded-xl" />
                                                    <div>
                                                        <p className="text-lg font-black uppercase leading-tight">{t.name}</p>
                                                        <p className="text-sm font-bold text-white/30">{t.artists[0].name}</p>
                                                    </div>
                                                </div>
                                                <div className="text-xs font-bold text-white/20 uppercase tracking-widest">3:42</div>
                                            </div>
                                        ))}
                                    </div>
                                    <div className="mt-12 pt-12 border-t border-white/5 flex items-center justify-between">
                                        <div><p className="text-sm font-black uppercase tracking-widest mb-1">Join the party</p><p className="text-[10px] text-white/30">Scan to join the Jam Session</p></div>
                                        <CommonQR size="w-16" />
                                    </div>
                                </div>
                            </div>
                        );
                    case "vinyl":
                        return (
                            <div className="flex-grow flex items-center justify-center p-20 gap-20">
                                <div className="relative w-[500px] h-[500px] shrink-0">
                                    <div className="absolute inset-4 bg-zinc-900 rounded-full shadow-[0_0_80px_rgba(0,0,0,1)] flex items-center justify-center overflow-hidden vinyl-spin">
                                        <div className="w-full h-full opacity-30 bg-[repeating-radial-gradient(circle,transparent,transparent_2px,black_3px)]"></div>
                                        <img src={track.album.images[0].url} className="absolute w-48 h-48 rounded-full border-4 border-zinc-800 z-10" />
                                    </div>
                                    <div className="absolute top-1/2 left-full w-48 h-2 bg-zinc-800 origin-left -rotate-45 ml-4 rounded-full"></div>
                                </div>
                                <div className="max-w-xl space-y-8">
                                    <div className="space-y-2">
                                        <p className="text-[10px] font-black uppercase tracking-[1em] text-[#1DB954]">Now Spinning</p>
                                        <h1 className="text-8xl font-black italic uppercase tracking-tighter leading-[0.85]">{track.name}</h1>
                                        <p className="text-4xl font-bold text-white/30 italic">{track.artists[0].name}</p>
                                    </div>
                                    <div className="flex items-center gap-10">
                                        <CommonQR size="w-32" />
                                        <div className="space-y-4 flex-grow">
                                            <p className="text-[10px] font-bold text-white/20 uppercase tracking-[0.4em]">Plattennadel bei {Math.floor(progress)}%</p>
                                            <div className="h-1 bg-white/5 rounded-full"><div className="h-full bg-white" style={{width: `${progress}%`}}></div></div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        );
                    case "social":
                        return (
                            <div className="flex-grow flex flex-col p-12 gap-8">
                                <div className="flex items-center justify-between">
                                    <div className="flex items-center gap-4">
                                        <div className="w-12 h-12 bg-white/10 rounded-full flex items-center justify-center"><img src="Logo.svg" className="w-6 h-6 opacity-60" /></div>
                                        <div><h3 className="text-lg font-black uppercase italic tracking-tighter">Jam Session</h3><p className="text-[10px] font-bold text-white/30 uppercase tracking-[0.3em]">4 Listener Online</p></div>
                                    </div>
                                    <CommonQR size="w-16" />
                                </div>
                                <div className="flex-grow grid grid-cols-3 gap-8">
                                    <div className="col-span-2 glass rounded-[3rem] p-12 flex flex-col justify-end">
                                        <img src={track.album.images[0].url} className="w-48 h-48 rounded-[2rem] shadow-2xl mb-8" />
                                        <h1 className="text-7xl font-black uppercase tracking-tighter leading-[0.9] mb-4">{track.name}</h1>
                                        <p className="text-3xl font-bold text-white/40 uppercase">{track.artists[0].name}</p>
                                        <div className="mt-12 h-3 bg-white/5 rounded-full overflow-hidden"><div className="h-full bg-[#1DB954]" style={{width: `${progress}%`}}></div></div>
                                    </div>
                                    <div className="flex flex-col gap-8">
                                        <div className="glass rounded-[3rem] p-8 flex-grow">
                                            <h4 className="text-[10px] font-black uppercase tracking-[0.3em] text-white/30 mb-8 italic">Up Next</h4>
                                            <div className="space-y-8">
                                                {queue.slice(0, 4).map((t, i) => (
                                                    <div key={i} className="flex items-center gap-4 opacity-80">
                                                        <img src={t.album?.images?.[2]?.url} className="w-12 h-12 rounded-xl" />
                                                        <div className="truncate"><p className="text-sm font-black uppercase truncate">{t.name}</p><p className="text-[10px] font-bold text-white/20 truncate">{t.artists[0].name}</p></div>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                        <div className="glass rounded-[3rem] p-8 h-32 flex items-center justify-center text-center">
                                            <p className="text-xs font-black uppercase tracking-[0.2em] text-[#1DB954]">Scan QR to add your favorites</p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        );
                    case "cinematic":
                        return (
                            <div className="flex-grow flex flex-col justify-end p-24 relative">
                                <div className="absolute inset-0 z-0"><img src={track.album.images[0].url} className="w-full h-full object-cover opacity-30 blur-2xl" /></div>
                                <div className="relative z-10 space-y-12 max-w-6xl">
                                    <div className="space-y-4">
                                        <p className="text-2xl font-bold tracking-[0.4em] text-white/40 uppercase">Playing Now</p>
                                        <h1 className="text-[10vw] font-black uppercase tracking-tighter leading-none italic">{track.name}</h1>
                                        <div className="flex items-center gap-8">
                                            <p className="text-5xl font-light text-white/60">{track.artists[0].name}</p>
                                            <span className="h-[2px] flex-grow bg-white/10"></span>
                                            <p className="text-2xl font-black text-white/20 italic">{track.album.name}</p>
                                        </div>
                                    </div>
                                    <div className="flex items-end justify-between">
                                        <div className="w-1/2 h-[1px] bg-white/20 relative"><div className="absolute top-0 left-0 h-[3px] -top-[1px] bg-white shadow-[0_0_30px_#fff]" style={{width: `${progress}%`}}></div></div>
                                        <div className="flex gap-12 items-center">
                                            <div className="text-right">
                                                <p className="text-[10px] font-black uppercase tracking-[0.5em] text-white/30 mb-2">Next up</p>
                                                <p className="text-xl font-bold uppercase italic">{queue[0]?.name || '---'}</p>
                                            </div>
                                            <CommonQR size="w-24" />
                                        </div>
                                    </div>
                                </div>
                            </div>
                        );
                    case "minimal":
                        return (
                            <div className="flex-grow flex flex-col items-center justify-center text-center p-20">
                                <div className="mb-12 relative">
                                    <div className="absolute -inset-20 bg-white/5 blur-[120px] rounded-full"></div>
                                    <img src={track.album.images[0].url} className="w-96 h-96 rounded-[3rem] shadow-[0_50px_100px_rgba(0,0,0,0.8)] relative z-10" />
                                </div>
                                <div className="space-y-4 max-w-4xl relative z-10">
                                    <h1 className="text-8xl font-black uppercase tracking-tighter leading-none italic">{track.name}</h1>
                                    <p className="text-3xl font-light text-white/40 tracking-widest uppercase">{track.artists.map(a => a.name).join(" • ")}</p>
                                    <div className="w-64 mx-auto pt-10 opacity-30"><div className="h-[2px] bg-white/20"><div className="h-full bg-white" style={{width: `${progress}%`}}></div></div></div>
                                </div>
                            </div>
                        );
                    case "massive":
                        return (
                            <div className="flex-grow flex flex-col massive-text justify-center px-20">
                                <h2 className="text-[6vw] leading-none opacity-10 uppercase mb-4">Up Next: {queue[0]?.name || '---'}</h2>
                                <h1 className="text-[14vw] leading-[0.8] font-black italic uppercase tracking-tighter mb-8">{track.name}</h1>
                                <div className="flex items-center gap-12">
                                    <p className="text-5xl text-white/40 font-light">{track.artists[0].name}</p>
                                    <div className="flex-grow h-4 bg-white/10 rounded-full overflow-hidden"><div className="h-full bg-white shadow-[0_0_20px_#fff]" style={{width: `${progress}%`}}></div></div>
                                </div>
                            </div>
                        );
                    default: return null;
                }
            };

            return (
                <div className="relative h-screen w-screen overflow-hidden bg-black select-none">
                    <div className="bg-dynamic">
                        <div className="bg-layer" style={{ backgroundImage: `url(${data?.item?.album?.images[0]?.url})` }}></div>
                        <div className="overlay-vignette"></div>
                    </div>

                    <div className="app-container">
                        <header className="p-10 flex justify-between items-start pointer-events-none">
                            <img src="Logo.svg" className="w-16 h-16 opacity-40" alt="Logo" />
                            <div className="text-right opacity-30">
                                <p className="text-3xl font-black italic tracking-tighter">{new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</p>
                                <p className="text-[10px] font-black uppercase tracking-[0.5em]">{layout} View</p>
                            </div>
                        </header>
                        {renderLayout()}
                    </div>

                    <div className="trigger-zone"></div>
                    <div className="system-dock">
                        {['tv', 'lyrics', 'split', 'vinyl', 'social', 'cinematic', 'minimal', 'massive'].map(mode => (
                            <div key={mode} className={`dock-item ${layout === mode ? 'active' : ''}`} onClick={() => setLayout(mode)}>{mode}</div>
                        ))}
                        <div className="w-[1px] h-6 bg-white/10 mx-2"></div>
                        <input className="bg-white/5 border-none px-4 py-2 rounded-xl text-[10px] font-bold text-white outline-none w-48" placeholder="Jam URL..." value={jamUrl} onChange={(e) => {setJamUrl(e.target.value); window.localStorage.setItem("jam_url", e.target.value);}} />
                        <div className="dock-item text-red-500/60 hover:!text-red-500" onClick={handleLogout}>Logout</div>
                    </div>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
