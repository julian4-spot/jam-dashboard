<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jam Canvas Dashboard - v1.2.0</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        body { 
            background-color: #020202; 
            color: white; 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            overflow: hidden; 
        }

        .glass { 
            background: rgba(255, 255, 255, 0.03); 
            backdrop-filter: blur(25px); 
            border: 1px solid rgba(255, 255, 255, 0.08); 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .album-shadow { 
            box-shadow: 0 0 100px -10px var(--glow-color); 
        }

        @keyframes pulse-bg { 
            0%, 100% { opacity: 0.4; transform: scale(1); } 
            50% { opacity: 0.6; transform: scale(1.1); } 
        }

        .animate-pulse-bg { 
            animation: pulse-bg 10s ease-in-out infinite; 
        }

        .text-huge {
            font-size: clamp(2.5rem, 8vw, 7rem);
            line-height: 0.9;
            letter-spacing: -0.04em;
        }

        .draggable-card {
            cursor: grab;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        
        .draggable-card:active {
            cursor: grabbing;
            scale: 0.98;
        }

        /* Spotify Wave Animation */
        .wave {
            display: flex;
            align-items: flex-end;
            gap: 3px;
            height: 20px;
        }
        .wave-bar {
            width: 3px;
            background: currentColor;
            border-radius: 10px;
            animation: wave-anim 1s ease-in-out infinite;
        }
        @keyframes wave-anim {
            0%, 100% { height: 5px; }
            50% { height: 20px; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const CLIENT_ID = "4a1a9ff821ca4ea2a00f9f665dab598b"; 
        const REDIRECT_URI = "https://julian4-spot.github.io/jam-dashboard/";
        const VERSION = "v1.2.0";

        function App() {
            const [token, setToken] = useState(window.localStorage.getItem("spotify_access_token") || "");
            const [data, setData] = useState(null);
            const [jamLink, setJamLink] = useState(window.localStorage.getItem("jam_link") || "");
            const [isJamConnected, setIsJamConnected] = useState(!!window.localStorage.getItem("jam_link"));
            const [showSettings, setShowSettings] = useState(false);
            
            const [settings, setSettings] = useState({
                glowIntensity: 0.7,
                accentColor: "#1DB954",
            });

            // Login Logik (vereinfacht für das Dashboard)
            const login = () => {
                const SCOPES = "user-read-currently-playing user-read-playback-state";
                window.location.href = `https://accounts.spotify.com/authorize?client_id=${CLIENT_ID}&response_type=token&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&scope=${encodeURIComponent(SCOPES)}`;
            };

            useEffect(() => {
                const hash = window.location.hash;
                if (hash) {
                    const t = hash.substring(1).split("&").find(e => e.startsWith("access_token")).split("=")[1];
                    setToken(t);
                    window.localStorage.setItem("spotify_access_token", t);
                    window.history.replaceState({}, document.title, window.location.pathname);
                }
            }, []);

            useEffect(() => {
                if (!token) return;
                const fetchData = async () => {
                    try {
                        const response = await fetch("https://api.spotify.com/v1/me/player/currently-playing", {
                            headers: { Authorization: `Bearer ${token}` }
                        });
                        if (response.status === 200) {
                            const resData = await response.json();
                            setData(resData);
                        }
                    } catch (e) { console.error(e); }
                };
                fetchData();
                const interval = setInterval(fetchData, 3000);
                return () => clearInterval(interval);
            }, [token]);

            const handleJamConnect = (e) => {
                e.preventDefault();
                if(jamLink.includes("spotify.link") || jamLink.includes("spotify.com")) {
                    setIsJamConnected(true);
                    window.localStorage.setItem("jam_link", jamLink);
                }
            };

            const logout = () => {
                window.localStorage.clear();
                window.location.reload();
            };

            if (!token) {
                return (
                    <div className="h-screen flex items-center justify-center bg-black">
                        <div className="glass p-16 rounded-[4rem] text-center max-w-lg animate-in fade-in zoom-in duration-700">
                            <h1 className="text-5xl font-black italic tracking-tighter mb-8">JAM CANVAS</h1>
                            <p className="text-zinc-500 mb-12 uppercase tracking-widest text-xs">Bereit für den TV-Mode?</p>
                            <button onClick={login} className="w-full py-6 bg-white text-black rounded-3xl font-black text-xl hover:scale-105 transition-transform">
                                SPOTIFY CONNECT
                            </button>
                        </div>
                    </div>
                );
            }

            if (!isJamConnected) {
                return (
                    <div className="h-screen flex items-center justify-center bg-black p-6">
                        <div className="glass p-12 rounded-[3.5rem] w-full max-w-2xl animate-in slide-in-from-bottom-10 duration-700">
                            <h2 className="text-3xl font-black italic mb-2">JAM SESSION STARTEN</h2>
                            <p className="text-zinc-500 mb-10 text-sm uppercase tracking-widest">Kopiere den Jam-Link von deinem Handy hier rein</p>
                            
                            <form onSubmit={handleJamConnect} className="space-y-6">
                                <input 
                                    type="text" 
                                    placeholder="https://spotify.link/..." 
                                    value={jamLink}
                                    onChange={(e) => setJamLink(e.target.value)}
                                    className="w-full bg-white/5 border border-white/10 p-6 rounded-2xl text-white outline-none focus:border-green-500 transition-colors"
                                />
                                <button className="w-full py-6 bg-green-500 text-black rounded-2xl font-black text-lg hover:shadow-[0_0_30px_rgba(34,197,94,0.4)] transition-all">
                                    DASHBOARD AKTIVIEREN
                                </button>
                            </form>
                        </div>
                    </div>
                );
            }

            return (
                <div className="h-screen w-full relative overflow-hidden flex items-center justify-center p-12">
                    {/* Dynamischer Hintergrund */}
                    <div 
                        className="absolute inset-0 animate-pulse-bg transition-colors duration-[3000ms]"
                        style={{ 
                            background: `radial-gradient(circle at 50% 50%, ${settings.accentColor}${Math.floor(settings.glowIntensity * 255).toString(16).padStart(2, '0')} 0%, transparent 80%)` 
                        }}
                    ></div>

                    {/* Dashboard Grid */}
                    <div className="grid grid-cols-12 gap-8 w-full max-w-[110rem] h-full items-center relative z-10">
                        
                        {/* Cover Card (Draggable Style) */}
                        <div className="col-span-12 lg:col-span-5 flex justify-center">
                            <div className="relative group draggable-card">
                                <div className="absolute -inset-10 blur-[80px] opacity-30 group-hover:opacity-50 transition-opacity" style={{backgroundColor: settings.accentColor}}></div>
                                {data?.item?.album?.images[0] ? (
                                    <img 
                                        src={data.item.album.images[0].url} 
                                        className="w-[30rem] h-[30rem] xl:w-[38rem] xl:h-[38rem] rounded-[4rem] object-cover border border-white/10 album-shadow relative z-10"
                                        style={{'--glow-color': settings.accentColor}}
                                    />
                                ) : (
                                    <div className="w-[30rem] h-[30rem] glass rounded-[4rem] flex items-center justify-center">
                                        <div className="animate-pulse text-zinc-700 font-black">Warte auf Track...</div>
                                    </div>
                                )}
                            </div>
                        </div>

                        {/* Info Section */}
                        <div className="col-span-12 lg:col-span-7 space-y-12">
                            <div className="space-y-6">
                                <div className="flex items-center gap-4">
                                    <div className="px-4 py-1.5 bg-green-500 text-black text-[10px] font-black rounded-full uppercase tracking-widest">Live Jam</div>
                                    <div className="wave text-green-500">
                                        {[1,2,3,4].map(i => <div key={i} className="wave-bar" style={{animationDelay: `${i*0.2}s`}}></div>)}
                                    </div>
                                </div>
                                
                                <div className="space-y-2">
                                    <h1 className="text-huge font-black italic uppercase tracking-tighter truncate max-w-full">
                                        {data?.item?.name || "Ready to Jam"}
                                    </h1>
                                    <p className="text-3xl xl:text-5xl font-bold text-zinc-500 truncate">
                                        {data?.item?.artists?.map(a => a.name).join(", ") || "Verbinde dich..."}
                                    </p>
                                </div>
                            </div>

                            {/* Progress */}
                            {data && (
                                <div className="space-y-6">
                                    <div className="h-4 w-full bg-white/5 rounded-full overflow-hidden border border-white/5 relative">
                                        <div 
                                            className="h-full transition-all duration-1000 relative"
                                            style={{ 
                                                width: `${(data.progress_ms / data.item.duration_ms) * 100}%`,
                                                backgroundColor: settings.accentColor,
                                                boxShadow: `0 0 30px ${settings.accentColor}`
                                            }}
                                        ></div>
                                    </div>
                                    <div className="flex justify-between font-black text-zinc-600 text-sm tracking-widest uppercase">
                                        <span>{Math.floor(data.progress_ms/60000)}:{String(Math.floor((data.progress_ms%60000)/1000)).padStart(2, '0')}</span>
                                        <span className="opacity-40">{data.item.album.name}</span>
                                        <span>{Math.floor(data.item.duration_ms/60000)}:{String(Math.floor((data.item.duration_ms%60000)/1000)).padStart(2, '0')}</span>
                                    </div>
                                </div>
                            )}

                            {/* Stats Grid */}
                            <div className="grid grid-cols-3 gap-6">
                                <div className="glass p-8 rounded-[2.5rem] draggable-card">
                                    <p className="text-[10px] font-black text-zinc-500 uppercase tracking-widest mb-2">Device</p>
                                    <p className="text-lg font-bold truncate">{data?.device?.name || "TV Receiver"}</p>
                                </div>
                                <div className="glass p-8 rounded-[2.5rem] draggable-card">
                                    <p className="text-[10px] font-black text-zinc-500 uppercase tracking-widest mb-2">Volume</p>
                                    <p className="text-lg font-bold">{data?.device?.volume_percent || "80"}%</p>
                                </div>
                                <div className="glass p-8 rounded-[2.5rem] draggable-card group overflow-hidden relative">
                                    <div className="absolute inset-0 bg-white/5 translate-y-full group-hover:translate-y-0 transition-transform cursor-pointer flex items-center justify-center font-black text-xs uppercase" onClick={() => setIsJamConnected(false)}>Change</div>
                                    <p className="text-[10px] font-black text-zinc-500 uppercase tracking-widest mb-2">Jam Code</p>
                                    <p className="text-lg font-bold">ACTIVE</p>
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* Control HUD (Bottom) */}
                    <div className="absolute bottom-10 left-1/2 -translate-x-1/2 z-50 flex gap-4">
                         <div className="glass px-8 py-4 rounded-full flex items-center gap-6 border border-white/10">
                            <button className="opacity-40 hover:opacity-100 transition-opacity"><svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6L18 6v12z"/></svg></button>
                            <button className="w-12 h-12 bg-white text-black rounded-full flex items-center justify-center hover:scale-110 transition-transform"><svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg></button>
                            <button className="opacity-40 hover:opacity-100 transition-opacity"><svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M16 6h2v12h-2zm-10.5 6L14 18V6z" transform="rotate(180 12 12)"/></svg></button>
                         </div>
                         <button onClick={() => setShowSettings(!showSettings)} className="w-16 h-16 glass rounded-full flex items-center justify-center hover:rotate-90 transition-all">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
                         </button>
                    </div>

                    {/* Settings Sidebar */}
                    {showSettings && (
                        <div className="absolute right-10 top-1/2 -translate-y-1/2 w-80 glass rounded-[3rem] p-10 z-[100] animate-in slide-in-from-right-10 duration-500">
                             <h3 className="text-xl font-black mb-8 italic uppercase tracking-tighter">Vibe Settings</h3>
                             <div className="space-y-10">
                                <div className="space-y-4">
                                    <label className="text-[10px] font-black text-zinc-500 uppercase tracking-widest flex justify-between">Glow <span>{Math.round(settings.glowIntensity * 100)}%</span></label>
                                    <input type="range" min="0" max="1" step="0.1" value={settings.glowIntensity} onChange={(e) => setSettings({...settings, glowIntensity: parseFloat(e.target.value)})} className="w-full accent-white" />
                                </div>
                                <div className="space-y-4">
                                    <label className="text-[10px] font-black text-zinc-500 uppercase tracking-widest">Color Theme</label>
                                    <div className="grid grid-cols-4 gap-3">
                                        {["#1DB954", "#3b82f6", "#a855f7", "#ec4899", "#ef4444", "#f59e0b", "#06b6d4", "#ffffff"].map(c => (
                                            <button key={c} onClick={() => setSettings({...settings, accentColor: c})} className={`w-10 h-10 rounded-full border-2 transition-all ${settings.accentColor === c ? 'border-white scale-110' : 'border-transparent'}`} style={{backgroundColor: c}}></button>
                                        ))}
                                    </div>
                                </div>
                                <button onClick={logout} className="w-full py-4 bg-red-500/10 text-red-500 rounded-2xl font-black text-xs uppercase tracking-widest">Logout System</button>
                             </div>
                        </div>
                    )}

                    <div className="absolute top-10 left-10 text-[10px] font-black opacity-20 tracking-[0.5em] uppercase">Jam Canvas Build {VERSION}</div>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
