<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jam Dashboard - v2.4.0</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com-react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800;900&family=Space+Mono:wght@400;700&family=Unbounded:wght@900&display=swap');
        
        body { 
            background-color: #000; 
            color: #fff; 
            font-family: 'Inter', sans-serif; 
            overflow: hidden; 
            margin: 0;
        }

        .bg-dynamic {
            position: fixed;
            inset: 0;
            z-index: 0;
        }

        .bg-layer {
            position: absolute;
            inset: -10%;
            background-size: cover;
            background-position: center;
            filter: blur(80px) brightness(0.3) saturate(1.2);
            transition: background-image 2s ease-in-out;
        }

        .overlay-vignette {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at center, transparent 0%, rgba(0,0,0,0.95) 100%);
        }

        .app-container {
            position: relative;
            z-index: 10;
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            padding: 2.5rem;
        }

        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .progress-container {
            height: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background: #fff;
            transition: width 1s linear;
            box-shadow: 0 0 15px #fff;
        }

        .dock {
            position: fixed;
            bottom: 1.5rem;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(20px);
            padding: 0.4rem;
            border-radius: 1.2rem;
            border: 1px solid rgba(255,255,255,0.1);
            display: flex;
            gap: 0.3rem;
            z-index: 100;
        }

        .dock-item {
            padding: 0.4rem 0.7rem;
            border-radius: 0.8rem;
            font-size: 0.6rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            cursor: pointer;
            transition: all 0.2s;
            color: rgba(255,255,255,0.3);
            white-space: nowrap;
        }

        .dock-item.active {
            background: #fff;
            color: #000;
        }

        @keyframes rotate-slow {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .animate-vinyl {
            animation: rotate-slow 12s linear infinite;
        }

        #qrcode canvas {
            width: 100% !important;
            height: auto !important;
        }

        .cyber-text {
            font-family: 'Space Mono', monospace;
        }

        .massive-text {
            font-family: 'Unbounded', sans-serif;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const CLIENT_ID = "4a1a9ff821ca4ea2a00f9f665dab598b"; 
        const REDIRECT_URI = window.location.origin + window.location.pathname;

        function App() {
            const [token, setToken] = useState(window.localStorage.getItem("spotify_token") || "");
            const [data, setData] = useState(null);
            const [queue, setQueue] = useState([]);
            const [layout, setLayout] = useState("dashboard"); 
            const [jamUrl, setJamUrl] = useState(window.localStorage.getItem("jam_url") || "");
            
            const qrRef = useRef(null);

            useEffect(() => {
                const hash = window.location.hash;
                if (hash) {
                    const params = new URLSearchParams(hash.substring(1));
                    const accessToken = params.get("access_token");
                    if (accessToken) {
                        setToken(accessToken);
                        window.localStorage.setItem("spotify_token", accessToken);
                        window.history.replaceState({}, document.title, window.location.pathname);
                    }
                }
            }, []);

            useEffect(() => {
                if (!token) return;
                const fetchData = async () => {
                    try {
                        const pRes = await fetch("https://api.spotify.com/v1/me/player", { headers: { Authorization: `Bearer ${token}` } });
                        if (pRes.status === 200) setData(await pRes.json());
                        
                        const qRes = await fetch("https://api.spotify.com/v1/me/player/queue", { headers: { Authorization: `Bearer ${token}` } });
                        if (qRes.status === 200) {
                            const qData = await qRes.json();
                            setQueue(qData.queue.slice(0, 10));
                        }
                    } catch (e) { console.error(e); }
                };
                fetchData();
                const i = setInterval(fetchData, 3000);
                return () => clearInterval(i);
            }, [token]);

            useEffect(() => {
                if (jamUrl && qrRef.current) {
                    qrRef.current.innerHTML = "";
                    new QRCode(qrRef.current, { 
                        text: jamUrl, 
                        width: 256, 
                        height: 256,
                        colorDark : "#000000",
                        colorLight : "#ffffff",
                        correctLevel : QRCode.CorrectLevel.H
                    });
                }
            }, [layout, jamUrl, data]);

            if (!token) return (
                <div className="h-screen w-screen flex items-center justify-center bg-black">
                    <button className="bg-white text-black px-10 py-4 rounded-full font-black uppercase tracking-widest hover:scale-105 transition-transform" onClick={() => {
                        const scopes = "user-read-currently-playing user-read-playback-state";
                        window.location.href = `https://accounts.spotify.com/authorize?client_id=${CLIENT_ID}&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&response_type=token&scope=${encodeURIComponent(scopes)}`;
                    }}>Connect Spotify</button>
                </div>
            );

            const renderLayout = () => {
                if (!data?.item) return <div className="flex-grow flex items-center justify-center opacity-20 uppercase font-black tracking-[1em] text-xs animate-pulse">Waiting for Signal...</div>;
                const track = data.item;
                const progress = (data.progress_ms / track.duration_ms) * 100;

                const CommonQR = ({ className = "w-32" }) => (
                    <div className={`${className} glass p-2 rounded-xl group relative overflow-hidden`}>
                        <div id="qrcode" ref={qrRef} className="rounded-lg overflow-hidden bg-white"></div>
                        {!jamUrl && <div className="absolute inset-0 flex items-center justify-center bg-black/80 text-[8px] font-bold text-center px-2">Link in Einstellungen einfügen</div>}
                    </div>
                );

                switch(layout) {
                    case "dashboard": // Neuer Standard Modus: Alles dabei
                        return (
                            <div className="flex-grow grid grid-cols-12 gap-8 py-6">
                                <div className="col-span-8 flex flex-col justify-center">
                                    <div className="flex items-center gap-12">
                                        <div className="relative shrink-0">
                                            <img src={track.album.images[0].url} className="w-80 h-80 rounded-3xl shadow-2xl relative z-10" />
                                            <div className="absolute -inset-4 bg-white/5 blur-2xl rounded-full"></div>
                                        </div>
                                        <div className="space-y-6">
                                            <div className="space-y-1">
                                                <h1 className="text-6xl font-black italic uppercase leading-none tracking-tighter">{track.name}</h1>
                                                <p className="text-2xl font-bold text-white/40">{track.artists.map(a => a.name).join(", ")}</p>
                                            </div>
                                            <div className="w-full max-w-md space-y-2">
                                                <div className="progress-container"><div className="progress-bar" style={{width: `${progress}%`}}></div></div>
                                                <div className="flex justify-between text-[10px] font-black text-white/20 uppercase tracking-widest">
                                                    <span>Live</span>
                                                    <span>Jam Session Active</span>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                <div className="col-span-4 flex flex-col gap-6 justify-center">
                                    <div className="glass p-6 rounded-3xl space-y-4">
                                        <h3 className="text-[10px] font-black uppercase tracking-[0.3em] text-white/30 text-center">Join the Jam</h3>
                                        <div className="bg-white p-3 rounded-2xl w-48 mx-auto" id="qrcode" ref={qrRef}></div>
                                    </div>
                                    <div className="glass p-6 rounded-3xl flex-grow overflow-hidden max-h-[300px]">
                                        <h3 className="text-[10px] font-black uppercase tracking-[0.3em] text-white/30 mb-4">Up Next</h3>
                                        <div className="space-y-3">
                                            {queue.slice(0, 4).map((t, i) => (
                                                <div key={i} className="flex items-center gap-3 opacity-60">
                                                    <img src={t.album.images[2].url} className="w-10 h-10 rounded-lg" />
                                                    <div className="truncate">
                                                        <p className="text-[10px] font-black uppercase truncate">{t.name}</p>
                                                        <p className="text-[8px] font-bold text-white/40 truncate">{t.artists[0].name}</p>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        );
                    case "classic":
                        return (
                            <div className="flex-grow flex items-center gap-16">
                                <img src={track.album.images[0].url} className="w-[450px] h-[450px] rounded-3xl shadow-2xl" />
                                <div className="space-y-6">
                                    <h1 className="text-6xl font-black italic uppercase leading-none tracking-tighter">{track.name}</h1>
                                    <p className="text-2xl font-bold text-white/50">{track.artists.map(a => a.name).join(", ")}</p>
                                    <div className="w-80 progress-container"><div className="progress-bar" style={{width: `${progress}%`}}></div></div>
                                    <CommonQR />
                                </div>
                            </div>
                        );
                    case "vinyl":
                        return (
                            <div className="flex-grow flex flex-col items-center justify-center gap-8 text-center">
                                <div className="relative group">
                                    <div className="absolute inset-0 bg-black rounded-full animate-vinyl opacity-90 border-4 border-white/5">
                                        <div className="absolute inset-0 opacity-10" style={{background: 'repeating-radial-gradient(circle, #000 0, #000 2px, #fff 3px)'}}></div>
                                    </div>
                                    <img src={track.album.images[0].url} className="w-72 h-72 rounded-full relative z-10 border-4 border-black" />
                                    <div className="absolute -right-20 bottom-0"><CommonQR className="w-24" /></div>
                                </div>
                                <div className="space-y-2">
                                    <h1 className="text-4xl font-black uppercase">{track.name}</h1>
                                    <p className="text-xl text-white/40">{track.artists[0].name}</p>
                                </div>
                            </div>
                        );
                    case "cyber":
                        return (
                            <div className="flex-grow flex flex-col justify-end p-6 gap-4 cyber-text">
                                <div className="flex justify-between items-start">
                                    <div className="flex gap-4">
                                        <div className="px-3 py-1 bg-white text-black font-bold text-[10px]">NOW_PLAYING</div>
                                        <div className="px-3 py-1 border border-white/20 text-white/50 font-bold text-[10px]">SRC:JAM_01</div>
                                    </div>
                                    <CommonQR className="w-20 invert" />
                                </div>
                                <h1 className="text-[10vw] font-bold leading-[0.8] tracking-tighter uppercase">{track.name}</h1>
                                <p className="text-3xl text-white/40 uppercase font-bold">{track.artists[0].name}</p>
                                <div className="flex gap-1 w-full mt-4">
                                    {[...Array(60)].map((_, i) => (
                                        <div key={i} className={`h-1 flex-grow ${i < progress * 0.6 ? 'bg-white shadow-[0_0_10px_#fff]' : 'bg-white/10'}`}></div>
                                    ))}
                                </div>
                            </div>
                        );
                    case "split":
                        return (
                            <div className="flex-grow grid grid-cols-2 h-full py-6">
                                <div className="flex flex-col items-center justify-center gap-6">
                                    <img src={track.album.images[0].url} className="w-[85%] aspect-square object-cover rounded-xl shadow-2xl" />
                                    <CommonQR className="w-40" />
                                </div>
                                <div className="flex flex-col justify-center gap-12 px-10">
                                    <div className="space-y-6">
                                        <span className="text-xs font-black text-white/20 uppercase tracking-[0.4em]">Next in Jam</span>
                                        <div className="space-y-6">
                                            {queue.slice(0, 4).map((t, i) => (
                                                <div key={i} className="flex items-center gap-4">
                                                    <span className="text-xs font-black text-white/30">0{i+1}</span>
                                                    <div className="truncate">
                                                        <p className="font-black truncate text-sm uppercase">{t.name}</p>
                                                        <p className="text-[10px] text-white/40 font-bold">{t.artists[0].name}</p>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                    <div className="space-y-2 pt-6 border-t border-white/10">
                                        <h1 className="text-5xl font-black italic uppercase leading-none">{track.name}</h1>
                                        <p className="text-xl font-bold text-white/40">{track.artists[0].name}</p>
                                    </div>
                                </div>
                            </div>
                        );
                    case "minimal":
                        return (
                            <div className="flex-grow flex flex-col items-center justify-center text-center p-20 relative">
                                <h1 className="text-[15vw] font-black tracking-tighter leading-none opacity-5 blur-[4px] absolute inset-0 flex items-center justify-center select-none uppercase">{track.name}</h1>
                                <div className="relative z-10 space-y-4">
                                    <p className="text-[10px] font-black uppercase tracking-[1em] opacity-30">Current Playback</p>
                                    <h2 className="text-7xl font-light tracking-tight">{track.name}</h2>
                                    <p className="text-2xl text-white/30 font-bold uppercase tracking-widest">{track.artists[0].name}</p>
                                </div>
                            </div>
                        );
                    case "studio":
                        return (
                            <div className="flex-grow flex flex-col py-6 gap-6">
                                <div className="flex-grow glass rounded-[3rem] p-12 flex items-center gap-12">
                                    <img src={track.album.images[0].url} className="w-96 h-96 rounded-2xl shadow-2xl" />
                                    <div className="flex-grow space-y-8">
                                        <div className="space-y-2">
                                            <div className="flex justify-between items-end">
                                                <h1 className="text-7xl font-black italic uppercase tracking-tighter">{track.name}</h1>
                                                <CommonQR className="w-24" />
                                            </div>
                                            <p className="text-3xl font-bold text-white/30">{track.artists[0].name}</p>
                                        </div>
                                        <div className="space-y-4">
                                            <div className="h-2 w-full bg-white/10 rounded-full overflow-hidden">
                                                <div className="h-full bg-white shadow-[0_0_20px_#fff]" style={{width: `${progress}%`}}></div>
                                            </div>
                                            <div className="flex justify-between text-[10px] font-black tracking-[0.3em] text-white/20">
                                                <span>PLAYING FROM JAM</span>
                                                <span>{Math.floor(data.progress_ms/1000/60)}:{(Math.floor(data.progress_ms/1000%60)).toString().padStart(2,'0')} / {Math.floor(track.duration_ms/1000/60)}:{(Math.floor(track.duration_ms/1000%60)).toString().padStart(2,'0')}</span>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                <div className="h-32 glass rounded-full px-12 flex items-center gap-8 overflow-hidden">
                                    <span className="text-[10px] font-black uppercase text-white/20 shrink-0">Queue</span>
                                    {queue.slice(0, 6).map((t, i) => (
                                        <div key={i} className="flex items-center gap-3 shrink-0 opacity-40">
                                            <img src={t.album.images[2].url} className="w-10 h-10 rounded-lg" />
                                            <p className="text-[10px] font-black uppercase truncate max-w-[100px]">{t.name}</p>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        );
                    case "massive": // Neuer Modus: Maximale Typografie
                        return (
                            <div className="flex-grow flex flex-col justify-between py-10 massive-text">
                                <div className="flex justify-between items-start">
                                    <h2 className="text-[8vw] leading-[0.8] tracking-tighter italic uppercase text-white/10 select-none">NEXT: {queue[0]?.name || '---'}</h2>
                                    <CommonQR className="w-32 invert" />
                                </div>
                                <div className="space-y-4">
                                    <h1 className="text-[12vw] leading-[0.75] tracking-tighter uppercase italic">{track.name}</h1>
                                    <div className="flex items-center gap-8">
                                        <p className="text-4xl text-white/30 uppercase italic">{track.artists[0].name}</p>
                                        <div className="flex-grow h-4 bg-white/5 rounded-full overflow-hidden">
                                            <div className="h-full bg-white" style={{width: `${progress}%`}}></div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        );
                    case "poster":
                        return (
                            <div className="flex-grow flex items-stretch py-6">
                                <div className="w-1/3 glass rounded-[2.5rem] p-10 flex flex-col justify-between">
                                    <div className="space-y-6">
                                        <div className="w-12 h-1 bg-white"></div>
                                        <h1 className="text-5xl font-black uppercase leading-tight italic tracking-tighter">{track.name}</h1>
                                        <p className="text-xl text-white/40 font-bold">{track.artists[0].name}</p>
                                    </div>
                                    <div className="space-y-6">
                                        <div className="bg-white p-4 rounded-3xl" id="qrcode" ref={qrRef}></div>
                                        <p className="text-[10px] font-black text-center text-white/20 uppercase tracking-widest">Scan to join the Jam</p>
                                    </div>
                                </div>
                                <div className="flex-grow ml-8 relative">
                                    <img src={track.album.images[0].url} className="w-full h-full object-cover rounded-[2.5rem] shadow-2xl" />
                                    <div className="absolute bottom-10 left-10 right-10">
                                        <div className="h-1 w-full bg-white/20 backdrop-blur-md rounded-full overflow-hidden">
                                            <div className="h-full bg-white shadow-[0_0_15px_#fff]" style={{width: `${progress}%`}}></div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        );
                    case "focus":
                        return (
                            <div className="flex-grow flex items-center justify-center">
                                <div className="text-center space-y-12">
                                    <div className="relative group">
                                        <img src={track.album.images[0].url} className="w-96 h-96 mx-auto rounded-full shadow-[0_0_100px_rgba(255,255,255,0.05)] border-8 border-white/5 relative z-10 transition-transform duration-700 group-hover:scale-105" />
                                        <div className="absolute -inset-10 bg-white/5 blur-3xl rounded-full animate-pulse"></div>
                                    </div>
                                    <div className="space-y-4 relative z-10">
                                        <h1 className="text-8xl font-black tracking-tighter uppercase italic leading-none">{track.name}</h1>
                                        <p className="text-3xl text-white/20 font-black uppercase tracking-[0.3em]">{track.artists[0].name}</p>
                                        <div className="pt-8 flex justify-center"><CommonQR className="w-20 opacity-40 hover:opacity-100 transition-opacity" /></div>
                                    </div>
                                </div>
                            </div>
                        );
                }
            };

            return (
                <div className="relative h-screen w-screen overflow-hidden bg-black">
                    <div className="bg-dynamic">
                        <div className="bg-layer" style={{ backgroundImage: `url(${data?.item?.album?.images[0]?.url})` }}></div>
                        <div className="overlay-vignette"></div>
                    </div>

                    <div className="app-container">
                        <header className="flex justify-between items-center shrink-0 mb-4">
                            <div className="flex items-center gap-4">
                                <div className="w-10 h-10 rounded-xl bg-white flex items-center justify-center text-black font-black text-sm shadow-xl">J</div>
                                <div>
                                    <h2 className="text-[10px] font-black uppercase tracking-[0.5em] text-white">Jam Dashboard</h2>
                                    <p className="text-[8px] font-bold uppercase text-white/30 tracking-widest">Build v2.4.0 • Session Live</p>
                                </div>
                            </div>
                            
                            <div className="glass px-6 py-2 rounded-2xl flex items-center gap-8">
                                <div className="text-center">
                                    <p className="text-[8px] font-black text-white/30 uppercase">Jam Link</p>
                                    <input 
                                        className="bg-transparent border-none text-[10px] font-black text-white/60 outline-none w-32 focus:text-white transition-colors"
                                        placeholder="LINK HIER EINFÜGEN"
                                        value={jamUrl}
                                        onChange={(e) => {
                                            setJamUrl(e.target.value);
                                            window.localStorage.setItem("jam_url", e.target.value);
                                        }}
                                    />
                                </div>
                                <div className="w-[1px] h-6 bg-white/10"></div>
                                <div className="text-right">
                                    <p className="text-xl font-black italic tracking-tighter">{new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</p>
                                </div>
                            </div>
                        </header>

                        {renderLayout()}
                    </div>

                    <div className="dock">
                        {['dashboard', 'classic', 'vinyl', 'cyber', 'split', 'poster', 'minimal', 'studio', 'massive', 'focus'].map(mode => (
                            <div 
                                key={mode} 
                                className={`dock-item ${layout === mode ? 'active' : ''}`}
                                onClick={() => setLayout(mode)}
                            >
                                {mode}
                            </div>
                        ))}
                        <div className="w-[1px] h-4 bg-white/10 self-center mx-2"></div>
                        <div className="dock-item hover:text-red-500 font-black" onClick={() => {window.localStorage.clear(); window.location.reload();}}>Logout</div>
                    </div>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
