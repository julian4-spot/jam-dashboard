<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jam Dashboard - v4.5</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800;900&family=Unbounded:wght@400;900&family=Space+Grotesk:wght@300;700&display=swap');
        
        body { 
            background-color: #000; 
            color: #fff; 
            font-family: 'Inter', sans-serif; 
            overflow: hidden; 
            margin: 0;
        }

        .bg-dynamic {
            position: fixed;
            inset: 0;
            z-index: 0;
        }

        .bg-layer {
            position: absolute;
            inset: -5%;
            background-size: cover;
            background-position: center;
            filter: brightness(0.2) saturate(1.2) blur(60px);
            transition: background-image 2s ease-in-out;
        }

        .overlay-vignette {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at center, transparent 0%, rgba(0,0,0,0.95) 100%);
        }

        .app-container {
            position: relative;
            z-index: 10;
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
        }

        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        /* Das Dock */
        .system-dock {
            position: fixed;
            bottom: -220px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(10, 10, 10, 0.98);
            backdrop-filter: blur(40px);
            padding: 1.5rem 2.5rem;
            border-radius: 2.5rem 2.5rem 0 0;
            border: 1px solid rgba(255,255,255,0.1);
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
            z-index: 1000;
            transition: bottom 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            width: fit-content;
            max-width: 95vw;
        }

        .trigger-zone:hover + .system-dock, .system-dock:hover {
            bottom: 0;
        }

        .trigger-zone {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 60px;
            z-index: 999;
        }

        .dock-item {
            padding: 0.6rem 1rem;
            border-radius: 1rem;
            font-size: 0.65rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            cursor: pointer;
            transition: all 0.2s;
            color: rgba(255,255,255,0.4);
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .dock-item:hover { color: #fff; background: rgba(255,255,255,0.1); }
        .dock-item.active { background: #fff; color: #000; }

        .control-btn {
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background: rgba(255,255,255,0.05);
            transition: all 0.2s;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .control-btn:hover { background: rgba(255,255,255,0.15); scale: 1.1; border-color: white; }
        .control-btn:active { scale: 0.95; }

        .progress-bar {
            height: 100%;
            background: #fff;
            transition: width 1s linear;
        }

        .qr-wrapper canvas, .qr-wrapper img {
            width: 100% !important;
            height: auto !important;
            display: block;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        select {
            appearance: none;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            padding: 0.6rem 2.5rem 0.6rem 1rem;
            border-radius: 1rem;
            font-size: 0.75rem;
            font-weight: 700;
            cursor: pointer;
            outline: none;
            transition: all 0.2s;
        }
        
        select:hover { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.3); }

        .floating-controls {
            display: flex;
            gap: 1rem;
            padding: 1rem;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(20px);
            border-radius: 2rem;
            border: 1px solid rgba(255,255,255,0.1);
            margin-top: 2rem;
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const CLIENT_ID = "52f166f3b18a4aee8d2a91649a371134"; 
        const REDIRECT_URI = window.location.origin + window.location.pathname;

        // PKCE Auth Helpers
        const generateRandomString = (length) => {
            const possible = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
            const values = crypto.getRandomValues(new Uint8Array(length));
            return values.reduce((acc, x) => acc + possible[x % possible.length], "");
        };

        const sha256 = async (plain) => {
            const encoder = new TextEncoder();
            const data = encoder.encode(plain);
            return window.crypto.subtle.digest('SHA-256', data);
        };

        const base64encode = (input) => {
            return btoa(String.fromCharCode(...new Uint8Array(input)))
                .replace(/=/g, '').replace(/\+/g, '-').replace(/\//g, '_');
        };

        // QR Code Component - Großer & Scanbarer
        const CommonQR = ({ size = "w-32", url }) => {
            const localRef = useRef(null);
            useEffect(() => {
                if (localRef.current) {
                    localRef.current.innerHTML = "";
                    try {
                        new QRCode(localRef.current, {
                            text: url || "https://spotify.com", 
                            width: 512, height: 512,
                            colorDark: "#000000", colorLight: "#ffffff",
                            correctLevel : QRCode.CorrectLevel.M
                        });
                    } catch (e) { console.error(e); }
                }
            }, [url]);

            return (
                <div className={`${size} bg-black/40 backdrop-blur-3xl p-4 rounded-3xl relative qr-wrapper flex-shrink-0 border border-white/20 shadow-2xl`}>
                    <div className="bg-white p-3 rounded-xl w-full aspect-square flex items-center justify-center overflow-hidden">
                        <div ref={localRef} className="w-full h-full scale-[1.02]"></div>
                    </div>
                </div>
            );
        };

        // UI Controls Component (Play/Pause/Skip)
        const InlineControls = ({ isPlaying, onAction }) => (
            <div className="floating-controls">
                <button className="control-btn" onClick={() => onAction("previous")}>
                    <svg className="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
                </button>
                <button className="control-btn !w-14 !h-14 bg-white text-black border-none" onClick={() => onAction(isPlaying ? "pause" : "play", isPlaying ? "PUT" : "PUT")}>
                    {isPlaying ? 
                        <svg className="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg> :
                        <svg className="w-6 h-6 translate-x-0.5" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                    }
                </button>
                <button className="control-btn" onClick={() => onAction("next")}>
                    <svg className="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="m6 18 8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
                </button>
            </div>
        );

        function App() {
            const [token, setToken] = useState(window.localStorage.getItem("spotify_token") || "");
            const [data, setData] = useState(null);
            const [queue, setQueue] = useState([]);
            const [devices, setDevices] = useState([]);
            const [layout, setLayout] = useState("tv"); 
            const [jamUrl, setJamUrl] = useState(window.localStorage.getItem("jam_url") || "");
            const [isLoading, setIsLoading] = useState(!!token);
            const [showControlsInLayout, setShowControlsInLayout] = useState(false);

            // Auth Effect
            useEffect(() => {
                const urlParams = new URLSearchParams(window.location.search);
                const code = urlParams.get('code');
                if (code) {
                    const getToken = async () => {
                        const codeVerifier = window.localStorage.getItem('code_verifier');
                        try {
                            const response = await fetch('https://accounts.spotify.com/api/token', {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                                body: new URLSearchParams({
                                    client_id: CLIENT_ID, grant_type: 'authorization_code',
                                    code: code, redirect_uri: REDIRECT_URI, code_verifier: codeVerifier,
                                }),
                            });
                            const result = await response.json();
                            if (result.access_token) {
                                setToken(result.access_token);
                                window.localStorage.setItem("spotify_token", result.access_token);
                                window.history.replaceState({}, document.title, window.location.pathname);
                            }
                        } catch (e) { console.error(e); }
                    };
                    getToken();
                }
            }, []);

            // Main Data Fetch Loop
            useEffect(() => {
                if (!token) return;
                const fetchData = async () => {
                    const headers = { Authorization: `Bearer ${token}` };
                    try {
                        const playerRes = await fetch("https://api.spotify.com/v1/me/player", { headers });
                        if (playerRes.status === 200) setData(await playerRes.json());
                        else if (playerRes.status === 204) setData(null);
                        else if (playerRes.status === 401) handleLogout();

                        const queueRes = await fetch("https://api.spotify.com/v1/me/player/queue", { headers });
                        if (queueRes.status === 200) setQueue((await queueRes.json()).queue || []);

                        const devRes = await fetch("https://api.spotify.com/v1/me/player/devices", { headers });
                        if (devRes.status === 200) setDevices((await devRes.json()).devices || []);
                    } catch (e) { console.error(e); } finally { setIsLoading(false); }
                };
                fetchData();
                const i = setInterval(fetchData, 3000);
                return () => clearInterval(i);
            }, [token]);

            const playerAction = async (endpoint, method = "POST") => {
                if (!token) return;
                try {
                    await fetch(`https://api.spotify.com/v1/me/player/${endpoint}`, {
                        method: method, headers: { Authorization: `Bearer ${token}` }
                    });
                } catch (e) { console.error(e); }
            };

            const transferPlayback = async (deviceId) => {
                if (!token) return;
                try {
                    await fetch("https://api.spotify.com/v1/me/player", {
                        method: "PUT",
                        headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
                        body: JSON.stringify({ device_ids: [deviceId], play: true })
                    });
                } catch (e) { console.error(e); }
            };

            const login = async () => {
                const codeVerifier = generateRandomString(64);
                const hashed = await sha256(codeVerifier);
                const codeChallenge = base64encode(hashed);
                window.localStorage.setItem('code_verifier', codeVerifier);
                const params = new URLSearchParams({
                    response_type: 'code', client_id: CLIENT_ID,
                    scope: "user-read-currently-playing user-read-playback-state user-modify-playback-state",
                    code_challenge_method: 'S256', code_challenge: codeChallenge,
                    redirect_uri: REDIRECT_URI, show_dialog: true
                });
                window.location.href = `https://accounts.spotify.com/authorize?${params.toString()}`;
            };

            const handleLogout = () => {
                window.localStorage.clear();
                window.location.href = window.location.pathname;
            };

            const renderLayout = () => {
                if (isLoading) return <div className="flex-grow flex items-center justify-center text-white/20 uppercase tracking-[1em] font-black">Connecting...</div>;
                if (!data?.item) return <div className="flex-grow flex items-center justify-center text-white/40 uppercase tracking-widest text-4xl font-black">Warte auf Wiedergabe...</div>;

                const track = data.item;
                const progress = (data.progress_ms / track.duration_ms) * 100;
                const imageUrl = track?.album?.images?.[0]?.url;

                switch(layout) {
                    case "tv":
                        return (
                            <div className="flex-grow flex flex-row p-12 gap-20 items-center">
                                <div className="w-[50%] shrink-0 flex flex-col items-center">
                                    {imageUrl && <img src={imageUrl} className="w-full aspect-square rounded-[3.5rem] shadow-[0_80px_120px_rgba(0,0,0,0.85)] border border-white/5" />}
                                    {showControlsInLayout && <InlineControls isPlaying={data.is_playing} onAction={playerAction} />}
                                </div>
                                <div className="flex-grow flex flex-col justify-center gap-16">
                                    <div>
                                        <h1 className="text-[6.5rem] font-black tracking-tighter uppercase leading-[0.8] mb-8">{track.name}</h1>
                                        <p className="text-5xl font-bold text-white/50 uppercase italic tracking-tight">{track.artists[0].name}</p>
                                    </div>
                                    <div className="w-full space-y-8">
                                        <div className="h-4 bg-white/10 rounded-full overflow-hidden"><div className="progress-bar" style={{width: `${progress}%`}}></div></div>
                                        <div className="flex justify-between text-sm font-black uppercase tracking-[0.5em] text-white/30">
                                            <span className="truncate max-w-[400px]">{track.album.name}</span>
                                            <span>{Math.floor(data.progress_ms/60000)}:{String(Math.floor(data.progress_ms%60000/1000)).padStart(2,'0')} / {Math.floor(track.duration_ms/60000)}:{String(Math.floor(track.duration_ms%60000/1000)).padStart(2,'0')}</span>
                                        </div>
                                    </div>
                                    <div className="flex items-center gap-10 bg-black/50 p-8 rounded-[2.5rem] w-fit border border-white/10">
                                        <CommonQR size="w-40" url={jamUrl} />
                                        <div>
                                            <p className="text-xl font-black uppercase tracking-widest mb-1 italic">Party beitreten</p>
                                            <p className="text-xs font-bold text-[#1DB954] uppercase tracking-[0.3em]">Spotify Jam Session</p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        );
                    case "social":
                        return (
                            <div className="flex-grow flex items-center justify-center p-20 gap-32">
                                <div className="w-[550px] flex flex-col items-center gap-16 shrink-0">
                                    <CommonQR size="w-full" url={jamUrl} />
                                    <div className="text-center bg-white/5 px-10 py-6 rounded-full border border-white/10">
                                        <p className="text-3xl font-black uppercase tracking-[0.3em] mb-1 text-[#1DB954]">Scan To Jam</p>
                                        <p className="text-sm font-bold text-white/30 uppercase tracking-[0.5em]">Beats hinzufügen</p>
                                    </div>
                                </div>
                                <div className="flex-grow flex flex-col justify-center">
                                    <div className="relative w-fit">
                                        {imageUrl && <img src={imageUrl} className="w-64 h-64 rounded-[3rem] shadow-2xl mb-12 border border-white/10" />}
                                        {showControlsInLayout && <div className="absolute -bottom-6 left-1/2 -translate-x-1/2 scale-75"><InlineControls isPlaying={data.is_playing} onAction={playerAction} /></div>}
                                    </div>
                                    <h1 className="text-[12vw] font-black uppercase leading-[0.75] tracking-tighter italic mb-10">{track.name}</h1>
                                    <p className="text-7xl font-light text-white/50 uppercase tracking-tighter mb-16">{track.artists[0].name}</p>
                                    <div className="h-2 w-full bg-white/10 rounded-full"><div className="h-full bg-white shadow-[0_0_20px_#fff]" style={{width: `${progress}%`}}></div></div>
                                </div>
                            </div>
                        );
                    case "split":
                        return (
                            <div className="flex-grow grid grid-cols-2">
                                <div className="flex flex-col items-center justify-center p-20 border-r border-white/5">
                                    <div className="w-full max-w-lg">
                                        <div className="relative mb-16">
                                            {imageUrl && <img src={imageUrl} className="w-full rounded-[2.5rem] shadow-2xl border border-white/5" />}
                                            {showControlsInLayout && <div className="absolute -bottom-10 left-1/2 -translate-x-1/2"><InlineControls isPlaying={data.is_playing} onAction={playerAction} /></div>}
                                        </div>
                                        <h1 className="text-6xl font-black uppercase mb-4 italic tracking-tighter leading-tight">{track.name}</h1>
                                        <p className="text-3xl text-white/40 font-bold uppercase tracking-tight">{track.artists[0].name}</p>
                                    </div>
                                </div>
                                <div className="p-24 flex flex-col justify-between bg-zinc-950/40 backdrop-blur-xl">
                                    <div>
                                        <div className="flex items-center gap-4 mb-14">
                                            <div className="w-3 h-3 rounded-full bg-[#1DB954] animate-pulse"></div>
                                            <h2 className="text-xs font-black uppercase tracking-[0.5em] text-[#1DB954]">Warteschlange</h2>
                                        </div>
                                        <div className="space-y-10">
                                            {queue.slice(0, 5).map((t, i) => (
                                                <div key={i} className="flex gap-8 items-center group cursor-pointer">
                                                    <div className="relative">
                                                        <img src={t.album?.images?.[2]?.url} className="w-16 h-16 rounded-xl opacity-60 group-hover:opacity-100 transition-opacity" />
                                                        <span className="absolute -top-3 -left-3 w-7 h-7 bg-white text-black text-[10px] flex items-center justify-center rounded-full font-black">{i+1}</span>
                                                    </div>
                                                    <div className="truncate">
                                                        <p className="text-xl font-black uppercase truncate group-hover:text-[#1DB954] transition-colors">{t.name}</p>
                                                        <p className="text-sm font-bold text-white/30 uppercase">{t.artists[0].name}</p>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                    <div className="flex items-center justify-between gap-12 pt-16 border-t border-white/10">
                                        <CommonQR size="w-56" url={jamUrl} />
                                        <div className="text-right">
                                            <p className="text-3xl font-black uppercase mb-3 italic tracking-tighter">Join Jam</p>
                                            <p className="text-sm font-bold text-white/30 uppercase tracking-[0.2em] leading-relaxed">Scannen & Song<br/>direkt wählen</p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        );
                    case "minimal":
                        return (
                            <div className="flex-grow flex flex-col items-center justify-center text-center p-20">
                                <div className="relative mb-24">
                                    {imageUrl && <img src={imageUrl} className="w-[34rem] h-[34rem] rounded-[5rem] shadow-[0_80px_150px_rgba(0,0,0,0.9)] relative z-10 border border-white/5" />}
                                    {showControlsInLayout && <div className="absolute -bottom-12 left-1/2 -translate-x-1/2 z-20"><InlineControls isPlaying={data.is_playing} onAction={playerAction} /></div>}
                                </div>
                                <h1 className="text-[8vw] font-black uppercase tracking-tighter mb-6 italic leading-none">{track.name}</h1>
                                <p className="text-5xl font-light text-white/40 uppercase tracking-[0.3em]">{track.artists[0].name}</p>
                                <div className="w-80 h-1 bg-white/5 rounded-full mt-20 overflow-hidden"><div className="h-full bg-white shadow-[0_0_15px_#fff]" style={{width: `${progress}%`}}></div></div>
                            </div>
                        );
                    default: return null;
                }
            };

            return (
                <div className="relative h-screen w-screen overflow-hidden bg-black select-none">
                    <div className="bg-dynamic">
                        {data?.item?.album?.images[0]?.url && (
                            <div className="bg-layer" style={{ backgroundImage: `url(${data.item.album.images[0].url})` }}></div>
                        )}
                        <div className="overlay-vignette"></div>
                    </div>

                    <div className="app-container">
                        <header className="p-10 flex justify-between items-start pointer-events-none">
                            <img src="Logo.svg" className="w-16 h-16 opacity-30" />
                            <div className="text-right opacity-60">
                                <p className="text-5xl font-black italic tracking-tighter">{new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</p>
                                <p className="text-[10px] font-black uppercase tracking-[0.8em] mt-2 text-[#1DB954]">{layout} View</p>
                            </div>
                        </header>
                        {renderLayout()}
                    </div>

                    <div className="trigger-zone"></div>
                    <div className="system-dock">
                        {/* Player Controls & Device Picker */}
                        <div className="flex items-center justify-between gap-12 px-2">
                            <div className="flex items-center gap-3">
                                <div className="control-btn" onClick={() => playerAction("previous")}>
                                    <svg className="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
                                </div>
                                <div className="control-btn !w-14 !h-14 bg-white text-black border-none" onClick={() => playerAction(data?.is_playing ? "pause" : "play", data?.is_playing ? "PUT" : "PUT")}>
                                    {data?.is_playing ? 
                                        <svg className="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg> :
                                        <svg className="w-6 h-6 translate-x-0.5" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                                    }
                                </div>
                                <div className="control-btn" onClick={() => playerAction("next")}>
                                    <svg className="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="m6 18 8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
                                </div>
                            </div>

                            <div className="flex items-center gap-6">
                                <div className="flex flex-col gap-1">
                                    <span className="text-[8px] font-bold text-white/30 uppercase tracking-widest ml-1">Wiedergabe auf:</span>
                                    <select 
                                        value={data?.device?.id || ""} 
                                        onChange={(e) => transferPlayback(e.target.value)}
                                    >
                                        <option value="" disabled>Gerät wählen...</option>
                                        {devices.map(d => (
                                            <option key={d.id} value={d.id}>{d.is_active ? '▶ ' : ''}{d.name}</option>
                                        ))}
                                    </select>
                                </div>
                                <div className="flex flex-col gap-1">
                                    <span className="text-[8px] font-bold text-white/30 uppercase tracking-widest ml-1">Jam Link:</span>
                                    <input 
                                        className="bg-white/5 border border-white/10 px-4 py-2.5 rounded-xl text-[11px] font-bold text-white outline-none w-64 focus:bg-white/10 transition-colors" 
                                        placeholder="Spotify Jam Link einfügen..." 
                                        value={jamUrl} 
                                        onChange={(e) => {
                                            setJamUrl(e.target.value); 
                                            window.localStorage.setItem("jam_url", e.target.value);
                                        }} 
                                    />
                                </div>
                            </div>
                        </div>

                        {/* Layout Switcher & Options */}
                        <div className="flex items-center gap-3 border-t border-white/5 pt-5">
                            {['tv', 'social', 'split', 'minimal'].map(mode => (
                                <div key={mode} className={`dock-item ${layout === mode ? 'active' : ''}`} onClick={() => setLayout(mode)}>{mode}</div>
                            ))}
                            <div className="w-[1px] h-6 bg-white/10 mx-2"></div>
                            <div 
                                className={`dock-item ${showControlsInLayout ? 'active' : ''}`} 
                                onClick={() => setShowControlsInLayout(!showControlsInLayout)}
                            >
                                <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" /></svg>
                                Buttons anzeigen
                            </div>
                            <div className="flex-grow"></div>
                            <div className="dock-item text-red-500/60 hover:!text-red-500 hover:bg-red-500/10" onClick={handleLogout}>Logout</div>
                        </div>
                    </div>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
