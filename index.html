<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jam Canvas Dashboard</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons für das UI -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        body { 
            background-color: #050505; 
            color: white; 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            overflow: hidden; 
        }

        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .bg-gradient-glow {
            background: radial-gradient(circle at center, rgba(34, 197, 94, 0.15) 0%, transparent 70%);
        }

        .album-shadow {
            box-shadow: 0 50px 100px -20px rgba(0, 0, 0, 0.8), 0 30px 60px -30px rgba(0, 0, 0, 0.8);
        }
        
        .progress-glow {
            box-shadow: 0 0 15px rgba(34, 197, 94, 0.5);
        }

        /* Animation für den Hintergrund */
        @keyframes pulse-slow {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.1); }
        }
        .animate-pulse-slow {
            animation: pulse-slow 8s ease-in-out infinite;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const CLIENT_ID = "4a1a9ff821ca4ea2a00f9f665dab598b"; 
        // EXAKT DEINE URL
        const REDIRECT_URI = "https://julian4-spot.github.io/jam-dashboard/";
        const AUTH_ENDPOINT = "https://accounts.spotify.com/authorize";
        const RESPONSE_TYPE = "token";
        const SCOPES = "user-read-currently-playing user-read-playback-state";

        function App() {
            const [token, setToken] = useState("");
            const [data, setData] = useState(null);
            const [loading, setLoading] = useState(true);

            // Authentifizierung prüfen
            useEffect(() => {
                const hash = window.location.hash;
                let t = window.localStorage.getItem("spotify_token");

                if (hash) {
                    const params = new URLSearchParams(hash.substring(1));
                    t = params.get("access_token");
                    if (t) {
                        window.localStorage.setItem("spotify_token", t);
                        window.location.hash = "";
                    }
                }
                setToken(t);
                setLoading(false);
            }, []);

            // Spotify Daten abrufen
            useEffect(() => {
                if (!token) return;

                const fetchData = async () => {
                    try {
                        const response = await fetch("https://api.spotify.com/v1/me/player/currently-playing", {
                            headers: { Authorization: `Bearer ${token}` }
                        });
                        
                        if (response.status === 401) {
                            logout();
                            return;
                        }
                        
                        if (response.status === 204) {
                            setData(null);
                        } else {
                            const result = await response.json();
                            setData(result);
                        }
                    } catch (err) {
                        console.error("Fehler beim Abrufen:", err);
                    }
                };

                fetchData();
                const interval = setInterval(fetchData, 3000); // Alle 3 Sekunden aktualisieren
                return () => clearInterval(interval);
            }, [token]);

            const login = () => {
                const url = `${AUTH_ENDPOINT}?client_id=${CLIENT_ID}&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&response_type=${RESPONSE_TYPE}&scope=${encodeURIComponent(SCOPES)}&show_dialog=true`;
                window.location.href = url;
            };

            const logout = () => {
                window.localStorage.removeItem("spotify_token");
                setToken("");
                setData(null);
            };

            if (loading) return null;

            if (!token) {
                return (
                    <div className="min-h-screen flex items-center justify-center p-6 relative overflow-hidden">
                        <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] bg-green-500/10 rounded-full blur-[120px] animate-pulse-slow"></div>
                        
                        <div className="max-w-md w-full glass p-12 rounded-[3rem] text-center relative z-10 border border-white/10">
                            <div className="w-20 h-20 bg-green-500 rounded-[2rem] flex items-center justify-center mx-auto mb-8 shadow-[0_20px_50px_rgba(34,197,94,0.3)]">
                                <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="black" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
                            </div>
                            <h1 className="text-4xl font-black mb-4 italic tracking-tighter uppercase">Jam Canvas</h1>
                            <p className="text-zinc-500 text-sm mb-12 font-medium leading-relaxed">Verbinde dein Spotify, um dein persönliches Dashboard zu starten.</p>
                            
                            <button onClick={login} className="w-full bg-green-500 hover:bg-green-400 text-black font-black py-6 rounded-2xl transition-all shadow-xl shadow-green-500/10 active:scale-95 text-lg">
                                LOGIN STARTEN
                            </button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen flex items-center justify-center p-10 relative overflow-hidden">
                    {/* Dynamischer Hintergrund basierend auf dem Album-Cover (Platzhalter-Farbe) */}
                    <div className="absolute inset-0 bg-gradient-glow opacity-50"></div>
                    
                    {!data ? (
                        <div className="text-center relative z-10 space-y-6">
                            <div className="w-16 h-16 border-4 border-zinc-800 border-t-green-500 rounded-full animate-spin mx-auto"></div>
                            <p className="text-zinc-500 font-black uppercase text-xs tracking-[0.4em]">Warte auf Wiedergabe...</p>
                        </div>
                    ) : (
                        <div className="flex flex-col md:flex-row items-center gap-16 max-w-6xl w-full relative z-10 animate-in fade-in zoom-in duration-1000">
                            
                            {/* Linke Seite: Album Cover */}
                            <div className="relative group shrink-0">
                                <div className="absolute -inset-8 bg-green-500/20 rounded-[5rem] blur-3xl opacity-0 group-hover:opacity-100 transition-all duration-1000"></div>
                                <img 
                                    src={data.item.album.images[0].url} 
                                    className="w-[28rem] h-[28rem] rounded-[4rem] album-shadow relative z-10 border border-white/5 object-cover" 
                                    alt="Album Cover" 
                                />
                            </div>

                            {/* Rechte Seite: Infos */}
                            <div className="flex-grow space-y-8 text-center md:text-left">
                                <div className="space-y-2">
                                    <h1 className="text-7xl font-black italic uppercase tracking-tighter leading-none">{data.item.name}</h1>
                                    <p className="text-3xl text-zinc-400 font-bold tracking-tight">{data.item.artists.map(a => a.name).join(", ")}</p>
                                </div>

                                {/* Progress Bar */}
                                <div className="space-y-4">
                                    <div className="w-full bg-zinc-900/50 h-3 rounded-full overflow-hidden backdrop-blur-md border border-white/5">
                                        <div 
                                            className="bg-green-500 h-full transition-all duration-1000 progress-glow" 
                                            style={{ width: `${(data.progress_ms / data.item.duration_ms) * 100}%` }}
                                        ></div>
                                    </div>
                                    <div className="flex justify-between text-[10px] font-black text-zinc-600 tracking-widest uppercase">
                                        <span>{Math.floor(data.progress_ms / 60000)}:{String(Math.floor((data.progress_ms % 60000) / 1000)).padStart(2, '0')}</span>
                                        <div className="flex items-center gap-2">
                                            <div className="w-1.5 h-1.5 bg-green-500 rounded-full animate-pulse"></div>
                                            <span>Live auf Spotify</span>
                                        </div>
                                        <span>{Math.floor(data.item.duration_ms / 60000)}:{String(Math.floor((data.item.duration_ms % 60000) / 1000)).padStart(2, '0')}</span>
                                    </div>
                                </div>

                                {/* Footer / QR / Meta */}
                                <div className="flex items-center justify-between pt-8 border-t border-white/5">
                                    <div className="flex items-center gap-4">
                                        <div className="w-12 h-12 glass rounded-xl flex items-center justify-center text-zinc-400">
                                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
                                        </div>
                                        <div>
                                            <p className="text-[10px] font-black text-zinc-600 uppercase tracking-widest">Album</p>
                                            <p className="text-sm font-bold text-zinc-300">{data.item.album.name}</p>
                                        </div>
                                    </div>
                                    
                                    <button onClick={logout} className="text-[9px] font-black text-zinc-800 hover:text-red-500 tracking-[0.4em] uppercase transition-all duration-300">
                                        Logout
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
