<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jam Dashboard - v2.3.0</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800;900&family=Space+Mono:wght@400;700&display=swap');
        
        body { 
            background-color: #000; 
            color: #fff; 
            font-family: 'Inter', sans-serif; 
            overflow: hidden; 
            margin: 0;
        }

        /* Dynamischer Hintergrund */
        .bg-dynamic {
            position: fixed;
            inset: 0;
            z-index: 0;
        }

        .bg-layer {
            position: absolute;
            inset: -10%;
            background-size: cover;
            background-position: center;
            filter: blur(80px) brightness(0.3) saturate(1.2);
            transition: background-image 2s ease-in-out;
        }

        .overlay-vignette {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at center, transparent 0%, rgba(0,0,0,0.9) 100%);
        }

        /* Layout Container */
        .app-container {
            position: relative;
            z-index: 10;
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            padding: 3rem;
        }

        /* Glaseffekte */
        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        /* Fortschrittsbalken */
        .progress-container {
            height: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background: #fff;
            transition: width 1s linear;
            box-shadow: 0 0 15px #fff;
        }

        /* Navigation Dock */
        .dock {
            position: fixed;
            bottom: 1.5rem;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(20px);
            padding: 0.5rem;
            border-radius: 1.5rem;
            border: 1px solid rgba(255,255,255,0.1);
            display: flex;
            gap: 0.5rem;
            z-index: 100;
        }

        .dock-item {
            padding: 0.4rem 0.8rem;
            border-radius: 1rem;
            font-size: 0.65rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            cursor: pointer;
            transition: all 0.2s;
            color: rgba(255,255,255,0.3);
        }

        .dock-item.active {
            background: #fff;
            color: #000;
        }

        /* Spezielle Animationen */
        @keyframes rotate-slow {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .animate-vinyl {
            animation: rotate-slow 10s linear infinite;
        }

        #qrcode canvas {
            width: 100% !important;
            height: auto !important;
        }

        .cyber-text {
            font-family: 'Space Mono', monospace;
            text-shadow: 0 0 10px rgba(255,255,255,0.5);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const CLIENT_ID = "4a1a9ff821ca4ea2a00f9f665dab598b"; 
        const REDIRECT_URI = window.location.origin + window.location.pathname;

        function App() {
            const [token, setToken] = useState(window.localStorage.getItem("spotify_token") || "");
            const [data, setData] = useState(null);
            const [queue, setQueue] = useState([]);
            const [layout, setLayout] = useState("classic"); 
            const [jamUrl, setJamUrl] = useState(window.localStorage.getItem("jam_url") || "");
            
            const qrRef = useRef(null);

            useEffect(() => {
                const hash = window.location.hash;
                if (hash) {
                    const params = new URLSearchParams(hash.substring(1));
                    const accessToken = params.get("access_token");
                    if (accessToken) {
                        setToken(accessToken);
                        window.localStorage.setItem("spotify_token", accessToken);
                        window.history.replaceState({}, document.title, window.location.pathname);
                    }
                }
            }, []);

            useEffect(() => {
                if (!token) return;
                const fetchData = async () => {
                    try {
                        const pRes = await fetch("https://api.spotify.com/v1/me/player", { headers: { Authorization: `Bearer ${token}` } });
                        if (pRes.status === 200) setData(await pRes.json());
                        
                        const qRes = await fetch("https://api.spotify.com/v1/me/player/queue", { headers: { Authorization: `Bearer ${token}` } });
                        if (qRes.status === 200) {
                            const qData = await qRes.json();
                            setQueue(qData.queue.slice(0, 8));
                        }
                    } catch (e) { console.error(e); }
                };
                fetchData();
                const i = setInterval(fetchData, 3000);
                return () => clearInterval(i);
            }, [token]);

            useEffect(() => {
                if (jamUrl && qrRef.current) {
                    qrRef.current.innerHTML = "";
                    new QRCode(qrRef.current, { 
                        text: jamUrl, 
                        width: 256, 
                        height: 256,
                        colorDark : "#000000",
                        colorLight : "#ffffff"
                    });
                }
            }, [layout, jamUrl]);

            if (!token) return (
                <div className="h-screen w-screen flex items-center justify-center bg-black">
                    <button className="bg-white text-black px-10 py-4 rounded-full font-black uppercase tracking-widest" onClick={() => {
                        const scopes = "user-read-currently-playing user-read-playback-state";
                        window.location.href = `https://accounts.spotify.com/authorize?client_id=${CLIENT_ID}&response_type=token&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&scope=${encodeURIComponent(scopes)}`;
                    }}>Connect Spotify</button>
                </div>
            );

            const renderLayout = () => {
                if (!data?.item) return <div className="flex-grow flex items-center justify-center opacity-20 uppercase font-black tracking-widest text-xs">Waiting...</div>;
                const track = data.item;
                const progress = (data.progress_ms / track.duration_ms) * 100;

                switch(layout) {
                    case "classic":
                        return (
                            <div className="flex-grow flex items-center gap-16">
                                <img src={track.album.images[0].url} className="w-[450px] h-[450px] rounded-3xl shadow-2xl" />
                                <div className="space-y-6">
                                    <h1 className="text-6xl font-black italic uppercase leading-none tracking-tighter">{track.name}</h1>
                                    <p className="text-2xl font-bold text-white/50">{track.artists.map(a => a.name).join(", ")}</p>
                                    <div className="w-80 progress-container"><div className="progress-bar" style={{width: `${progress}%`}}></div></div>
                                </div>
                            </div>
                        );
                    case "vinyl":
                        return (
                            <div className="flex-grow flex flex-col items-center justify-center gap-8 text-center">
                                <div className="relative group">
                                    <div className="absolute inset-0 bg-black rounded-full animate-vinyl opacity-80 border-4 border-white/5 overflow-hidden">
                                        <div className="absolute inset-0 opacity-10" style={{background: 'repeating-radial-gradient(circle, #000 0, #000 2px, #fff 3px)'}}></div>
                                    </div>
                                    <img src={track.album.images[0].url} className="w-64 h-64 rounded-full relative z-10 border-4 border-black" />
                                </div>
                                <div className="space-y-2">
                                    <h1 className="text-4xl font-black uppercase">{track.name}</h1>
                                    <p className="text-xl text-white/40">{track.artists[0].name}</p>
                                </div>
                            </div>
                        );
                    case "cyber":
                        return (
                            <div className="flex-grow flex flex-col justify-end p-10 gap-4 cyber-text">
                                <div className="flex gap-4">
                                    <div className="px-3 py-1 bg-white text-black font-bold text-[10px]">NOW_PLAYING</div>
                                    <div className="px-3 py-1 border border-white/20 text-white/50 font-bold text-[10px]">SRC:SPOTIFY_API</div>
                                </div>
                                <h1 className="text-[10vw] font-bold leading-[0.8]">{track.name}</h1>
                                <p className="text-3xl text-white/40">{track.artists[0].name}</p>
                                <div className="flex gap-1 w-full mt-4">
                                    {[...Array(50)].map((_, i) => (
                                        <div key={i} className={`h-1 flex-grow ${i < progress/2 ? 'bg-white' : 'bg-white/10'}`}></div>
                                    ))}
                                </div>
                            </div>
                        );
                    case "split":
                        return (
                            <div className="flex-grow grid grid-cols-2 h-full py-10">
                                <div className="flex items-center justify-center">
                                    <img src={track.album.images[0].url} className="w-[80%] aspect-square object-cover rounded-xl" />
                                </div>
                                <div className="flex flex-col justify-center gap-12 px-10">
                                    <div className="space-y-2">
                                        <span className="text-xs font-black text-white/20 uppercase tracking-[0.4em]">Up Next</span>
                                        <div className="space-y-4">
                                            {queue.slice(0, 3).map((t, i) => (
                                                <div key={i} className="flex items-center gap-4 opacity-40">
                                                    <span className="text-xs font-black">0{i+1}</span>
                                                    <p className="font-bold truncate text-sm uppercase">{t.name}</p>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                    <div className="space-y-4">
                                        <h1 className="text-5xl font-black italic uppercase leading-none">{track.name}</h1>
                                        <p className="text-xl font-bold text-white/40">{track.artists[0].name}</p>
                                    </div>
                                </div>
                            </div>
                        );
                    case "poster":
                        return (
                            <div className="flex-grow flex items-stretch py-10">
                                <div className="w-1/3 glass rounded-3xl p-8 flex flex-col justify-between">
                                    <div>
                                        <h1 className="text-4xl font-black uppercase leading-tight italic tracking-tighter">{track.name}</h1>
                                        <p className="text-lg text-white/40 mt-4">{track.artists[0].name}</p>
                                    </div>
                                    <div className="bg-white p-4 rounded-2xl" id="qrcode" ref={qrRef}></div>
                                </div>
                                <div className="flex-grow ml-8">
                                    <img src={track.album.images[0].url} className="w-full h-full object-cover rounded-3xl shadow-2xl" />
                                </div>
                            </div>
                        );
                    case "minimal":
                        return (
                            <div className="flex-grow flex flex-col items-center justify-center text-center p-20">
                                <h1 className="text-[12vw] font-black tracking-tighter leading-none opacity-10 blur-[2px] absolute inset-0 flex items-center justify-center select-none">{track.name}</h1>
                                <div className="relative z-10">
                                    <p className="text-xs font-black uppercase tracking-[1em] mb-4">Playing Now</p>
                                    <h2 className="text-6xl font-light tracking-tight mb-2">{track.name}</h2>
                                    <p className="text-xl text-white/30 font-bold uppercase">{track.artists[0].name}</p>
                                </div>
                            </div>
                        );
                    case "studio":
                        return (
                            <div className="flex-grow grid grid-cols-4 gap-6 py-10">
                                <div className="col-span-3 glass rounded-3xl p-10 flex gap-10 items-center">
                                    <img src={track.album.images[0].url} className="w-64 h-64 rounded-2xl" />
                                    <div className="space-y-6 flex-grow">
                                        <h1 className="text-5xl font-black italic uppercase tracking-tighter">{track.name}</h1>
                                        <div className="space-y-1">
                                            <div className="h-1 w-full bg-white/10 rounded-full overflow-hidden">
                                                <div className="h-full bg-white" style={{width: `${progress}%`}}></div>
                                            </div>
                                            <div className="flex justify-between text-[10px] font-black text-white/30">
                                                <span>LIVE</span>
                                                <span>{track.artists[0].name}</span>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                <div className="col-span-1 glass rounded-3xl p-6 overflow-hidden">
                                    <h3 className="text-[10px] font-black uppercase tracking-widest text-white/20 mb-4">Queue</h3>
                                    <div className="space-y-4">
                                        {queue.slice(0, 5).map((t, i) => (
                                            <div key={i} className="flex items-center gap-3">
                                                <img src={t.album.images[2].url} className="w-8 h-8 rounded" />
                                                <div className="truncate">
                                                    <p className="text-[10px] font-bold truncate uppercase">{t.name}</p>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        );
                    case "focus":
                        return (
                            <div className="flex-grow flex items-center justify-center">
                                <div className="text-center space-y-12">
                                    <img src={track.album.images[0].url} className="w-96 h-96 mx-auto rounded-full shadow-[0_0_80px_rgba(255,255,255,0.1)] border-8 border-white/5" />
                                    <div className="space-y-2">
                                        <h1 className="text-7xl font-black tracking-tighter uppercase">{track.name}</h1>
                                        <p className="text-2xl text-white/20 font-bold uppercase tracking-[0.2em]">{track.artists[0].name}</p>
                                    </div>
                                </div>
                            </div>
                        );
                }
            };

            return (
                <div className="relative h-screen w-screen overflow-hidden">
                    <div className="bg-dynamic">
                        <div className="bg-layer" style={{ backgroundImage: `url(${data?.item?.album?.images[0]?.url})` }}></div>
                        <div className="overlay-vignette"></div>
                    </div>

                    <div className="app-container">
                        <header className="flex justify-between items-start shrink-0">
                            <div className="flex items-center gap-3">
                                <div className="w-8 h-8 rounded-lg bg-white flex items-center justify-center text-black font-black text-xs">J</div>
                                <span className="text-[10px] font-black uppercase tracking-[0.5em] text-white/40">Jam Dashboard v2.3</span>
                            </div>
                            <div className="text-right">
                                <p className="text-2xl font-black italic">{new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</p>
                                <p className="text-[9px] font-black uppercase text-white/20">Status: Active</p>
                            </div>
                        </header>

                        {renderLayout()}
                    </div>

                    <div className="dock">
                        {['classic', 'vinyl', 'cyber', 'split', 'poster', 'minimal', 'studio', 'focus'].map(mode => (
                            <div 
                                key={mode} 
                                className={`dock-item ${layout === mode ? 'active' : ''}`}
                                onClick={() => setLayout(mode)}
                            >
                                {mode}
                            </div>
                        ))}
                        <div className="w-[1px] h-4 bg-white/10 self-center mx-1"></div>
                        <div className="dock-item hover:text-red-500" onClick={() => {window.localStorage.clear(); window.location.reload();}}>Logout</div>
                    </div>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
