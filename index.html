<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jam Dashboard - v1.7.0</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap');
        
        body { 
            background-color: #000; 
            color: #fff; 
            font-family: 'Inter', sans-serif; 
            overflow: hidden; 
            margin: 0;
        }

        .main-container {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at center, #0a0a0a 0%, #000 100%);
            position: relative;
        }

        .album-art {
            width: 450px;
            height: 450px;
            border-radius: 3rem;
            box-shadow: 0 50px 100px -20px rgba(0,0,0,1);
            object-fit: cover;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .progress-bar-container {
            width: 100%;
            height: 10px;
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            margin-top: 2rem;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.03);
        }

        .progress-bar-fill {
            height: 100%;
            background: #1DB954;
            transition: width 1s linear;
            box-shadow: 0 0 30px rgba(29, 185, 84, 0.4);
        }

        .text-glow {
            text-shadow: 0 0 60px rgba(255,255,255,0.1);
        }

        .scanline {
            width: 100%; height: 100%;
            position: absolute; top: 0; left: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.05) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.01), rgba(0, 255, 0, 0.005), rgba(0, 0, 255, 0.01));
            background-size: 100% 4px, 3px 100%;
            pointer-events: none;
            z-index: 50;
        }

        .login-btn {
            background: #fff;
            color: #000;
            padding: 1.5rem 4rem;
            border-radius: 100px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            font-size: 0.9rem;
        }

        .login-btn:hover {
            transform: scale(1.05);
            background: #1DB954;
            color: #fff;
        }

        .artist-name {
            font-size: 3.5rem;
            line-height: 1;
            font-weight: 700;
            color: rgba(255,255,255,0.5);
            letter-spacing: -0.02em;
        }

        .song-title {
            font-size: 8rem;
            line-height: 0.85;
            font-weight: 900;
            font-style: italic;
            text-transform: uppercase;
            letter-spacing: -0.05em;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const CLIENT_ID = "52f166f3b18a4aee8d2a91649a371134"; 
        const REDIRECT_URI = "https://julian4-spot.github.io/jam-dashboard/";
        const VERSION = "v1.7.0 (PKCE Flow)";

        // Hilfsfunktionen für PKCE (Spotify verlangt das für response_type=code ohne Backend)
        const generateRandomString = (length) => {
            const possible = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
            const values = crypto.getRandomValues(new Uint8Array(length));
            return values.reduce((acc, x) => acc + possible[x % possible.length], "");
        };

        const sha256 = async (plain) => {
            const encoder = new TextEncoder();
            const data = encoder.encode(plain);
            return window.crypto.subtle.digest('SHA-256', data);
        };

        const base64encode = (input) => {
            return btoa(String.fromCharCode(...new Uint8Array(input)))
                .replace(/=/g, '')
                .replace(/\+/g, '-')
                .replace(/\//g, '_');
        };

        function App() {
            const [token, setToken] = useState(window.localStorage.getItem("spotify_token") || "");
            const [data, setData] = useState(null);

            useEffect(() => {
                const urlParams = new URLSearchParams(window.location.search);
                const code = urlParams.get('code');

                if (code) {
                    const getToken = async () => {
                        const codeVerifier = window.localStorage.getItem('code_verifier');
                        const payload = {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                            body: new URLSearchParams({
                                client_id: CLIENT_ID,
                                grant_type: 'authorization_code',
                                code: code,
                                redirect_uri: REDIRECT_URI,
                                code_verifier: codeVerifier,
                            }),
                        };

                        const body = await fetch('https://accounts.spotify.com/api/token', payload);
                        const response = await body.json();

                        if (response.access_token) {
                            setToken(response.access_token);
                            window.localStorage.setItem("spotify_token", response.access_token);
                            window.history.replaceState({}, document.title, window.location.pathname);
                        }
                    };
                    getToken();
                }
            }, []);

            useEffect(() => {
                if (!token) return;

                const fetchPlayer = async () => {
                    try {
                        const response = await fetch("https://api.spotify.com/v1/me/player", {
                            headers: { Authorization: `Bearer ${token}` }
                        });

                        if (response.status === 200) {
                            setData(await response.json());
                        } else if (response.status === 401) {
                            setToken("");
                            window.localStorage.removeItem("spotify_token");
                        }
                    } catch (e) {
                        console.error("API Signal Error", e);
                    }
                };

                fetchPlayer();
                const interval = setInterval(fetchPlayer, 2000);
                return () => clearInterval(interval);
            }, [token]);

            const login = async () => {
                const codeVerifier = generateRandomString(64);
                const hashed = await sha256(codeVerifier);
                const codeChallenge = base64encode(hashed);

                window.localStorage.setItem('code_verifier', codeVerifier);

                const params = {
                    response_type: 'code',
                    client_id: CLIENT_ID,
                    scope: "user-read-currently-playing user-read-playback-state",
                    code_challenge_method: 'S256',
                    code_challenge: codeChallenge,
                    redirect_uri: REDIRECT_URI,
                    show_dialog: true
                };

                const authUrl = new URL("https://accounts.spotify.com/authorize");
                authUrl.search = new URLSearchParams(params).toString();
                window.location.href = authUrl.toString();
            };

            if (!token) {
                return (
                    <div className="main-container">
                        <div className="scanline"></div>
                        <div className="text-center z-10 px-6">
                            <h1 className="text-6xl font-black italic tracking-tighter uppercase mb-2 text-glow">Jam Dashboard</h1>
                            <p className="text-zinc-700 font-bold tracking-[0.5em] uppercase text-[9px] mb-20 italic">Dashboard System {VERSION}</p>
                            <button onClick={login} className="login-btn shadow-2xl">
                                Spotify verbinden
                            </button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="main-container p-20 overflow-hidden">
                    <div className="scanline"></div>
                    {data && data.item ? (
                        <div className="flex flex-row items-center gap-24 max-w-[1600px] w-full z-10 animate-in fade-in duration-1000 slide-in-from-bottom-10">
                            
                            {/* Album Cover */}
                            <div className="relative shrink-0">
                                <div className="absolute -inset-20 bg-white/5 rounded-full blur-[150px]"></div>
                                <img 
                                    src={data.item.album.images[0].url} 
                                    className="album-art relative z-10" 
                                    alt="Cover" 
                                />
                            </div>

                            {/* Song Details */}
                            <div className="flex-grow space-y-6 overflow-hidden">
                                <div className="space-y-2">
                                    <h1 className="song-title text-glow truncate pb-4">
                                        {data.item.name}
                                    </h1>
                                    <p className="artist-name truncate">
                                        {data.item.artists.map(a => a.name).join(", ")}
                                    </p>
                                </div>

                                {/* Progress Bar */}
                                <div className="max-w-3xl pt-8">
                                    <div className="progress-bar-container">
                                        <div 
                                            className="progress-bar-fill" 
                                            style={{ width: `${(data.progress_ms / data.item.duration_ms) * 100}%` }}
                                        ></div>
                                    </div>
                                    <div className="flex justify-between mt-6 text-[11px] font-black uppercase tracking-[0.5em] text-zinc-600">
                                        <div className="flex items-center gap-3 text-[#1DB954]">
                                            <div className="w-2 h-2 bg-[#1DB954] rounded-full animate-pulse shadow-[0_0_10px_#1DB954]"></div>
                                            <span>Live Signal</span>
                                        </div>
                                        <span className="tabular-nums opacity-40">
                                            {Math.floor(data.progress_ms / 60000)}:{String(Math.floor((data.progress_ms % 60000) / 1000)).padStart(2, '0')} / {Math.floor(data.item.duration_ms / 60000)}:{String(Math.floor((data.item.duration_ms % 60000) / 1000)).padStart(2, '0')}
                                        </span>
                                    </div>
                                </div>

                                <button 
                                    onClick={() => {setToken(""); window.localStorage.clear(); window.location.reload();}}
                                    className="mt-20 text-[9px] font-black uppercase tracking-[0.6em] text-zinc-900 hover:text-red-500 transition-all"
                                >
                                    System Logout
                                </button>
                            </div>
                        </div>
                    ) : (
                        <div className="text-center opacity-10 z-10">
                            <p className="font-black uppercase tracking-[1.5em] text-sm italic">Warte auf Audioquelle...</p>
                        </div>
                    )}
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
