<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jam Dashboard - Ultimate Edition v4.0</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800;900&family=Unbounded:wght@400;900&family=Space+Grotesk:wght@300;700&display=swap');
        
        body { 
            background-color: #000; 
            color: #fff; 
            font-family: 'Inter', sans-serif; 
            overflow: hidden; 
            margin: 0;
        }

        .bg-dynamic {
            position: fixed;
            inset: 0;
            z-index: 0;
        }

        .bg-layer {
            position: absolute;
            inset: -10%;
            background-size: cover;
            background-position: center;
            filter: brightness(0.25) saturate(1.5) blur(60px);
            transition: background-image 2s ease-in-out;
        }

        .overlay-vignette {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at center, transparent 0%, rgba(0,0,0,0.9) 100%);
        }

        .app-container {
            position: relative;
            z-index: 10;
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
        }

        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .system-dock {
            position: fixed;
            bottom: -150px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(10, 10, 10, 0.98);
            backdrop-filter: blur(30px);
            padding: 1.2rem 2.5rem;
            border-radius: 2.5rem 2.5rem 0 0;
            border: 1px solid rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            gap: 1rem;
            z-index: 1000;
            transition: bottom 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            max-width: 95vw;
        }

        .trigger-zone:hover + .system-dock, .system-dock:hover {
            bottom: 0;
        }

        .trigger-zone {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 60px;
            z-index: 999;
        }

        .dock-item {
            padding: 0.6rem 1rem;
            border-radius: 1rem;
            font-size: 0.65rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            cursor: pointer;
            transition: all 0.2s;
            color: rgba(255,255,255,0.4);
            white-space: nowrap;
        }

        .dock-item:hover { color: #fff; background: rgba(255,255,255,0.1); }
        .dock-item.active { background: #fff; color: #000; }

        .progress-bar {
            height: 100%;
            background: #fff;
            transition: width 1s linear;
        }

        .qr-wrapper canvas, .qr-wrapper img {
            width: 100% !important;
            height: auto !important;
            display: block;
        }

        @keyframes rotate-vinyl {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .vinyl-spin { animation: rotate-vinyl 25s linear infinite; }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* Dropdown styling */
        .custom-select {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            font-size: 0.7rem;
            font-weight: 700;
            padding: 0.5rem 1rem;
            border-radius: 0.8rem;
            outline: none;
            cursor: pointer;
            transition: background 0.2s;
        }
        .custom-select:hover { background: rgba(255,255,255,0.1); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const CLIENT_ID = "52f166f3b18a4aee8d2a91649a371134"; 
        const REDIRECT_URI = window.location.origin + window.location.pathname;

        const generateRandomString = (length) => {
            const possible = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
            const values = crypto.getRandomValues(new Uint8Array(length));
            return values.reduce((acc, x) => acc + possible[x % possible.length], "");
        };

        const sha256 = async (plain) => {
            const encoder = new TextEncoder();
            const data = encoder.encode(plain);
            return window.crypto.subtle.digest('SHA-256', data);
        };

        const base64encode = (input) => {
            return btoa(String.fromCharCode(...new Uint8Array(input)))
                .replace(/=/g, '').replace(/\+/g, '-').replace(/\//g, '_');
        };

        const CommonQR = ({ size = "w-32", url, padding = "p-2" }) => {
            const localRef = useRef(null);
            
            useEffect(() => {
                if (localRef.current) {
                    localRef.current.innerHTML = "";
                    try {
                        new QRCode(localRef.current, {
                            text: url || "https://spotify.com", 
                            width: 512, height: 512, // Höhere Auflösung für Scanbarkeit
                            colorDark: "#000000", colorLight: "#ffffff",
                            correctLevel : QRCode.CorrectLevel.H 
                        });
                    } catch (e) { console.error(e); }
                }
            }, [url]);

            return (
                <div className={`${size} bg-white rounded-xl ${padding} shadow-2xl flex-shrink-0`}>
                    <div ref={localRef} className="w-full h-full"></div>
                </div>
            );
        };

        function App() {
            const [token, setToken] = useState(window.localStorage.getItem("spotify_token") || "");
            const [data, setData] = useState(null);
            const [queue, setQueue] = useState([]);
            const [devices, setDevices] = useState([]);
            const [layout, setLayout] = useState("tv"); 
            const [jamUrl, setJamUrl] = useState(window.localStorage.getItem("jam_url") || "");
            const [isLoading, setIsLoading] = useState(!!token);

            // Auth logic
            useEffect(() => {
                const urlParams = new URLSearchParams(window.location.search);
                const code = urlParams.get('code');
                if (code) {
                    const getToken = async () => {
                        const codeVerifier = window.localStorage.getItem('code_verifier');
                        try {
                            const response = await fetch('https://accounts.spotify.com/api/token', {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                                body: new URLSearchParams({
                                    client_id: CLIENT_ID,
                                    grant_type: 'authorization_code',
                                    code: code,
                                    redirect_uri: REDIRECT_URI,
                                    code_verifier: codeVerifier,
                                }),
                            });
                            const result = await response.json();
                            if (result.access_token) {
                                setToken(result.access_token);
                                window.localStorage.setItem("spotify_token", result.access_token);
                                window.history.replaceState({}, document.title, window.location.pathname);
                            }
                        } catch (e) { console.error(e); }
                    };
                    getToken();
                }
            }, []);

            // Data polling
            useEffect(() => {
                if (!token) return;
                
                const fetchData = async () => {
                    const headers = { Authorization: `Bearer ${token}` };
                    try {
                        const playerRes = await fetch("https://api.spotify.com/v1/me/player", { headers });
                        if (playerRes.status === 200) setData(await playerRes.json());
                        else if (playerRes.status === 204) setData(null);

                        const queueRes = await fetch("https://api.spotify.com/v1/me/player/queue", { headers });
                        if (queueRes.status === 200) {
                            const q = await queueRes.json();
                            setQueue(q.queue || []);
                        }

                        const deviceRes = await fetch("https://api.spotify.com/v1/me/player/devices", { headers });
                        if (deviceRes.status === 200) {
                            const d = await deviceRes.json();
                            setDevices(d.devices || []);
                        }
                    } catch (e) { console.error(e); }
                    finally { setIsLoading(false); }
                };

                fetchData();
                const i = setInterval(fetchData, 4000);
                return () => clearInterval(i);
            }, [token]);

            const transferPlayback = async (deviceId) => {
                if (!token || !deviceId) return;
                await fetch("https://api.spotify.com/v1/me/player", {
                    method: "PUT",
                    headers: { Authorization: `Bearer ${token}`, "Content-Type": "application/json" },
                    body: JSON.stringify({ device_ids: [deviceId], play: true })
                });
            };

            const login = async () => {
                const codeVerifier = generateRandomString(64);
                const hashed = await sha256(codeVerifier);
                const codeChallenge = base64encode(hashed);
                window.localStorage.setItem('code_verifier', codeVerifier);
                const params = new URLSearchParams({
                    response_type: 'code', client_id: CLIENT_ID,
                    scope: "user-read-currently-playing user-read-playback-state user-modify-playback-state",
                    code_challenge_method: 'S256', code_challenge: codeChallenge,
                    redirect_uri: REDIRECT_URI, show_dialog: true
                });
                window.location.href = `https://accounts.spotify.com/authorize?${params.toString()}`;
            };

            const handleLogout = () => {
                window.localStorage.clear();
                window.location.href = window.location.pathname;
            };

            if (!token) {
                return (
                    <div className="h-screen w-screen flex flex-col items-center justify-center bg-zinc-950 text-white relative overflow-hidden">
                        <div className="absolute inset-0 bg-gradient-to-br from-[#1DB954]/10 to-transparent"></div>
                        <h1 className="text-5xl font-black uppercase tracking-tighter mb-4 relative z-10">Jam Dashboard</h1>
                        <button onClick={login} className="bg-[#1DB954] text-black px-10 py-5 rounded-full font-black text-xl hover:scale-105 transition-transform relative z-10 shadow-[0_0_40px_rgba(29,185,84,0.4)]">
                            Spotify Login
                        </button>
                    </div>
                );
            }

            const renderLayout = () => {
                if (isLoading) return <div className="flex-grow flex items-center justify-center opacity-30 uppercase tracking-[1em] font-bold">Lade...</div>;
                if (!data?.item) return <div className="flex-grow flex items-center justify-center text-4xl font-black uppercase opacity-20 italic">Musik starten...</div>;

                const track = data.item;
                const progress = (data.progress_ms / track.duration_ms) * 100;
                const imageUrl = track?.album?.images?.[0]?.url;

                switch(layout) {
                    case "tv":
                        return (
                            <div className="flex-grow flex flex-row p-12 gap-16 overflow-hidden">
                                <div className="flex-grow flex flex-col justify-end gap-12">
                                    <div className="flex items-center gap-12">
                                        {imageUrl && <img src={imageUrl} className="w-80 h-80 rounded-[3rem] shadow-[0_40px_80px_rgba(0,0,0,0.8)]" />}
                                        <div className="max-w-4xl">
                                            <h1 className="text-[7rem] font-black tracking-tighter uppercase leading-[0.8] mb-6 drop-shadow-2xl">{track.name}</h1>
                                            <p className="text-4xl font-bold text-white/50 uppercase tracking-widest">{track.artists[0].name}</p>
                                        </div>
                                    </div>
                                    <div className="w-full max-w-6xl space-y-4">
                                        <div className="h-4 bg-white/10 rounded-full overflow-hidden">
                                            <div className="progress-bar" style={{width: `${progress}%`}}></div>
                                        </div>
                                        <div className="flex justify-between text-xs font-black uppercase tracking-[0.4em] text-white/30">
                                            <span>{track.album.name}</span>
                                            <span>{Math.floor(data.progress_ms/60000)}:{String(Math.floor(data.progress_ms%60000/1000)).padStart(2,'0')}</span>
                                        </div>
                                    </div>
                                </div>
                                <div className="w-[450px] shrink-0 flex flex-col gap-10">
                                    <div className="glass p-10 rounded-[3rem] flex-grow flex flex-col overflow-hidden">
                                        <h3 className="text-[10px] font-black uppercase tracking-[0.4em] text-[#1DB954] mb-8">Up Next</h3>
                                        <div className="flex-grow overflow-y-auto no-scrollbar space-y-8">
                                            {queue.slice(0, 10).map((t, i) => (
                                                <div key={i} className="flex items-center gap-6 opacity-80">
                                                    <img src={t.album?.images?.[2]?.url} className="w-12 h-12 rounded-xl" />
                                                    <div className="truncate"><p className="text-lg font-black uppercase truncate leading-tight">{t.name}</p></div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                    <div className="glass p-8 rounded-[3rem] flex items-center justify-between gap-6">
                                        <div className="ml-2"><p className="text-[10px] font-black uppercase text-white/40 mb-1">Jam beitreten</p><p className="text-2xl font-black uppercase italic tracking-tighter">Spotify</p></div>
                                        <CommonQR size="w-36" url={jamUrl} padding="p-3" />
                                    </div>
                                </div>
                            </div>
                        );
                    case "social":
                        return (
                            <div className="flex-grow flex flex-col p-12 gap-10">
                                <div className="flex items-center justify-between bg-black/40 p-8 px-12 rounded-[2.5rem] backdrop-blur-3xl border border-white/5">
                                    <div className="flex items-center gap-8">
                                        <div className="w-20 h-20 bg-[#1DB954]/20 rounded-full flex items-center justify-center">
                                            <img src="Logo.svg" className="w-12 h-12" />
                                        </div>
                                        <div>
                                            <h3 className="text-4xl font-black uppercase italic tracking-tighter">Live Session</h3>
                                            <p className="text-xs font-bold text-[#1DB954] uppercase tracking-[0.4em] mt-1">Open for Collaboration</p>
                                        </div>
                                    </div>
                                    <div className="flex items-center gap-12">
                                        <p className="text-sm font-bold text-white/40 uppercase tracking-[0.2em] text-right">Code scannen<br/>um Songs zu<br/>wünschen</p>
                                        <CommonQR size="w-64" url={jamUrl} padding="p-5" />
                                    </div>
                                </div>
                                <div className="flex-grow grid grid-cols-3 gap-10">
                                    <div className="col-span-2 glass rounded-[4rem] p-20 flex flex-col justify-end relative overflow-hidden">
                                        <div className="absolute inset-0 z-0">{imageUrl && <img src={imageUrl} className="w-full h-full object-cover opacity-20 blur-2xl" />}</div>
                                        <div className="relative z-10">
                                            {imageUrl && <img src={imageUrl} className="w-64 h-64 rounded-[3rem] shadow-2xl mb-12" />}
                                            <h1 className="text-[7rem] font-black uppercase tracking-tighter leading-[0.85] mb-4">{track.name}</h1>
                                            <p className="text-5xl font-bold text-white/50 uppercase italic">{track.artists[0].name}</p>
                                        </div>
                                    </div>
                                    <div className="glass rounded-[4rem] p-12 flex flex-col">
                                        <h4 className="text-[11px] font-black uppercase tracking-[0.5em] text-white/30 mb-10">Queue</h4>
                                        <div className="space-y-8 flex-grow">
                                            {queue.slice(0, 5).map((t, i) => (
                                                <div key={i} className="flex items-center gap-6">
                                                    <img src={t.album?.images?.[2]?.url} className="w-16 h-16 rounded-2xl" />
                                                    <div className="truncate">
                                                        <p className="text-xl font-black uppercase truncate">{t.name}</p>
                                                        <p className="text-xs font-bold text-white/40 truncate uppercase">{t.artists[0].name}</p>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        );
                    case "split":
                        return (
                            <div className="flex-grow grid grid-cols-2">
                                <div className="relative flex items-center justify-center border-r border-white/5">
                                    <div className="flex flex-col items-center w-full px-12 relative z-10 text-center">
                                        {imageUrl && <img src={imageUrl} className="w-3/4 max-w-md rounded-3xl shadow-[0_50px_100px_rgba(0,0,0,0.8)] mb-12" />}
                                        <h1 className="text-6xl font-black uppercase tracking-tighter italic mb-4">{track.name}</h1>
                                        <p className="text-3xl font-bold text-white/40 uppercase tracking-widest">{track.artists[0].name}</p>
                                    </div>
                                </div>
                                <div className="bg-black/50 backdrop-blur-3xl p-20 flex flex-col justify-between">
                                    <div className="space-y-12">
                                        <h2 className="text-sm font-black uppercase tracking-[0.6em] text-[#1DB954]">Queue List</h2>
                                        <div className="space-y-10">
                                            {queue.slice(0, 5).map((t, i) => (
                                                <div key={i} className="flex items-center gap-8">
                                                    <span className="text-3xl font-black opacity-10 italic">0{i+1}</span>
                                                    <img src={t.album?.images?.[2]?.url} className="w-16 h-16 rounded-2xl" />
                                                    <div className="truncate"><p className="text-xl font-black uppercase truncate">{t.name}</p></div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                    <div className="pt-16 border-t border-white/10 flex items-center justify-between">
                                        <div><p className="text-3xl font-black uppercase tracking-tighter mb-2">Join the Jam</p><p className="text-xs text-white/40 uppercase tracking-widest">Scan code to add music</p></div>
                                        <CommonQR size="w-48" url={jamUrl} padding="p-4" />
                                    </div>
                                </div>
                            </div>
                        );
                    case "minimal":
                        return (
                            <div className="flex-grow flex flex-col items-center justify-center text-center p-20">
                                {imageUrl && <img src={imageUrl} className="w-[32rem] h-[32rem] rounded-[5rem] shadow-2xl mb-16" />}
                                <h1 className="text-[6rem] font-black uppercase tracking-tighter leading-none italic mb-4">{track.name}</h1>
                                <p className="text-4xl font-light text-white/40 tracking-[0.2em] uppercase">{track.artists[0].name}</p>
                                <div className="w-96 mx-auto pt-16"><div className="h-1 bg-white/10 rounded-full"><div className="h-full bg-white rounded-full" style={{width: `${progress}%`}}></div></div></div>
                            </div>
                        );
                    case "vinyl":
                        return (
                            <div className="flex-grow flex items-center justify-center p-20 gap-24">
                                <div className="relative w-[550px] h-[550px] shrink-0">
                                    <div className="absolute inset-0 bg-zinc-900 rounded-full shadow-2xl flex items-center justify-center overflow-hidden vinyl-spin">
                                        <div className="w-full h-full opacity-30 bg-[repeating-radial-gradient(circle,transparent,transparent_2px,black_3px)]"></div>
                                        {imageUrl && <img src={imageUrl} className="absolute w-56 h-56 rounded-full border-4 border-zinc-800 z-10" />}
                                    </div>
                                    <div className="absolute top-1/2 left-[90%] w-64 h-3 bg-zinc-800 origin-left -rotate-[35deg] ml-8 rounded-full shadow-2xl border border-white/10"></div>
                                </div>
                                <div className="max-w-2xl space-y-12">
                                    <div className="space-y-6">
                                        <p className="text-xs font-black uppercase tracking-[1em] text-[#1DB954]">A-Side Playing</p>
                                        <h1 className="text-[6rem] font-black italic uppercase tracking-tighter leading-[0.8]">{track.name}</h1>
                                        <p className="text-4xl font-bold text-white/30 uppercase">{track.artists[0].name}</p>
                                    </div>
                                    <div className="flex items-center gap-10 glass p-10 rounded-[3rem]">
                                        <CommonQR size="w-40" url={jamUrl} padding="p-4" />
                                        <div className="space-y-4 flex-grow"><p className="text-[10px] font-bold text-white/30 uppercase tracking-[0.5em]">Groove Level {Math.floor(progress)}%</p><div className="h-2 bg-black/40 rounded-full"><div className="h-full bg-white shadow-[0_0_15px_#fff]" style={{width: `${progress}%`}}></div></div></div>
                                    </div>
                                </div>
                            </div>
                        );
                    case "massive":
                        return (
                            <div className="flex-grow flex flex-col justify-center px-24 font-black italic uppercase">
                                <h1 className="text-[18vw] leading-[0.75] tracking-tighter mb-12 drop-shadow-2xl">{track.name}</h1>
                                <div className="flex items-baseline gap-12">
                                    <p className="text-7xl text-white/40 font-bold">{track.artists[0].name}</p>
                                    <span className="flex-grow h-10 bg-white/5 rounded-full overflow-hidden"><div className="h-full bg-[#1DB954]" style={{width: `${progress}%`}}></div></span>
                                </div>
                            </div>
                        );
                    default: return null;
                }
            };

            return (
                <div className="relative h-screen w-screen overflow-hidden bg-black select-none">
                    <div className="bg-dynamic">
                        {data?.item?.album?.images[0]?.url && <div className="bg-layer" style={{ backgroundImage: `url(${data.item.album.images[0].url})` }}></div>}
                        <div className="overlay-vignette"></div>
                    </div>

                    <div className="app-container">
                        <header className="p-12 flex justify-between items-start">
                            <img src="Logo.svg" className="w-16 h-16 opacity-60" />
                            <div className="text-right">
                                <p className="text-5xl font-black italic tracking-tighter opacity-80">{new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</p>
                                <p className="text-[10px] font-black uppercase tracking-[0.6em] mt-2 text-[#1DB954]">{layout} View Mode</p>
                            </div>
                        </header>
                        
                        {renderLayout()}
                    </div>

                    <div className="trigger-zone"></div>
                    <div className="system-dock">
                        <div className="flex gap-2 mr-4">
                            {['tv', 'social', 'split', 'vinyl', 'minimal', 'massive'].map(mode => (
                                <div key={mode} className={`dock-item ${layout === mode ? 'active' : ''}`} onClick={() => setLayout(mode)}>{mode}</div>
                            ))}
                        </div>
                        
                        <div className="w-[1px] h-8 bg-white/10 mx-2"></div>
                        
                        {/* Device Selector */}
                        <div className="flex flex-col">
                            <label className="text-[9px] font-bold text-white/30 uppercase tracking-widest mb-1 ml-1">Wiedergabe auf:</label>
                            <select 
                                className="custom-select"
                                value={data?.device?.id || ""}
                                onChange={(e) => transferPlayback(e.target.value)}
                            >
                                <option value="" disabled>Gerät wählen...</option>
                                {devices.map(d => (
                                    <option key={d.id} value={d.id}>
                                        {d.is_active ? '● ' : ''}{d.name} ({d.type})
                                    </option>
                                ))}
                            </select>
                        </div>

                        <div className="w-[1px] h-8 bg-white/10 mx-2"></div>

                        <input 
                            className="bg-white/5 border border-white/10 px-4 py-2.5 rounded-xl text-[10px] font-bold text-white outline-none w-64 focus:bg-white/10" 
                            placeholder="Spotify Jam Link einfügen..." 
                            value={jamUrl} 
                            onChange={(e) => {
                                setJamUrl(e.target.value); 
                                window.localStorage.setItem("jam_url", e.target.value);
                            }} 
                        />
                        
                        <div className="dock-item text-red-500/50 hover:!text-red-500 hover:bg-red-500/10" onClick={handleLogout}>Logout</div>
                    </div>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
