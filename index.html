<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jam Dashboard OS - v2.1.0</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap');
        
        body { 
            background-color: #000; 
            color: #fff; 
            font-family: 'Inter', sans-serif; 
            overflow: hidden; 
            margin: 0;
            user-select: none;
        }

        .desktop {
            height: 100vh;
            width: 100vw;
            background: radial-gradient(circle at center, #111 0%, #000 100%);
            position: relative;
            overflow: hidden;
        }

        .scanline {
            width: 100%; height: 100%;
            position: absolute; top: 0; left: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.03) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.01), rgba(0, 255, 0, 0.005), rgba(0, 0, 255, 0.01));
            background-size: 100% 4px, 3px 100%;
            pointer-events: none;
            z-index: 1000;
        }

        /* Fenster System */
        .window {
            position: absolute;
            background: rgba(20, 20, 20, 0.7);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1.5rem;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            min-width: 200px;
            min-height: 150px;
            overflow: hidden;
            z-index: 10;
        }

        .window-header {
            padding: 0.75rem 1rem;
            background: rgba(255, 255, 255, 0.03);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: move;
        }

        .window-content {
            flex-grow: 1;
            padding: 1.5rem;
            overflow: auto;
            scrollbar-width: none;
        }
        .window-content::-webkit-scrollbar { display: none; }

        .resize-handle {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 20px;
            height: 20px;
            cursor: nwse-resize;
            background: linear-gradient(135deg, transparent 50%, rgba(255,255,255,0.2) 50%);
        }

        .album-art {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
            border-radius: 1rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .progress-bar {
            height: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            overflow: hidden;
            margin-top: 1rem;
        }
        .progress-fill {
            height: 100%;
            background: #1DB954;
            transition: width 1s linear;
        }

        /* Dock */
        .taskbar {
            position: absolute;
            bottom: 1.5rem;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(10, 10, 10, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 0.5rem;
            border-radius: 2rem;
            display: flex;
            gap: 0.5rem;
            z-index: 1100;
        }

        .task-btn {
            width: 45px;
            height: 45px;
            border-radius: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255,255,255,0.05);
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid transparent;
        }
        .task-btn:hover { background: rgba(255,255,255,0.1); transform: scale(1.1); }
        .task-btn.active { border-color: #1DB954; background: rgba(29, 185, 84, 0.1); }

        #qrcode canvas {
            width: 100% !important;
            height: auto !important;
            border-radius: 0.5rem;
        }

        .queue-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.5rem;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const CLIENT_ID = "52f166f3b18a4aee8d2a91649a371134"; 
        const REDIRECT_URI = "https://julian4-spot.github.io/jam-dashboard/";

        // Drag & Drop Hook
        function useDraggable(initialPos, initialSize) {
            const [pos, setPos] = useState(initialPos);
            const [size, setSize] = useState(initialSize);
            const [isDragging, setIsDragging] = useState(false);
            const [isResizing, setIsResizing] = useState(false);

            const onMouseDown = (e) => {
                if (e.target.closest('.resize-handle')) {
                    setIsResizing(true);
                    return;
                }
                setIsDragging(true);
            };

            useEffect(() => {
                const handleMouseMove = (e) => {
                    if (isDragging) {
                        setPos(p => ({ x: p.x + e.movementX, y: p.y + e.movementY }));
                    }
                    if (isResizing) {
                        setSize(s => ({ 
                            width: Math.max(200, s.width + e.movementX), 
                            height: Math.max(150, s.height + e.movementY) 
                        }));
                    }
                };
                const handleMouseUp = () => {
                    setIsDragging(false);
                    setIsResizing(false);
                };

                if (isDragging || isResizing) {
                    window.addEventListener('mousemove', handleMouseMove);
                    window.addEventListener('mouseup', handleMouseUp);
                }
                return () => {
                    window.removeEventListener('mousemove', handleMouseMove);
                    window.removeEventListener('mouseup', handleMouseUp);
                };
            }, [isDragging, isResizing]);

            return { pos, size, onMouseDown };
        }

        // Fenster Komponente
        const Window = ({ title, children, initialPos, initialSize, visible, onClose }) => {
            const { pos, size, onMouseDown } = useDraggable(initialPos, initialSize);
            if (!visible) return null;

            return (
                <div 
                    className="window"
                    style={{ 
                        left: pos.x, 
                        top: pos.y, 
                        width: size.width, 
                        height: size.height 
                    }}
                >
                    <div className="window-header" onMouseDown={onMouseDown}>
                        <span className="text-[10px] font-black uppercase tracking-widest text-white/50">{title}</span>
                        <div className="flex gap-2">
                            <div className="w-2.5 h-2.5 rounded-full bg-white/10 hover:bg-red-500 cursor-pointer" onClick={onClose}></div>
                        </div>
                    </div>
                    <div className="window-content">
                        {children}
                    </div>
                    <div className="resize-handle"></div>
                </div>
            );
        };

        function App() {
            const [token, setToken] = useState(window.localStorage.getItem("spotify_token") || "");
            const [data, setData] = useState(null);
            const [queue, setQueue] = useState([]);
            const [jamUrl, setJamUrl] = useState(window.localStorage.getItem("jam_url") || "");
            
            // Sichtbarkeit
            const [wins, setWins] = useState({ player: true, qr: true, queue: true });

            const qrRef = useRef(null);

            // Login Logic (Identisch geblieben)
            useEffect(() => {
                const urlParams = new URLSearchParams(window.location.search);
                const code = urlParams.get('code');
                if (code) {
                    const getToken = async () => {
                        const body = await fetch('https://accounts.spotify.com/api/token', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                            body: new URLSearchParams({
                                client_id: CLIENT_ID,
                                grant_type: 'authorization_code',
                                code: code,
                                redirect_uri: REDIRECT_URI,
                                code_verifier: window.localStorage.getItem('code_verifier'),
                            }),
                        });
                        const response = await body.json();
                        if (response.access_token) {
                            setToken(response.access_token);
                            window.localStorage.setItem("spotify_token", response.access_token);
                            window.history.replaceState({}, document.title, window.location.pathname);
                        }
                    };
                    getToken();
                }
            }, []);

            useEffect(() => {
                if (!token) return;
                const fetchData = async () => {
                    try {
                        const pRes = await fetch("https://api.spotify.com/v1/me/player", { headers: { Authorization: `Bearer ${token}` } });
                        if (pRes.status === 200) setData(await pRes.json());
                        const qRes = await fetch("https://api.spotify.com/v1/me/player/queue", { headers: { Authorization: `Bearer ${token}` } });
                        if (qRes.status === 200) setQueue((await qRes.json()).queue.slice(0, 5));
                    } catch (e) {}
                };
                fetchData();
                const i = setInterval(fetchData, 3000);
                return () => clearInterval(i);
            }, [token]);

            useEffect(() => {
                if (wins.qr && jamUrl && qrRef.current) {
                    qrRef.current.innerHTML = "";
                    new QRCode(qrRef.current, { text: jamUrl, width: 256, height: 256 });
                }
            }, [wins.qr, jamUrl]);

            if (!token) return (
                <div className="desktop flex items-center justify-center">
                    <button className="bg-white text-black px-10 py-4 rounded-full font-black uppercase tracking-widest" onClick={() => window.location.href=`https://accounts.spotify.com/authorize?${new URLSearchParams({response_type:'code',client_id:CLIENT_ID,scope:'user-read-currently-playing user-read-playback-state',redirect_uri:REDIRECT_URI}).toString()}`}>Login</button>
                </div>
            );

            return (
                <div className="desktop">
                    <div className="scanline"></div>

                    {/* Musik Fenster */}
                    <Window 
                        title="Now Playing" 
                        initialPos={{x: 50, y: 50}} 
                        initialSize={{width: 400, height: 600}}
                        visible={wins.player}
                        onClose={() => setWins({...wins, player: false})}
                    >
                        {data && data.item ? (
                            <div className="flex flex-col gap-6">
                                <img src={data.item.album.images[0].url} className="album-art" />
                                <div>
                                    <h1 className="text-2xl font-black italic uppercase leading-none truncate">{data.item.name}</h1>
                                    <p className="text-white/40 font-bold truncate">{data.item.artists[0].name}</p>
                                </div>
                                <div className="progress-bar">
                                    <div className="progress-fill" style={{width: `${(data.progress_ms / data.item.duration_ms) * 100}%`}}></div>
                                </div>
                            </div>
                        ) : <p className="text-center py-20 text-white/20 uppercase font-black tracking-tighter">No Signal</p>}
                    </Window>

                    {/* QR Code Fenster */}
                    <Window 
                        title="Jam Joiner" 
                        initialPos={{x: 500, y: 50}} 
                        initialSize={{width: 280, height: 420}}
                        visible={wins.qr}
                        onClose={() => setWins({...wins, qr: false})}
                    >
                        <div className="flex flex-col gap-4">
                            <div id="qrcode" ref={qrRef} className="bg-white p-4 rounded-xl"></div>
                            <input 
                                type="text" 
                                placeholder="Link..." 
                                className="bg-white/5 border border-white/10 p-3 rounded-lg text-xs"
                                value={jamUrl}
                                onChange={(e) => setJamUrl(e.target.value)}
                            />
                        </div>
                    </Window>

                    {/* Queue Fenster */}
                    <Window 
                        title="Queue" 
                        initialPos={{x: 820, y: 50}} 
                        initialSize={{width: 300, height: 450}}
                        visible={wins.queue}
                        onClose={() => setWins({...wins, queue: false})}
                    >
                        <div className="space-y-1">
                            {queue.map((track, i) => (
                                <div key={i} className="queue-item">
                                    <img src={track.album.images[2].url} className="w-8 h-8 rounded" />
                                    <div className="truncate">
                                        <p className="text-[10px] font-bold truncate">{track.name}</p>
                                        <p className="text-[9px] text-white/30 truncate">{track.artists[0].name}</p>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </Window>

                    {/* Dock */}
                    <div className="taskbar">
                        <div className={`task-btn ${wins.player ? 'active' : ''}`} onClick={() => setWins({...wins, player: !wins.player})}>🎵</div>
                        <div className={`task-btn ${wins.qr ? 'active' : ''}`} onClick={() => setWins({...wins, qr: !wins.qr})}>📱</div>
                        <div className={`task-btn ${wins.queue ? 'active' : ''}`} onClick={() => setWins({...wins, queue: !wins.queue})}>📜</div>
                        <div className="w-[1px] h-6 bg-white/10 mx-2 self-center"></div>
                        <div className="task-btn text-red-500" onClick={() => {window.localStorage.clear(); window.location.reload();}}>❌</div>
                    </div>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
