<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jam Dashboard - v3.4.0</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800;900&family=Unbounded:wght@400;900&family=Space+Grotesk:wght@300;700&display=swap');
        
        body { 
            background-color: #000; 
            color: #fff; 
            font-family: 'Inter', sans-serif; 
            overflow: hidden; 
            margin: 0;
        }

        .bg-dynamic {
            position: fixed;
            inset: 0;
            z-index: 0;
        }

        .bg-layer {
            position: absolute;
            inset: -5%;
            background-size: cover;
            background-position: center;
            filter: brightness(0.25) saturate(1.2) blur(60px);
            transition: background-image 2s ease-in-out;
        }

        .overlay-vignette {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at center, transparent 0%, rgba(0,0,0,0.9) 100%);
        }

        .app-container {
            position: relative;
            z-index: 10;
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
        }

        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .system-dock {
            position: fixed;
            bottom: -120px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(10, 10, 10, 0.98);
            backdrop-filter: blur(30px);
            padding: 1.2rem 2.5rem;
            border-radius: 2.5rem 2.5rem 0 0;
            border: 1px solid rgba(255,255,255,0.1);
            display: flex;
            gap: 0.8rem;
            z-index: 1000;
            transition: bottom 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            max-width: 90vw;
        }

        .trigger-zone:hover + .system-dock, .system-dock:hover {
            bottom: 0;
        }

        .trigger-zone {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 50px;
            z-index: 999;
        }

        .dock-item {
            padding: 0.6rem 1rem;
            border-radius: 1rem;
            font-size: 0.65rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            cursor: pointer;
            transition: all 0.2s;
            color: rgba(255,255,255,0.4);
            white-space: nowrap;
        }

        .dock-item:hover { color: #fff; background: rgba(255,255,255,0.1); }
        .dock-item.active { background: #fff; color: #000; }

        .progress-bar {
            height: 100%;
            background: #fff;
            transition: width 1s linear;
        }

        .massive-text { font-family: 'Unbounded', sans-serif; }

        .qr-wrapper canvas, .qr-wrapper img {
            width: 100% !important;
            height: auto !important;
            display: block;
        }

        @keyframes rotate-vinyl {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .vinyl-spin { animation: rotate-vinyl 20s linear infinite; }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Tonarm Animation Optimierung */
        .tone-arm-container {
            position: absolute;
            top: 5%;
            right: 0%;
            width: 320px;
            height: 400px;
            transform-origin: 260px 60px;
            transition: transform 1.5s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 30;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const CLIENT_ID = "52f166f3b18a4aee8d2a91649a371134"; 
        const REDIRECT_URI = window.location.origin + window.location.pathname;

        const generateRandomString = (length) => {
            const possible = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
            const values = crypto.getRandomValues(new Uint8Array(length));
            return values.reduce((acc, x) => acc + possible[x % possible.length], "");
        };

        const sha256 = async (plain) => {
            const encoder = new TextEncoder();
            const data = encoder.encode(plain);
            return window.crypto.subtle.digest('SHA-256', data);
        };

        const base64encode = (input) => {
            return btoa(String.fromCharCode(...new Uint8Array(input)))
                .replace(/=/g, '').replace(/\+/g, '-').replace(/\//g, '_');
        };

        const CommonQR = ({ size = "w-32", url, padding = "p-2" }) => {
            const localRef = useRef(null);
            useEffect(() => {
                if (localRef.current) {
                    localRef.current.innerHTML = "";
                    try {
                        new QRCode(localRef.current, {
                            text: url || "https://spotify.com", 
                            width: 512, height: 512,
                            colorDark: "#000000", colorLight: "#ffffff",
                            correctLevel : QRCode.CorrectLevel.H
                        });
                    } catch (e) { console.error("QR Error", e); }
                }
            }, [url]);

            return (
                <div className={`${size} bg-white rounded-2xl shadow-2xl flex items-center justify-center ${padding}`}>
                    <div ref={localRef} className="w-full h-full"></div>
                </div>
            );
        };

        function App() {
            const [token, setToken] = useState(window.localStorage.getItem("spotify_token") || "");
            const [data, setData] = useState(null);
            const [queue, setQueue] = useState([]);
            const [layout, setLayout] = useState("tv"); 
            const [jamUrl, setJamUrl] = useState(window.localStorage.getItem("jam_url") || "");
            const [isLoading, setIsLoading] = useState(!!token);

            useEffect(() => {
                const urlParams = new URLSearchParams(window.location.search);
                const code = urlParams.get('code');
                if (code) {
                    const getToken = async () => {
                        const codeVerifier = window.localStorage.getItem('code_verifier');
                        try {
                            const response = await fetch('https://accounts.spotify.com/api/token', {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                                body: new URLSearchParams({
                                    client_id: CLIENT_ID,
                                    grant_type: 'authorization_code',
                                    code: code,
                                    redirect_uri: REDIRECT_URI,
                                    code_verifier: codeVerifier,
                                }),
                            });
                            const result = await response.json();
                            if (result.access_token) {
                                setToken(result.access_token);
                                window.localStorage.setItem("spotify_token", result.access_token);
                                window.history.replaceState({}, document.title, window.location.pathname);
                            }
                        } catch (e) { console.error(e); }
                    };
                    getToken();
                }
            }, []);

            useEffect(() => {
                if (!token) return;
                const fetchData = async () => {
                    try {
                        const headers = { Authorization: `Bearer ${token}` };
                        const playerRes = await fetch("https://api.spotify.com/v1/me/player", { headers });
                        if (playerRes.status === 200) setData(await playerRes.json());
                        else if (playerRes.status === 204) setData(null);
                        else if (playerRes.status === 401) handleLogout();

                        const queueRes = await fetch("https://api.spotify.com/v1/me/player/queue", { headers });
                        if (queueRes.status === 200) setQueue((await queueRes.json()).queue || []);
                    } catch (e) { console.error(e); } finally { setIsLoading(false); }
                };
                fetchData();
                const i = setInterval(fetchData, 3000);
                return () => clearInterval(i);
            }, [token]);

            const login = async () => {
                const codeVerifier = generateRandomString(64);
                const hashed = await sha256(codeVerifier);
                const codeChallenge = base64encode(hashed);
                window.localStorage.setItem('code_verifier', codeVerifier);
                const params = new URLSearchParams({
                    response_type: 'code', client_id: CLIENT_ID,
                    scope: "user-read-currently-playing user-read-playback-state",
                    code_challenge_method: 'S256', code_challenge: codeChallenge,
                    redirect_uri: REDIRECT_URI, show_dialog: true
                });
                window.location.href = `https://accounts.spotify.com/authorize?${params.toString()}`;
            };

            const handleLogout = () => {
                window.localStorage.clear();
                window.location.href = window.location.pathname;
            };

            if (!token) {
                return (
                    <div className="h-screen w-screen flex flex-col items-center justify-center bg-zinc-950 text-white">
                        <img src="Logo.svg" alt="Logo" className="w-24 h-24 mb-10 opacity-80" />
                        <h1 className="text-5xl font-black uppercase tracking-tighter mb-4">Jam Dashboard</h1>
                        <button onClick={login} className="bg-[#1DB954] text-black px-10 py-5 rounded-full font-black text-xl shadow-[0_0_40px_rgba(29,185,84,0.3)]">Spotify Login</button>
                    </div>
                );
            }

            const renderLayout = () => {
                if (isLoading) return <div className="flex-grow flex items-center justify-center opacity-30 uppercase tracking-[1em]">Initialisierung...</div>;
                if (!data?.item) return <div className="flex-grow flex flex-col items-center justify-center text-center p-10"><h2 className="text-4xl font-black uppercase mb-4">Warte auf Musik</h2><p className="opacity-50">Starte eine Wiedergabe in deiner Spotify App</p></div>;

                const track = data.item;
                const progress = (data.progress_ms / track.duration_ms) * 100;
                const imageUrl = track?.album?.images?.[0]?.url;
                const safeQueue = queue || [];

                switch(layout) {
                    case "tv":
                        return (
                            <div className="flex-grow flex flex-row p-16 gap-16 overflow-hidden">
                                <div className="flex-grow flex flex-col justify-end gap-12">
                                    <div className="flex items-end gap-12">
                                        {imageUrl && <img src={imageUrl} className="w-80 h-80 rounded-[3rem] shadow-2xl border border-white/10" />}
                                        <div className="pb-4">
                                            <h1 className="text-[6.5rem] font-black tracking-tighter uppercase leading-[0.8] mb-6">{track.name}</h1>
                                            <p className="text-4xl font-bold text-white/60 uppercase tracking-wide">{track.artists[0].name}</p>
                                        </div>
                                    </div>
                                    <div className="w-full max-w-6xl space-y-6">
                                        <div className="h-4 bg-white/10 rounded-full overflow-hidden">
                                            <div className="progress-bar" style={{width: `${progress}%`}}></div>
                                        </div>
                                        <div className="flex justify-between text-[14px] font-black uppercase tracking-[0.4em] text-white/40">
                                            <span>{track.album.name}</span>
                                            <div className="flex gap-4">
                                                <span>{Math.floor(data.progress_ms/60000)}:{String(Math.floor(data.progress_ms%60000/1000)).padStart(2,'0')}</span>
                                                <span className="text-white/10">/</span>
                                                <span>{Math.floor(track.duration_ms/60000)}:{String(Math.floor(track.duration_ms%60000/1000)).padStart(2,'0')}</span>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                <div className="w-[450px] shrink-0 flex flex-col gap-10">
                                    <div className="glass p-10 rounded-[3.5rem] flex-grow flex flex-col overflow-hidden">
                                        <h3 className="text-[12px] font-black uppercase tracking-[0.4em] text-white/30 mb-10">Up Next</h3>
                                        <div className="flex-grow overflow-y-auto no-scrollbar space-y-8">
                                            {safeQueue.slice(0, 8).map((t, i) => (
                                                <div key={i} className="flex items-center gap-6">
                                                    <img src={t.album?.images?.[2]?.url} className="w-12 h-12 rounded-xl" />
                                                    <div className="truncate"><p className="text-lg font-black uppercase truncate">{t.name}</p></div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                    <div className="glass p-10 rounded-[3.5rem] flex items-center justify-between gap-8">
                                        <div><p className="text-[12px] font-black uppercase text-[#1DB954] mb-2 tracking-widest">Jam Join</p><p className="text-2xl font-black uppercase tracking-tighter">Scan to Add</p></div>
                                        <CommonQR size="w-36" url={jamUrl} padding="p-3" />
                                    </div>
                                </div>
                            </div>
                        );
                    case "vinyl":
                        return (
                            <div className="flex-grow flex items-center justify-center p-20 gap-24 relative overflow-hidden">
                                <div className="relative w-[580px] h-[580px] shrink-0">
                                    {/* Vinyl Platte */}
                                    <div className="absolute inset-4 bg-[#0a0a0a] rounded-full shadow-[0_0_150px_rgba(0,0,0,1)] flex items-center justify-center overflow-hidden vinyl-spin border-[12px] border-zinc-900/80">
                                        <div className="absolute inset-0 opacity-60 bg-[repeating-radial-gradient(circle,transparent,transparent_1px,#000_3px)]"></div>
                                        {imageUrl && <img src={imageUrl} className="absolute w-60 h-60 rounded-full border-[12px] border-[#0a0a0a] z-10 shadow-2xl" />}
                                        <div className="absolute w-5 h-5 bg-zinc-900 rounded-full z-20 shadow-xl border border-white/20"></div>
                                    </div>
                                    
                                    {/* Tonarm / Nadel Optimiert */}
                                    <div className="tone-arm-container" style={{ transform: `rotate(${8 + (progress * 0.28)}deg)` }}>
                                        <svg width="320" height="400" viewBox="0 0 320 400" fill="none">
                                            <defs>
                                                <linearGradient id="armGrad" x1="0%" y1="0%" x2="100%" y2="0%">
                                                    <stop offset="0%" style={{stopColor: '#333'}} />
                                                    <stop offset="50%" style={{stopColor: '#666'}} />
                                                    <stop offset="100%" style={{stopColor: '#222'}} />
                                                </linearGradient>
                                            </defs>
                                            {/* Basis Gelenk */}
                                            <circle cx="260" cy="60" r="35" fill="#1a1a1a" stroke="#333" strokeWidth="2" />
                                            <circle cx="260" cy="60" r="15" fill="#222" />
                                            <circle cx="260" cy="60" r="5" fill="#444" />
                                            
                                            {/* Der Arm (S-Shape angedeutet) */}
                                            <path d="M260 60 Q200 100 160 200 L65 345" stroke="url(#armGrad)" strokeWidth="14" strokeLinecap="round" />
                                            <path d="M260 60 Q200 100 160 200 L65 345" stroke="rgba(255,255,255,0.1)" strokeWidth="4" strokeLinecap="round" transform="translate(2,0)" />
                                            
                                            {/* Headshell / Nadelhalter */}
                                            <g transform="translate(65, 345) rotate(-35)">
                                                <rect x="-10" y="0" width="35" height="50" rx="4" fill="#111" />
                                                <rect x="-8" y="5" width="31" height="15" rx="2" fill="#222" />
                                                {/* Die Nadel selbst */}
                                                <path d="M7 45 L7 55" stroke="#aaa" strokeWidth="2" />
                                                <path d="M7 55 L5 58 L9 58 Z" fill="#ccc" /> 
                                                {/* Finger Lift */}
                                                <path d="M25 10 C35 10 40 20 35 25" stroke="#333" strokeWidth="3" fill="none" strokeLinecap="round" />
                                            </g>
                                            
                                            {/* Gegengewicht am Ende */}
                                            <rect x="245" y="10" width="30" height="40" rx="5" fill="#222" transform="rotate(-15 260 60)" />
                                        </svg>
                                    </div>
                                </div>
                                <div className="max-w-xl space-y-12 w-full z-10">
                                    <div className="space-y-4">
                                        <p className="text-[14px] font-black uppercase tracking-[1em] text-[#1DB954]">Now Spinning</p>
                                        <h1 className="text-[5.5rem] font-black italic uppercase tracking-tighter leading-[0.85]">{track.name}</h1>
                                        <p className="text-4xl font-bold text-white/40 italic">{track.artists[0].name}</p>
                                    </div>
                                    <div className="flex items-center gap-12 bg-white/5 p-8 rounded-[3rem] backdrop-blur-xl border border-white/10">
                                        <CommonQR size="w-44" url={jamUrl} padding="p-4" />
                                        <div className="space-y-6 flex-grow">
                                            <p className="text-[12px] font-bold text-white/40 uppercase tracking-[0.4em]">Tracking Progress</p>
                                            <div className="h-2 bg-black/50 rounded-full overflow-hidden"><div className="h-full bg-white shadow-[0_0_10px_white]" style={{width: `${progress}%`}}></div></div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        );
                    case "social":
                        return (
                            <div className="flex-grow flex flex-col p-12 gap-10">
                                <div className="flex items-center justify-between bg-black/60 p-8 px-12 rounded-[3rem] backdrop-blur-2xl border border-white/10">
                                    <div className="flex items-center gap-8">
                                        <div className="w-16 h-16 bg-[#1DB954] rounded-full flex items-center justify-center shadow-[0_0_30px_rgba(29,185,84,0.4)]">
                                            <img src="Logo.svg" className="w-10 h-10 invert" />
                                        </div>
                                        <div>
                                            <h3 className="text-3xl font-black uppercase italic tracking-tighter">Social Jam Session</h3>
                                            <p className="text-[12px] font-black text-[#1DB954] uppercase tracking-[0.4em] flex items-center gap-3">
                                                <span className="w-3 h-3 rounded-full bg-[#1DB954] animate-pulse"></span>
                                                Active & Open
                                            </p>
                                        </div>
                                    </div>
                                    <div className="text-right">
                                        <p className="text-sm font-bold text-white/40 uppercase tracking-[0.3em]">Gestaltet von</p>
                                        <p className="text-xl font-black uppercase">Community Hub</p>
                                    </div>
                                </div>
                                <div className="flex-grow grid grid-cols-12 gap-10">
                                    <div className="col-span-7 glass rounded-[4rem] p-16 flex flex-col justify-end relative overflow-hidden">
                                        <div className="absolute inset-0 z-0 opacity-40 blur-3xl scale-125">
                                            {imageUrl && <img src={imageUrl} className="w-full h-full object-cover" />}
                                        </div>
                                        <div className="relative z-10">
                                            {imageUrl && <img src={imageUrl} className="w-64 h-64 rounded-[3rem] shadow-2xl mb-12 border border-white/20" />}
                                            <h1 className="text-[7vw] font-black uppercase tracking-tighter leading-[0.85] mb-6 drop-shadow-2xl">{track.name}</h1>
                                            <p className="text-4xl font-bold text-white/60 uppercase tracking-widest">{track.artists[0].name}</p>
                                            <div className="mt-16 h-4 bg-black/60 rounded-full overflow-hidden border border-white/10 p-1">
                                                <div className="h-full bg-[#1DB954] rounded-full shadow-[0_0_15px_rgba(29,185,84,0.6)]" style={{width: `${progress}%`}}></div>
                                            </div>
                                        </div>
                                    </div>
                                    <div className="col-span-5 flex flex-col gap-10">
                                        <div className="glass rounded-[4rem] p-10 flex flex-col items-center justify-center text-center bg-[#1DB954]/5 border-[#1DB954]/20">
                                            <h4 className="text-[14px] font-black uppercase tracking-[0.5em] text-[#1DB954] mb-8 italic">Scan to Join the Party</h4>
                                            <div className="w-full max-w-[360px] aspect-square transform hover:scale-105 transition-transform duration-500">
                                                <CommonQR size="w-full" url={jamUrl} padding="p-6" />
                                            </div>
                                        </div>
                                        {/* Warteschlange - Nächste 5 Lieder */}
                                        <div className="glass rounded-[4rem] p-10 flex-grow flex flex-col">
                                            <h3 className="text-[11px] font-black uppercase tracking-[0.4em] text-white/30 mb-8">Coming Up Next</h3>
                                            <div className="space-y-6">
                                                {safeQueue.slice(0, 5).map((t, i) => (
                                                    <div key={i} className="flex items-center gap-5 opacity-80 hover:opacity-100 transition-opacity">
                                                        <img src={t.album?.images?.[2]?.url} className="w-10 h-10 rounded-lg shadow-lg" />
                                                        <div className="truncate flex-grow">
                                                            <p className="text-sm font-black uppercase truncate">{t.name}</p>
                                                            <p className="text-[10px] font-bold text-white/40 uppercase tracking-wider truncate">{t.artists[0].name}</p>
                                                        </div>
                                                        <div className="w-1 h-1 rounded-full bg-white/20"></div>
                                                    </div>
                                                ))}
                                                {safeQueue.length === 0 && <p className="text-white/20 text-xs italic">Warteschlange leer...</p>}
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        );
                    case "minimal":
                    case "massive":
                        return (
                            <div className="flex-grow flex items-center justify-center p-10">
                                <div className="text-center">
                                    <h1 className="text-8xl font-black italic uppercase mb-10 tracking-tighter">{track.name}</h1>
                                    <CommonQR size="w-64" url={jamUrl} padding="p-4" />
                                    <p className="mt-8 text-white/30 uppercase tracking-[1em] text-xs">Pure Experience</p>
                                </div>
                            </div>
                        );
                    default: return null;
                }
            };

            return (
                <div className="relative h-screen w-screen overflow-hidden bg-black select-none">
                    <div className="bg-dynamic">
                        {data?.item?.album?.images[0]?.url && (
                            <div className="bg-layer" style={{ backgroundImage: `url(${data.item.album.images[0].url})` }}></div>
                        )}
                        <div className="overlay-vignette"></div>
                    </div>

                    <div className="app-container">
                        <header className="p-10 flex justify-between items-center pointer-events-none">
                            <img src="Logo.svg" className="w-16 h-16 opacity-60" alt="Logo" />
                            <div className="text-right">
                                <p className="text-5xl font-black italic tracking-tighter opacity-80">{new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</p>
                                <div className="flex gap-4 items-center justify-end mt-2">
                                    <div className="px-3 py-1 bg-[#1DB954]/20 rounded-md border border-[#1DB954]/40">
                                        <p className="text-[10px] font-black uppercase tracking-[0.2em] text-[#1DB954]">{layout}</p>
                                    </div>
                                </div>
                            </div>
                        </header>
                        {renderLayout()}
                    </div>

                    <div className="trigger-zone"></div>
                    <div className="system-dock">
                        {['tv', 'vinyl', 'social', 'minimal', 'massive'].map(mode => (
                            <div key={mode} className={`dock-item ${layout === mode ? 'active' : ''}`} onClick={() => setLayout(mode)}>{mode}</div>
                        ))}
                        <div className="w-[1px] h-6 bg-white/10 mx-2"></div>
                        <input 
                            className="bg-white/5 border border-white/10 px-4 py-2 rounded-xl text-[11px] font-bold text-white outline-none w-64 focus:bg-[#1DB954]/10 focus:border-[#1DB954]/50 transition-all" 
                            placeholder="Spotify Jam Link einfügen..." 
                            value={jamUrl} 
                            onChange={(e) => {
                                setJamUrl(e.target.value); 
                                window.localStorage.setItem("jam_url", e.target.value);
                            }} 
                        />
                        <div className="dock-item text-red-500/60 hover:!text-red-500" onClick={handleLogout}>Logout</div>
                    </div>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
