<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jam Dashboard Pro - v2.0.0</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- QR Code Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap');
        
        body { 
            background-color: #000; 
            color: #fff; 
            font-family: 'Inter', sans-serif; 
            overflow: hidden; 
            margin: 0;
        }

        .main-container {
            height: 100vh;
            width: 100vw;
            background: radial-gradient(circle at center, #0a0a0a 0%, #000 100%);
            position: relative;
            display: flex;
            padding: 4rem;
        }

        /* Scanline Effekt */
        .scanline {
            width: 100%; height: 100%;
            position: absolute; top: 0; left: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.05) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.01), rgba(0, 255, 0, 0.005), rgba(0, 0, 255, 0.01));
            background-size: 100% 4px, 3px 100%;
            pointer-events: none;
            z-index: 50;
        }

        /* Dock System Styles */
        .glass-panel {
            background: rgba(15, 15, 15, 0.7);
            backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 2.5rem;
            box-shadow: 0 30px 60px -12px rgba(0,0,0,0.5);
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .album-art {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
            border-radius: 2rem;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
        }

        .song-title {
            font-size: 5rem;
            line-height: 1;
            font-weight: 900;
            font-style: italic;
            text-transform: uppercase;
            letter-spacing: -0.04em;
        }

        /* Fortschrittsbalken */
        .progress-container {
            height: 12px;
            background: rgba(255,255,255,0.05);
            border-radius: 100px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: #1DB954;
            box-shadow: 0 0 20px rgba(29, 185, 84, 0.5);
            transition: width 1s linear;
        }

        /* Steuerung (Dock) */
        .main-dock {
            position: absolute;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%) translateY(150%);
            background: rgba(20, 20, 20, 0.9);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 0.8rem;
            border-radius: 2rem;
            display: flex;
            gap: 0.5rem;
            z-index: 1000;
            transition: transform 0.4s ease;
        }
        body:hover .main-dock { transform: translateX(-50%) translateY(0); }

        .dock-btn {
            padding: 0.6rem 1.2rem;
            border-radius: 1.2rem;
            font-size: 11px;
            font-weight: 900;
            text-transform: uppercase;
            color: rgba(255,255,255,0.4);
            cursor: pointer;
            transition: all 0.2s;
        }
        .dock-btn.active { background: #1DB954; color: #000; }
        .dock-btn:hover:not(.active) { color: #fff; background: rgba(255,255,255,0.05); }

        #qrcode img {
            border-radius: 1rem;
            padding: 10px;
            background: white;
        }

        .queue-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.8rem;
            border-bottom: 1px solid rgba(255,255,255,0.03);
        }

        /* Animations */
        @keyframes pulse-green {
            0%, 100% { box-shadow: 0 0 20px rgba(29, 185, 84, 0.2); }
            50% { box-shadow: 0 0 40px rgba(29, 185, 84, 0.6); }
        }
        .live-dot { animation: pulse-green 2s infinite; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const CLIENT_ID = "52f166f3b18a4aee8d2a91649a371134"; 
        const REDIRECT_URI = "https://julian4-spot.github.io/jam-dashboard/";
        const VERSION = "v2.0.0 PRO";

        // PKCE Flow Utils (Bleiben identisch für Login-Funktion)
        const generateRandomString = (length) => {
            const possible = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
            const values = crypto.getRandomValues(new Uint8Array(length));
            return values.reduce((acc, x) => acc + possible[x % possible.length], "");
        };
        const sha256 = async (plain) => {
            const encoder = new TextEncoder();
            const data = encoder.encode(plain);
            return window.crypto.subtle.digest('SHA-256', data);
        };
        const base64encode = (input) => {
            return btoa(String.fromCharCode(...new Uint8Array(input)))
                .replace(/=/g, '')
                .replace(/\+/g, '-')
                .replace(/\//g, '_');
        };

        function App() {
            const [token, setToken] = useState(window.localStorage.getItem("spotify_token") || "");
            const [data, setData] = useState(null);
            const [queue, setQueue] = useState([]);
            const [jamUrl, setJamUrl] = useState(window.localStorage.getItem("jam_url") || "");
            
            // Sichtbarkeits-States für die Docks
            const [showQR, setShowQR] = useState(true);
            const [showQueue, setShowQueue] = useState(true);
            const [showInfo, setShowInfo] = useState(true);

            const qrRef = useRef(null);

            // Login Logic
            useEffect(() => {
                const urlParams = new URLSearchParams(window.location.search);
                const code = urlParams.get('code');
                if (code) {
                    const getToken = async () => {
                        const codeVerifier = window.localStorage.getItem('code_verifier');
                        const body = await fetch('https://accounts.spotify.com/api/token', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                            body: new URLSearchParams({
                                client_id: CLIENT_ID,
                                grant_type: 'authorization_code',
                                code: code,
                                redirect_uri: REDIRECT_URI,
                                code_verifier: codeVerifier,
                            }),
                        });
                        const response = await body.json();
                        if (response.access_token) {
                            setToken(response.access_token);
                            window.localStorage.setItem("spotify_token", response.access_token);
                            window.history.replaceState({}, document.title, window.location.pathname);
                        }
                    };
                    getToken();
                }
            }, []);

            // Data Fetching (Player & Queue)
            useEffect(() => {
                if (!token) return;
                const fetchData = async () => {
                    try {
                        // Current Playing
                        const playerRes = await fetch("https://api.spotify.com/v1/me/player", {
                            headers: { Authorization: `Bearer ${token}` }
                        });
                        if (playerRes.status === 200) setData(await playerRes.json());

                        // Queue
                        const queueRes = await fetch("https://api.spotify.com/v1/me/player/queue", {
                            headers: { Authorization: `Bearer ${token}` }
                        });
                        if (queueRes.status === 200) {
                            const qData = await queueRes.json();
                            setQueue(qData.queue.slice(0, 5)); // Nur die nächsten 5
                        }
                    } catch (e) { console.error(e); }
                };
                fetchData();
                const interval = setInterval(fetchData, 3000);
                return () => clearInterval(interval);
            }, [token]);

            // QR Code Generator
            useEffect(() => {
                if (showQR && jamUrl && qrRef.current) {
                    qrRef.current.innerHTML = "";
                    new QRCode(qrRef.current, {
                        text: jamUrl,
                        width: 180,
                        height: 180,
                        colorDark : "#000000",
                        colorLight : "#ffffff",
                        correctLevel : QRCode.CorrectLevel.H
                    });
                }
            }, [showQR, jamUrl]);

            const login = async () => {
                const codeVerifier = generateRandomString(64);
                const hashed = await sha256(codeVerifier);
                const codeChallenge = base64encode(hashed);
                window.localStorage.setItem('code_verifier', codeVerifier);
                const params = new URLSearchParams({
                    response_type: 'code',
                    client_id: CLIENT_ID,
                    scope: "user-read-currently-playing user-read-playback-state",
                    code_challenge_method: 'S256',
                    code_challenge: codeChallenge,
                    redirect_uri: REDIRECT_URI,
                    show_dialog: true
                });
                window.location.href = `https://accounts.spotify.com/authorize?${params.toString()}`;
            };

            if (!token) {
                return (
                    <div className="main-container flex-col justify-center items-center">
                        <div className="scanline"></div>
                        <h1 className="text-7xl font-black italic uppercase tracking-tighter mb-4">Jam Dashboard</h1>
                        <p className="text-zinc-600 font-bold tracking-[0.5em] mb-12 uppercase text-[10px]">Version 2.0.0 PRO / Visualizer Only</p>
                        <button onClick={login} className="bg-white text-black px-12 py-5 rounded-full font-black uppercase tracking-widest hover:bg-[#1DB954] hover:text-white transition-all shadow-2xl">
                            Dashboard Starten
                        </button>
                    </div>
                );
            }

            return (
                <div className="main-container overflow-hidden gap-10">
                    <div className="scanline"></div>

                    {/* Linke Spalte: Song Info */}
                    {showInfo && data && data.item && (
                        <div className="flex-[2] glass-panel p-12 flex flex-col justify-between z-10 animate-in slide-in-from-left duration-700">
                            <div className="space-y-10">
                                <img src={data.item.album.images[0].url} className="album-art" alt="Cover" />
                                <div className="space-y-2">
                                    <h1 className="song-title text-glow truncate">{data.item.name}</h1>
                                    <p className="text-4xl font-bold text-white/40 truncate">{data.item.artists.map(a => a.name).join(", ")}</p>
                                </div>
                            </div>
                            
                            <div className="space-y-6">
                                <div className="progress-container">
                                    <div className="progress-fill" style={{ width: `${(data.progress_ms / data.item.duration_ms) * 100}%` }}></div>
                                </div>
                                <div className="flex justify-between font-black text-[11px] tracking-widest text-zinc-500 uppercase">
                                    <div className="flex items-center gap-3 text-[#1DB954]">
                                        <div className="w-2 h-2 bg-[#1DB954] rounded-full live-dot"></div>
                                        <span>Live Jam Signal</span>
                                    </div>
                                    <span>{Math.floor(data.progress_ms / 60000)}:{String(Math.floor((data.progress_ms % 60000) / 1000)).padStart(2, '0')}</span>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Rechte Spalte: QR & Queue */}
                    <div className="flex-1 flex flex-col gap-10 z-10">
                        {/* QR Code Dock */}
                        {showQR && (
                            <div className="glass-panel p-10 flex flex-col items-center gap-6 animate-in slide-in-from-right duration-700">
                                <h3 className="font-black uppercase tracking-[0.3em] text-[10px] text-zinc-500">Join the Jam</h3>
                                <div id="qrcode" ref={qrRef} className="p-2 bg-white rounded-2xl shadow-2xl"></div>
                                <input 
                                    type="text" 
                                    placeholder="Jam Link hier einfügen..." 
                                    className="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-[10px] text-center focus:outline-none focus:border-[#1DB954] transition-all"
                                    value={jamUrl}
                                    onChange={(e) => {
                                        setJamUrl(e.target.value);
                                        window.localStorage.setItem("jam_url", e.target.value);
                                    }}
                                />
                            </div>
                        )}

                        {/* Queue Dock */}
                        {showQueue && (
                            <div className="glass-panel flex-grow p-10 animate-in slide-in-from-right duration-1000">
                                <h3 className="font-black uppercase tracking-[0.3em] text-[10px] text-zinc-500 mb-8">Up Next</h3>
                                <div className="space-y-2">
                                    {queue.length > 0 ? queue.map((track, i) => (
                                        <div key={i} className="queue-item group">
                                            <img src={track.album.images[2].url} className="w-12 h-12 rounded-lg opacity-50 group-hover:opacity-100 transition-all" />
                                            <div className="truncate">
                                                <p className="text-xs font-bold truncate">{track.name}</p>
                                                <p className="text-[10px] text-zinc-600 truncate">{track.artists[0].name}</p>
                                            </div>
                                        </div>
                                    )) : <p className="text-[10px] text-zinc-800 italic uppercase">Keine Titel in der Warteschlange</p>}
                                </div>
                            </div>
                        )}
                    </div>

                    {/* Das Steuerungs-Dock */}
                    <div className="main-dock shadow-2xl">
                        <div className={`dock-btn ${showInfo ? 'active' : ''}`} onClick={() => setShowInfo(!showInfo)}>Info Panel</div>
                        <div className={`dock-btn ${showQR ? 'active' : ''}`} onClick={() => setShowQR(!showQR)}>QR Code</div>
                        <div className={`dock-btn ${showQueue ? 'active' : ''}`} onClick={() => setShowQueue(!showQueue)}>Queue</div>
                        <div className="w-[1px] h-4 bg-white/10 mx-1 self-center"></div>
                        <div className="dock-btn text-red-500 hover:bg-red-500/10" onClick={() => {setToken(""); window.localStorage.clear(); window.location.reload();}}>Logout</div>
                    </div>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
