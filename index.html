<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jam Monitor - Auth Debug Version</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap');
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; }
        .glass-card { 
            background: rgba(255, 255, 255, 0.03); 
            backdrop-filter: blur(40px); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 2.5rem;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const CLIENT_ID = "4a1a9ff821ca4ea2a00f9f665dab598b"; 
        const REDIRECT_URI = "https://julian4-spot.github.io/jam-dashboard/";

        function App() {
            const [token, setToken] = useState(window.localStorage.getItem("spotify_token") || "");
            const [error, setError] = useState("");
            const [data, setData] = useState(null);

            useEffect(() => {
                const hash = window.location.hash;
                const urlParams = new URLSearchParams(window.location.search);
                
                // 1. Prüfe auf Fehler-Parameter von Spotify
                if (urlParams.get('error')) {
                    setError(`Spotify Fehler: ${urlParams.get('error')}. Prüfe deine Redirect URIs.`);
                }

                // 2. Prüfe auf falschen Auth-Typ (Code statt Token)
                if (urlParams.get('code')) {
                    setError("Falscher Modus: Du musst im Spotify Dashboard 'Implicit Grant' aktivieren.");
                    // Säubere URL von dem ungültigen Code
                    window.history.replaceState({}, document.title, window.location.pathname);
                }

                // 3. Verarbeite erfolgreichen Token (Implicit Grant)
                if (hash) {
                    const params = new URLSearchParams(hash.substring(1));
                    const t = params.get("access_token");
                    if(t) { 
                        setToken(t); 
                        window.localStorage.setItem("spotify_token", t); 
                        window.history.replaceState({}, document.title, window.location.pathname);
                        setError("");
                    }
                }
            }, []);

            useEffect(() => {
                if (!token) return;
                const fetchData = async () => {
                    try {
                        const res = await fetch("https://api.spotify.com/v1/me/player", {
                            headers: { Authorization: `Bearer ${token}` }
                        });
                        if (res.status === 200) setData(await res.json());
                        if (res.status === 401) {
                            setToken("");
                            window.localStorage.removeItem("spotify_token");
                        }
                    } catch (e) { console.error(res); }
                };
                fetchData();
                const interval = setInterval(fetchData, 3000);
                return () => clearInterval(interval);
            }, [token]);

            const login = () => {
                const scopes = "user-read-currently-playing user-read-playback-state";
                // Erzwinge Implicit Grant via response_type=token
                const authUrl = `https://accounts.spotify.com/authorize?client_id=${CLIENT_ID}&response_type=token&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&scope=${encodeURIComponent(scopes)}&show_dialog=true`;
                window.location.href = authUrl;
            };

            if (!token) {
                return (
                    <div className="h-screen flex items-center justify-center bg-black p-6">
                        <div className="max-w-md w-full text-center">
                            <h1 className="text-5xl font-black italic mb-2 tracking-tighter uppercase">Jam Monitor</h1>
                            <p className="text-zinc-600 mb-10 text-xs font-bold tracking-[0.3em] uppercase">Auth Debugger</p>
                            
                            {error && (
                                <div className="mb-8 p-6 bg-red-500/10 border border-red-500/20 rounded-3xl text-red-500 text-[10px] font-bold uppercase leading-relaxed">
                                    <p className="mb-2 text-sm">⚠️ Fehler aufgetreten</p>
                                    {error}
                                </div>
                            )}

                            <div className="space-y-4">
                                <button onClick={login} className="w-full bg-white text-black py-5 rounded-full font-black hover:scale-105 transition-all text-sm uppercase">
                                    Spotify Login versuchen
                                </button>
                                
                                <div className="p-6 glass-card text-left space-y-4">
                                    <p className="text-[10px] font-black text-zinc-500 uppercase tracking-widest">Checkliste für dich:</p>
                                    <ul className="text-[11px] space-y-2 text-zinc-400 font-medium">
                                        <li className="flex gap-2"><span>1.</span> <span>Redirect URI im Dashboard muss exakt sein: <br/><code className="text-white bg-white/5 p-1 rounded select-all">https://julian4-spot.github.io/jam-dashboard/</code></span></li>
                                        <li className="flex gap-2"><span>2.</span> <span>In den App-Settings den Haken bei <b>"Implicit Grant"</b> setzen (Wichtig!).</span></li>
                                        <li className="flex gap-2"><span>3.</span> <span>Speichern (Save) nicht vergessen.</span></li>
                                    </ul>
                                </div>
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="h-screen flex items-center justify-center bg-black">
                    <div className="text-center animate-pulse">
                        <p className="text-zinc-500 font-black uppercase tracking-[0.5em] text-xs">Verbunden!</p>
                        <h2 className="text-2xl font-bold mt-4">{data?.item?.name || "Lade Song-Daten..."}</h2>
                        <button onClick={() => {setToken(""); window.localStorage.clear(); window.location.reload();}} className="mt-10 text-zinc-700 text-[10px] font-bold uppercase tracking-widest hover:text-white">Logout</button>
                    </div>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
