<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jam Dashboard - Premium v2.6.0</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800;900&family=Unbounded:wght@400;900&display=swap');
        
        body { 
            background-color: #000; 
            color: #fff; 
            font-family: 'Inter', sans-serif; 
            overflow: hidden; 
            margin: 0;
        }

        .bg-dynamic {
            position: fixed;
            inset: 0;
            z-index: 0;
        }

        .bg-layer {
            position: absolute;
            inset: -5%;
            background-size: cover;
            background-position: center;
            filter: brightness(0.4) saturate(1.2);
            transition: background-image 2s ease-in-out;
        }

        /* TV Style Vignette */
        .overlay-vignette {
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, rgba(0,0,0,0.4) 0%, transparent 40%, transparent 60%, rgba(0,0,0,0.8) 100%),
                        linear-gradient(to right, rgba(0,0,0,0.6) 0%, transparent 30%, transparent 70%, rgba(0,0,0,0.6) 100%);
        }

        .app-container {
            position: relative;
            z-index: 10;
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
        }

        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Verstecktes Menü am unteren Rand */
        .system-dock {
            position: fixed;
            bottom: -100px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(10, 10, 10, 0.9);
            backdrop-filter: blur(20px);
            padding: 1rem 2rem;
            border-radius: 2rem 2rem 0 0;
            border: 1px solid rgba(255,255,255,0.1);
            display: flex;
            gap: 1rem;
            z-index: 1000;
            transition: bottom 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .trigger-zone:hover + .system-dock, .system-dock:hover {
            bottom: 0;
        }

        .trigger-zone {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 40px;
            z-index: 999;
        }

        .dock-item {
            padding: 0.6rem 1.2rem;
            border-radius: 1rem;
            font-size: 0.7rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            cursor: pointer;
            transition: all 0.2s;
            color: rgba(255,255,255,0.4);
            white-space: nowrap;
        }

        .dock-item:hover { color: #fff; background: rgba(255,255,255,0.1); }
        .dock-item.active { background: #fff; color: #000; }

        .progress-bar {
            height: 100%;
            background: #fff;
            transition: width 1s linear;
        }

        .massive-text { font-family: 'Unbounded', sans-serif; }

        .qr-wrapper canvas {
            width: 100% !important;
            height: auto !important;
        }

        .queue-item {
            transition: transform 0.3s ease;
        }
        .queue-item:hover {
            transform: translateX(10px);
        }

        /* Custom Scrollbar for Queue */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const CLIENT_ID = "52f166f3b18a4aee8d2a91649a371134"; 
        const REDIRECT_URI = window.location.origin + window.location.pathname;

        // PKCE Helpers
        const generateRandomString = (length) => {
            const possible = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
            const values = crypto.getRandomValues(new Uint8Array(length));
            return values.reduce((acc, x) => acc + possible[x % possible.length], "");
        };

        const sha256 = async (plain) => {
            const encoder = new TextEncoder();
            const data = encoder.encode(plain);
            return window.crypto.subtle.digest('SHA-256', data);
        };

        const base64encode = (input) => {
            return btoa(String.fromCharCode(...new Uint8Array(input)))
                .replace(/=/g, '').replace(/\+/g, '-').replace(/\//g, '_');
        };

        function App() {
            const [token, setToken] = useState(window.localStorage.getItem("spotify_token") || "");
            const [data, setData] = useState(null);
            const [queue, setQueue] = useState([]);
            const [layout, setLayout] = useState("tv"); 
            const [jamUrl, setJamUrl] = useState(window.localStorage.getItem("jam_url") || "");
            const [showMenu, setShowMenu] = useState(false);
            
            const qrRef = useRef(null);

            // PKCE Auth Callback
            useEffect(() => {
                const urlParams = new URLSearchParams(window.location.search);
                const code = urlParams.get('code');

                if (code) {
                    const getToken = async () => {
                        const codeVerifier = window.localStorage.getItem('code_verifier');
                        try {
                            const response = await fetch('https://accounts.spotify.com/api/token', {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                                body: new URLSearchParams({
                                    client_id: CLIENT_ID,
                                    grant_type: 'authorization_code',
                                    code: code,
                                    redirect_uri: REDIRECT_URI,
                                    code_verifier: codeVerifier,
                                }),
                            });
                            const result = await response.json();
                            if (result.access_token) {
                                setToken(result.access_token);
                                window.localStorage.setItem("spotify_token", result.access_token);
                                window.history.replaceState({}, document.title, window.location.pathname);
                            }
                        } catch (e) { console.error("Auth Error", e); }
                    };
                    getToken();
                }
            }, []);

            // Data Fetcher
            useEffect(() => {
                if (!token) return;
                const fetchData = async () => {
                    try {
                        const headers = { Authorization: `Bearer ${token}` };
                        const [playerRes, queueRes] = await Promise.all([
                            fetch("https://api.spotify.com/v1/me/player", { headers }),
                            fetch("https://api.spotify.com/v1/me/player/queue", { headers })
                        ]);
                        
                        if (playerRes.status === 200) setData(await playerRes.json());
                        else if (playerRes.status === 401) handleLogout();

                        if (queueRes.status === 200) {
                            const qData = await queueRes.json();
                            setQueue(qData.queue || []);
                        }
                    } catch (e) { console.error("API Error", e); }
                };
                fetchData();
                const i = setInterval(fetchData, 3000);
                return () => clearInterval(i);
            }, [token]);

            // QR Generator
            useEffect(() => {
                if (jamUrl && qrRef.current) {
                    qrRef.current.innerHTML = "";
                    new QRCode(qrRef.current, { 
                        text: jamUrl, width: 256, height: 256,
                        colorDark : "#000000", colorLight : "#ffffff"
                    });
                }
            }, [layout, jamUrl, data]);

            const login = async () => {
                const codeVerifier = generateRandomString(64);
                const hashed = await sha256(codeVerifier);
                const codeChallenge = base64encode(hashed);
                window.localStorage.setItem('code_verifier', codeVerifier);
                const params = new URLSearchParams({
                    response_type: 'code', client_id: CLIENT_ID,
                    scope: "user-read-currently-playing user-read-playback-state",
                    code_challenge_method: 'S256', code_challenge: codeChallenge,
                    redirect_uri: REDIRECT_URI, show_dialog: true
                });
                window.location.href = `https://accounts.spotify.com/authorize?${params.toString()}`;
            };

            const handleLogout = () => {
                window.localStorage.clear();
                window.location.href = window.location.pathname;
            };

            if (!token) return (
                <div className="h-screen w-screen flex flex-col items-center justify-center bg-black gap-12">
                    <img src="Logo.svg" className="w-32 h-32 opacity-80" alt="Logo" />
                    <button onClick={login} className="bg-white text-black px-14 py-5 rounded-full font-black uppercase tracking-widest hover:scale-110 transition-all shadow-2xl">
                        Dashboard Starten
                    </button>
                    <p className="text-[10px] font-bold text-white/20 uppercase tracking-[1em]">Secure PKCE Session</p>
                </div>
            );

            const CommonQR = ({ className = "w-32" }) => (
                <div className={`${className} glass p-2 rounded-2xl relative qr-wrapper group`}>
                    <div ref={qrRef} className="rounded-xl overflow-hidden bg-white"></div>
                    {!jamUrl && (
                        <div className="absolute inset-0 bg-black/80 flex items-center justify-center text-[8px] font-black uppercase tracking-tighter text-center p-2 rounded-2xl cursor-pointer" onClick={() => setShowMenu(true)}>
                            Link in Einstellungen hinterlegen
                        </div>
                    )}
                </div>
            );

            const renderLayout = () => {
                if (!data?.item) return <div className="flex-grow flex items-center justify-center opacity-10 uppercase font-black tracking-[1.5em] text-sm italic">Suche Audiosignal...</div>;
                const track = data.item;
                const progress = (data.progress_ms / track.duration_ms) * 100;

                switch(layout) {
                    case "tv":
                        return (
                            <div className="flex-grow flex flex-row p-12 gap-12 overflow-hidden">
                                {/* Left Side: Large Visuals & Info */}
                                <div className="flex-grow flex flex-col justify-end gap-10">
                                    <div className="flex items-end gap-8">
                                        <img src={track.album.images[0].url} className="w-24 h-24 rounded-2xl shadow-2xl" />
                                        <div className="pb-2">
                                            <h1 className="text-7xl font-black tracking-tighter uppercase leading-[0.85] mb-2">{track.name}</h1>
                                            <p className="text-3xl font-bold text-white/50">{track.artists[0].name}</p>
                                        </div>
                                    </div>
                                    <div className="w-full max-w-4xl space-y-3">
                                        <div className="h-2 bg-white/10 rounded-full overflow-hidden">
                                            <div className="progress-bar" style={{width: `${progress}%`}}></div>
                                        </div>
                                        <div className="flex justify-between text-[11px] font-black uppercase tracking-[0.4em] text-white/30">
                                            <span>{track.album.name}</span>
                                            <span>{Math.floor(data.progress_ms/60000)}:{String(Math.floor(data.progress_ms%60000/1000)).padStart(2,'0')}</span>
                                        </div>
                                    </div>
                                </div>
                                
                                {/* Right Side: Queue & Jam */}
                                <div className="w-[450px] shrink-0 flex flex-col gap-8">
                                    <div className="glass p-8 rounded-[2.5rem] flex-grow flex flex-col overflow-hidden">
                                        <h3 className="text-[10px] font-black uppercase tracking-[0.4em] text-white/20 mb-8 flex justify-between">
                                            <span>Warteschlange</span>
                                            <span className="text-[#1DB954]">● Live</span>
                                        </h3>
                                        <div className="flex-grow overflow-y-auto no-scrollbar space-y-6">
                                            {queue.slice(0, 8).map((t, i) => (
                                                <div key={i} className="flex items-center gap-5 group queue-item">
                                                    <img src={t.album?.images?.[2]?.url} className="w-12 h-12 rounded-xl" />
                                                    <div className="truncate">
                                                        <p className="text-sm font-black uppercase truncate group-hover:text-[#1DB954] transition-colors">{t.name}</p>
                                                        <p className="text-[10px] font-bold text-white/30 truncate">{t.artists[0].name}</p>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                    <div className="glass p-8 rounded-[2.5rem] flex items-center justify-between">
                                        <div className="space-y-1">
                                            <p className="text-[10px] font-black uppercase tracking-[0.3em] text-white/40">Beitreten</p>
                                            <p className="text-lg font-black uppercase tracking-tighter">Spotify Jam</p>
                                        </div>
                                        <CommonQR className="w-24" />
                                    </div>
                                </div>
                            </div>
                        );
                    case "minimal":
                        return (
                            <div className="flex-grow flex flex-col items-center justify-center text-center p-20">
                                <div className="mb-12 relative">
                                    <div className="absolute -inset-20 bg-white/5 blur-[120px] rounded-full"></div>
                                    <img src={track.album.images[0].url} className="w-96 h-96 rounded-[3rem] shadow-[0_50px_100px_rgba(0,0,0,0.8)] relative z-10" />
                                </div>
                                <div className="space-y-4 max-w-4xl relative z-10">
                                    <h1 className="text-8xl font-black uppercase tracking-tighter leading-none italic">{track.name}</h1>
                                    <p className="text-3xl font-light text-white/40 tracking-widest uppercase">{track.artists.map(a => a.name).join(" • ")}</p>
                                    <div className="w-64 mx-auto pt-10 opacity-30"><div className="h-[2px] bg-white/20"><div className="h-full bg-white" style={{width: `${progress}%`}}></div></div></div>
                                </div>
                            </div>
                        );
                    case "massive":
                        return (
                            <div className="flex-grow flex flex-col massive-text justify-center px-20">
                                <h2 className="text-[6vw] leading-none opacity-10 uppercase mb-4">Up Next: {queue[0]?.name || '---'}</h2>
                                <h1 className="text-[14vw] leading-[0.8] font-black italic uppercase tracking-tighter mb-8">{track.name}</h1>
                                <div className="flex items-center gap-12">
                                    <p className="text-5xl text-white/40 font-light">{track.artists[0].name}</p>
                                    <div className="flex-grow h-4 bg-white/10 rounded-full overflow-hidden"><div className="h-full bg-white shadow-[0_0_20px_#fff]" style={{width: `${progress}%`}}></div></div>
                                </div>
                            </div>
                        );
                    default: return null;
                }
            };

            return (
                <div className="relative h-screen w-screen overflow-hidden bg-black select-none">
                    {/* Dynamic BG */}
                    <div className="bg-dynamic">
                        <div className="bg-layer" style={{ backgroundImage: `url(${data?.item?.album?.images[0]?.url})` }}></div>
                        <div className="overlay-vignette"></div>
                    </div>

                    <div className="app-container">
                        {/* Header Branding */}
                        <header className="p-10 flex justify-between items-start pointer-events-none">
                            <img src="Logo.svg" className="w-16 h-16 opacity-40" alt="Logo" />
                            <div className="text-right opacity-30">
                                <p className="text-3xl font-black italic tracking-tighter">{new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</p>
                                <p className="text-[10px] font-black uppercase tracking-[0.5em]">Live Session</p>
                            </div>
                        </header>

                        {renderLayout()}
                    </div>

                    {/* Hidden Controls */}
                    <div className="trigger-zone"></div>
                    <div className="system-dock">
                        {['tv', 'minimal', 'massive'].map(mode => (
                            <div 
                                key={mode} 
                                className={`dock-item ${layout === mode ? 'active' : ''}`}
                                onClick={() => setLayout(mode)}
                            >
                                {mode} Mode
                            </div>
                        ))}
                        <div className="w-[1px] h-6 bg-white/10 mx-2"></div>
                        <input 
                            className="bg-white/5 border-none px-4 py-2 rounded-xl text-[10px] font-bold text-white outline-none w-48 focus:bg-white/10 transition-all"
                            placeholder="Jam URL hier..."
                            value={jamUrl}
                            onChange={(e) => {
                                setJamUrl(e.target.value);
                                window.localStorage.setItem("jam_url", e.target.value);
                            }}
                        />
                        <div className="dock-item text-red-500/60 hover:!text-red-500" onClick={handleLogout}>System Logout</div>
                    </div>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
