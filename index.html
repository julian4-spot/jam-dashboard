<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jam Canvas Dashboard</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { background-color: #050505; color: white; font-family: 'Inter', sans-serif; margin: 0; overflow: hidden; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .bg-gradient-glow { background: radial-gradient(circle at center, rgba(34, 197, 94, 0.15) 0%, transparent 70%); }
        .album-shadow { box-shadow: 0 50px 100px -20px rgba(0, 0, 0, 0.8); }
        @keyframes pulse-slow { 0%, 100% { opacity: 0.3; transform: scale(1); } 50% { opacity: 0.5; transform: scale(1.1); } }
        .animate-pulse-slow { animation: pulse-slow 8s ease-in-out infinite; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const CLIENT_ID = "4a1a9ff821ca4ea2a00f9f665dab598b"; 
        const REDIRECT_URI = "https://julian4-spot.github.io/jam-dashboard/";
        const AUTH_ENDPOINT = "https://accounts.spotify.com/authorize";
        const TOKEN_ENDPOINT = "https://accounts.spotify.com/api/token";
        const SCOPES = "user-read-currently-playing user-read-playback-state";

        // PKCE Hilfsfunktionen
        const generateRandomString = (length) => {
            const possible = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
            const values = crypto.getRandomValues(new Uint8Array(length));
            return Array.from(values).map((x) => possible[x % possible.length]).join('');
        };

        const sha256 = async (plain) => {
            const encoder = new TextEncoder();
            const data = encoder.encode(plain);
            return window.crypto.subtle.digest('SHA-256', data);
        };

        const base64encode = (input) => {
            return btoa(String.fromCharCode(...new Uint8Array(input)))
                .replace(/=/g, '').replace(/\+/g, '-').replace(/\//g, '_');
        };

        function App() {
            const [token, setToken] = useState(window.localStorage.getItem("spotify_access_token") || "");
            const [data, setData] = useState(null);

            useEffect(() => {
                const urlParams = new URLSearchParams(window.location.search);
                const code = urlParams.get('code');

                if (code) {
                    exchangeCodeForToken(code);
                }
            }, []);

            const exchangeCodeForToken = async (code) => {
                const codeVerifier = window.localStorage.getItem('code_verifier');
                const payload = {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: new URLSearchParams({
                        client_id: CLIENT_ID,
                        grant_type: 'authorization_code',
                        code,
                        redirect_uri: REDIRECT_URI,
                        code_verifier: codeVerifier,
                    }),
                };

                try {
                    const response = await fetch(TOKEN_ENDPOINT, payload);
                    const result = await response.json();
                    
                    if (result.access_token) {
                        setToken(result.access_token);
                        window.localStorage.setItem("spotify_access_token", result.access_token);
                        // Säubere die URL von den Query-Parametern
                        window.history.replaceState({}, document.title, window.location.pathname);
                    }
                } catch (error) {
                    console.error("Token exchange failed:", error);
                }
            };

            const login = async () => {
                const codeVerifier = generateRandomString(64);
                const hashed = await sha256(codeVerifier);
                const codeChallenge = base64encode(hashed);

                window.localStorage.setItem('code_verifier', codeVerifier);

                const params = new URLSearchParams({
                    response_type: 'code',
                    client_id: CLIENT_ID,
                    scope: SCOPES,
                    code_challenge_method: 'S256',
                    code_challenge: codeChallenge,
                    redirect_uri: REDIRECT_URI,
                });

                window.location.href = `${AUTH_ENDPOINT}?${params.toString()}`;
            };

            useEffect(() => {
                if (!token) return;
                const fetchData = async () => {
                    try {
                        const response = await fetch("https://api.spotify.com/v1/me/player/currently-playing", {
                            headers: { Authorization: `Bearer ${token}` }
                        });
                        if (response.status === 401) {
                            logout();
                        } else if (response.status === 200) {
                            setData(await response.json());
                        } else {
                            setData(null);
                        }
                    } catch (err) { 
                        console.error("Fetch error:", err); 
                    }
                };
                fetchData();
                const interval = setInterval(fetchData, 3000);
                return () => clearInterval(interval);
            }, [token]);

            const logout = () => {
                window.localStorage.removeItem("spotify_access_token");
                setToken("");
                setData(null);
            };

            return (
                <div className="min-h-screen flex items-center justify-center p-10 relative overflow-hidden">
                    <div className="absolute inset-0 bg-gradient-glow opacity-50"></div>
                    {!token ? (
                        <div className="max-w-md w-full glass p-12 rounded-[3rem] text-center relative z-10 border border-white/10">
                            <div className="w-16 h-16 bg-green-500 rounded-2xl flex items-center justify-center mx-auto mb-8 shadow-xl shadow-green-500/20">
                                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="black" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
                            </div>
                            <h1 className="text-4xl font-black mb-4 italic uppercase tracking-tighter">Jam Canvas</h1>
                            <p className="text-zinc-500 text-sm mb-10">Verbinde dein Spotify (Authorization Code PKCE Flow)</p>
                            <button onClick={login} className="w-full bg-green-500 hover:bg-green-400 text-black font-black py-6 rounded-2xl transition-all shadow-xl active:scale-95">
                                LOGIN STARTEN
                            </button>
                        </div>
                    ) : !data ? (
                        <div className="text-center relative z-10">
                            <div className="w-12 h-12 border-4 border-zinc-800 border-t-green-500 rounded-full animate-spin mx-auto mb-4"></div>
                            <p className="opacity-20 font-black uppercase text-xs tracking-widest">Warte auf Musik...</p>
                        </div>
                    ) : (
                        <div className="flex flex-col md:flex-row items-center gap-16 max-w-6xl w-full relative z-10 animate-in fade-in duration-700">
                            <img src={data.item.album.images[0].url} className="w-[28rem] h-[28rem] rounded-[4rem] album-shadow relative z-10 border border-white/5 object-cover" />
                            <div className="flex-grow space-y-8 text-center md:text-left">
                                <div>
                                    <h1 className="text-7xl font-black italic uppercase tracking-tighter leading-none">{data.item.name}</h1>
                                    <p className="text-3xl text-zinc-400 font-bold tracking-tight">{data.item.artists.map(a => a.name).join(", ")}</p>
                                </div>
                                <div className="space-y-4">
                                    <div className="w-full bg-zinc-900/50 h-3 rounded-full overflow-hidden border border-white/5">
                                        <div className="bg-green-500 h-full transition-all duration-1000 shadow-[0_0_15px_rgba(34,197,94,0.5)]" style={{ width: `${(data.progress_ms / data.item.duration_ms) * 100}%` }}></div>
                                    </div>
                                    <div className="flex justify-between text-[10px] font-black text-zinc-600 tracking-[0.3em] uppercase">
                                        <span>LIVE AUF SPOTIFY</span>
                                        <span>{Math.floor(data.progress_ms / 60000)}:{String(Math.floor((data.progress_ms % 60000) / 1000)).padStart(2, '0')} / {Math.floor(data.item.duration_ms / 60000)}:{String(Math.floor((data.item.duration_ms % 60000) / 1000)).padStart(2, '0')}</span>
                                    </div>
                                </div>
                                <button onClick={logout} className="text-[10px] font-black text-zinc-800 hover:text-red-500 tracking-[0.4em] uppercase transition-colors">Logout</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
