<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jam Dashboard - v2.5.0</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800;900&family=Space+Mono:wght@400;700&family=Unbounded:wght@900&display=swap');
        
        body { 
            background-color: #000; 
            color: #fff; 
            font-family: 'Inter', sans-serif; 
            overflow: hidden; 
            margin: 0;
        }

        .bg-dynamic {
            position: fixed;
            inset: 0;
            z-index: 0;
        }

        .bg-layer {
            position: absolute;
            inset: -10%;
            background-size: cover;
            background-position: center;
            filter: blur(80px) brightness(0.3) saturate(1.2);
            transition: background-image 2s ease-in-out;
        }

        .overlay-vignette {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at center, transparent 0%, rgba(0,0,0,0.95) 100%);
        }

        .app-container {
            position: relative;
            z-index: 10;
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            padding: 2.5rem;
        }

        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .progress-container {
            height: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background: #fff;
            transition: width 1s linear;
            box-shadow: 0 0 15px #fff;
        }

        .dock {
            position: fixed;
            bottom: 1.5rem;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(20px);
            padding: 0.4rem;
            border-radius: 1.2rem;
            border: 1px solid rgba(255,255,255,0.1);
            display: flex;
            gap: 0.2rem;
            z-index: 100;
        }

        .dock-item {
            padding: 0.4rem 0.6rem;
            border-radius: 0.8rem;
            font-size: 0.55rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            cursor: pointer;
            transition: all 0.2s;
            color: rgba(255,255,255,0.3);
            white-space: nowrap;
        }

        .dock-item.active {
            background: #fff;
            color: #000;
        }

        @keyframes rotate-slow {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .animate-vinyl {
            animation: rotate-slow 12s linear infinite;
        }

        .cyber-text { font-family: 'Space Mono', monospace; }
        .massive-text { font-family: 'Unbounded', sans-serif; }

        .qr-wrapper canvas {
            width: 100% !important;
            height: auto !important;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const CLIENT_ID = "52f166f3b18a4aee8d2a91649a371134"; 
        const REDIRECT_URI = window.location.origin + window.location.pathname;

        // PKCE Helpers
        const generateRandomString = (length) => {
            const possible = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
            const values = crypto.getRandomValues(new Uint8Array(length));
            return values.reduce((acc, x) => acc + possible[x % possible.length], "");
        };

        const sha256 = async (plain) => {
            const encoder = new TextEncoder();
            const data = encoder.encode(plain);
            return window.crypto.subtle.digest('SHA-256', data);
        };

        const base64encode = (input) => {
            return btoa(String.fromCharCode(...new Uint8Array(input)))
                .replace(/=/g, '').replace(/\+/g, '-').replace(/\//g, '_');
        };

        function App() {
            const [token, setToken] = useState(window.localStorage.getItem("spotify_token") || "");
            const [data, setData] = useState(null);
            const [queue, setQueue] = useState([]);
            const [layout, setLayout] = useState("dashboard"); 
            const [jamUrl, setJamUrl] = useState(window.localStorage.getItem("jam_url") || "");
            
            const qrRef = useRef(null);

            // Handle PKCE Callback
            useEffect(() => {
                const urlParams = new URLSearchParams(window.location.search);
                const code = urlParams.get('code');

                if (code) {
                    const getToken = async () => {
                        const codeVerifier = window.localStorage.getItem('code_verifier');
                        try {
                            const response = await fetch('https://accounts.spotify.com/api/token', {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                                body: new URLSearchParams({
                                    client_id: CLIENT_ID,
                                    grant_type: 'authorization_code',
                                    code: code,
                                    redirect_uri: REDIRECT_URI,
                                    code_verifier: codeVerifier,
                                }),
                            });
                            const result = await response.json();
                            if (result.access_token) {
                                setToken(result.access_token);
                                window.localStorage.setItem("spotify_token", result.access_token);
                                window.history.replaceState({}, document.title, window.location.pathname);
                            }
                        } catch (e) { console.error("Token Error", e); }
                    };
                    getToken();
                }
            }, []);

            // Fetch Player Data
            useEffect(() => {
                if (!token) return;
                const fetchData = async () => {
                    try {
                        const res = await fetch("https://api.spotify.com/v1/me/player", { 
                            headers: { Authorization: `Bearer ${token}` } 
                        });
                        
                        if (res.status === 200) {
                            setData(await res.json());
                        } else if (res.status === 401) {
                            handleLogout();
                        }
                        
                        const qRes = await fetch("https://api.spotify.com/v1/me/player/queue", { 
                            headers: { Authorization: `Bearer ${token}` } 
                        });
                        if (qRes.status === 200) {
                            const qData = await qRes.json();
                            setQueue(qData.queue || []);
                        }
                    } catch (e) { console.error("Fetch Error", e); }
                };
                fetchData();
                const i = setInterval(fetchData, 3000);
                return () => clearInterval(i);
            }, [token]);

            // QR Code Rendering
            useEffect(() => {
                if (jamUrl && qrRef.current) {
                    qrRef.current.innerHTML = "";
                    new QRCode(qrRef.current, { 
                        text: jamUrl, 
                        width: 256, height: 256,
                        colorDark : "#000000", colorLight : "#ffffff",
                        correctLevel : QRCode.CorrectLevel.H
                    });
                }
            }, [layout, jamUrl, data]);

            const login = async () => {
                const codeVerifier = generateRandomString(64);
                const hashed = await sha256(codeVerifier);
                const codeChallenge = base64encode(hashed);
                window.localStorage.setItem('code_verifier', codeVerifier);

                const params = new URLSearchParams({
                    response_type: 'code',
                    client_id: CLIENT_ID,
                    scope: "user-read-currently-playing user-read-playback-state",
                    code_challenge_method: 'S256',
                    code_challenge: codeChallenge,
                    redirect_uri: REDIRECT_URI,
                    show_dialog: true
                });
                window.location.href = `https://accounts.spotify.com/authorize?${params.toString()}`;
            };

            const handleLogout = () => {
                setToken("");
                window.localStorage.removeItem("spotify_token");
                window.localStorage.removeItem("code_verifier");
                window.location.href = window.location.pathname; 
            };

            if (!token) return (
                <div className="h-screen w-screen flex flex-col items-center justify-center bg-black gap-8">
                    <h1 className="text-5xl font-black uppercase italic tracking-tighter text-white/20">Jam Dashboard</h1>
                    <button onClick={login} className="bg-white text-black px-12 py-5 rounded-full font-black uppercase tracking-widest hover:scale-105 transition-transform shadow-2xl">
                        Spotify Verbinden
                    </button>
                    <p className="text-[10px] font-bold text-white/20 uppercase tracking-[0.5em]">System Ready • PKCE Auth</p>
                </div>
            );

            const renderLayout = () => {
                if (!data?.item) return <div className="flex-grow flex items-center justify-center opacity-10 uppercase font-black tracking-[1em] text-xs animate-pulse">Waiting for Signal...</div>;
                const track = data.item;
                const progress = (data.progress_ms / track.duration_ms) * 100;

                const CommonQR = ({ className = "w-32" }) => (
                    <div className={`${className} glass p-2 rounded-xl relative overflow-hidden qr-wrapper`}>
                        <div ref={qrRef} className="rounded-lg overflow-hidden bg-white"></div>
                        {!jamUrl && <div className="absolute inset-0 flex items-center justify-center bg-black/90 text-[8px] font-bold text-center px-2">Link oben einfügen</div>}
                    </div>
                );

                switch(layout) {
                    case "dashboard":
                        return (
                            <div className="flex-grow grid grid-cols-12 gap-8 py-6">
                                <div className="col-span-8 flex flex-col justify-center">
                                    <div className="flex items-center gap-12">
                                        <img src={track.album.images[0].url} className="w-80 h-80 rounded-3xl shadow-2xl relative z-10" />
                                        <div className="space-y-6">
                                            <div className="space-y-1">
                                                <h1 className="text-6xl font-black italic uppercase leading-none tracking-tighter">{track.name}</h1>
                                                <p className="text-2xl font-bold text-white/40">{track.artists.map(a => a.name).join(", ")}</p>
                                            </div>
                                            <div className="w-full max-w-md space-y-2">
                                                <div className="progress-container"><div className="progress-bar" style={{width: `${progress}%`}}></div></div>
                                                <div className="flex justify-between text-[10px] font-black text-white/20 uppercase tracking-widest">
                                                    <span>Live Session</span>
                                                    <span>{Math.floor(data.progress_ms/1000/60)}:{(Math.floor(data.progress_ms/1000%60)).toString().padStart(2,'0')}</span>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                <div className="col-span-4 flex flex-col gap-6 justify-center">
                                    <div className="glass p-6 rounded-3xl flex flex-col items-center">
                                        <h3 className="text-[10px] font-black uppercase tracking-[0.3em] text-white/30 mb-4">Scan to Join</h3>
                                        <CommonQR className="w-48" />
                                    </div>
                                    <div className="glass p-6 rounded-3xl flex-grow overflow-hidden max-h-[300px]">
                                        <h3 className="text-[10px] font-black uppercase tracking-[0.3em] text-white/30 mb-4">Nächste Songs</h3>
                                        <div className="space-y-3">
                                            {queue.slice(0, 4).map((t, i) => (
                                                <div key={i} className="flex items-center gap-3 opacity-60">
                                                    <img src={t.album?.images?.[2]?.url} className="w-10 h-10 rounded-lg" />
                                                    <div className="truncate">
                                                        <p className="text-[10px] font-black uppercase truncate">{t.name}</p>
                                                        <p className="text-[8px] font-bold text-white/40 truncate">{t.artists?.[0]?.name}</p>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        );
                    case "classic":
                        return (
                            <div className="flex-grow flex items-center gap-16">
                                <img src={track.album.images[0].url} className="w-[450px] h-[450px] rounded-3xl shadow-2xl" />
                                <div className="space-y-6">
                                    <h1 className="text-6xl font-black italic uppercase leading-none tracking-tighter">{track.name}</h1>
                                    <p className="text-2xl font-bold text-white/50">{track.artists.map(a => a.name).join(", ")}</p>
                                    <div className="w-80 progress-container"><div className="progress-bar" style={{width: `${progress}%`}}></div></div>
                                    <CommonQR />
                                </div>
                            </div>
                        );
                    case "vinyl":
                        return (
                            <div className="flex-grow flex flex-col items-center justify-center gap-8 text-center">
                                <div className="relative">
                                    <div className="absolute inset-0 bg-black rounded-full animate-vinyl border-4 border-white/5 shadow-2xl"></div>
                                    <img src={track.album.images[0].url} className="w-72 h-72 rounded-full relative z-10 border-4 border-black" />
                                    <div className="absolute -right-20 bottom-0"><CommonQR className="w-24" /></div>
                                </div>
                                <div className="space-y-2">
                                    <h1 className="text-4xl font-black uppercase tracking-tighter">{track.name}</h1>
                                    <p className="text-xl text-white/40">{track.artists[0].name}</p>
                                </div>
                            </div>
                        );
                    case "minimal":
                        return (
                            <div className="flex-grow flex flex-col items-center justify-center text-center p-20 relative">
                                <h1 className="text-[15vw] font-black tracking-tighter leading-none opacity-5 absolute inset-0 flex items-center justify-center select-none uppercase">{track.name}</h1>
                                <div className="relative z-10 space-y-4">
                                    <p className="text-[10px] font-black uppercase tracking-[1em] opacity-30">Now Playing</p>
                                    <h2 className="text-7xl font-light tracking-tight">{track.name}</h2>
                                    <p className="text-2xl text-white/30 font-bold uppercase tracking-widest">{track.artists[0].name}</p>
                                </div>
                            </div>
                        );
                    case "cyber":
                        return (
                            <div className="flex-grow flex flex-col justify-end p-6 gap-4 cyber-text">
                                <div className="flex justify-between items-start">
                                    <div className="px-3 py-1 bg-white text-black font-bold text-[10px]">LIVE_FEED</div>
                                    <CommonQR className="w-20 invert" />
                                </div>
                                <h1 className="text-[10vw] font-bold leading-[0.8] tracking-tighter uppercase">{track.name}</h1>
                                <p className="text-3xl text-white/40 uppercase font-bold">{track.artists[0].name}</p>
                                <div className="progress-container h-2 mt-4"><div className="progress-bar" style={{width: `${progress}%`}}></div></div>
                            </div>
                        );
                    case "massive":
                        return (
                            <div className="flex-grow flex flex-col justify-between py-10 massive-text">
                                <div className="flex justify-between items-start">
                                    <h2 className="text-[8vw] leading-[0.8] tracking-tighter italic uppercase text-white/10 select-none">NEXT: {queue[0]?.name || '...'}</h2>
                                    <CommonQR className="w-32 invert" />
                                </div>
                                <div className="space-y-4">
                                    <h1 className="text-[12vw] leading-[0.75] tracking-tighter uppercase italic">{track.name}</h1>
                                    <div className="flex items-center gap-8">
                                        <p className="text-4xl text-white/30 uppercase italic">{track.artists[0].name}</p>
                                        <div className="flex-grow progress-container"><div className="progress-bar" style={{width: `${progress}%`}}></div></div>
                                    </div>
                                </div>
                            </div>
                        );
                    default:
                        return <div className="p-10">Layout Error</div>;
                }
            };

            return (
                <div className="relative h-screen w-screen overflow-hidden bg-black">
                    <div className="bg-dynamic">
                        <div className="bg-layer" style={{ backgroundImage: `url(${data?.item?.album?.images[0]?.url})` }}></div>
                        <div className="overlay-vignette"></div>
                    </div>

                    <div className="app-container">
                        <header className="flex justify-between items-center shrink-0 mb-4">
                            <div className="flex items-center gap-4">
                                <div className="w-10 h-10 rounded-xl bg-white flex items-center justify-center text-black font-black text-sm shadow-xl">J</div>
                                <div>
                                    <h2 className="text-[10px] font-black uppercase tracking-[0.5em] text-white">Jam Dashboard</h2>
                                    <p className="text-[8px] font-bold uppercase text-white/30 tracking-widest">Build v2.5.0 • PKCE SECURE</p>
                                </div>
                            </div>
                            
                            <div className="glass px-6 py-2 rounded-2xl flex items-center gap-8">
                                <div className="text-center">
                                    <p className="text-[8px] font-black text-white/30 uppercase">Jam Link</p>
                                    <input 
                                        className="bg-transparent border-none text-[10px] font-black text-white/60 outline-none w-48 focus:text-white transition-colors"
                                        placeholder="HIER LINK EINFÜGEN"
                                        value={jamUrl}
                                        onChange={(e) => {
                                            setJamUrl(e.target.value);
                                            window.localStorage.setItem("jam_url", e.target.value);
                                        }}
                                    />
                                </div>
                                <div className="w-[1px] h-6 bg-white/10"></div>
                                <div className="text-right">
                                    <p className="text-xl font-black italic tracking-tighter">{new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</p>
                                </div>
                            </div>
                        </header>

                        {renderLayout()}
                    </div>

                    <div className="dock">
                        {['dashboard', 'classic', 'vinyl', 'cyber', 'minimal', 'massive'].map(mode => (
                            <div 
                                key={mode} 
                                className={`dock-item ${layout === mode ? 'active' : ''}`}
                                onClick={() => setLayout(mode)}
                            >
                                {mode}
                            </div>
                        ))}
                        <div className="w-[1px] h-4 bg-white/10 self-center mx-2"></div>
                        <div className="dock-item hover:text-red-500 font-black" onClick={handleLogout}>Logout</div>
                    </div>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
